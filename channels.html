async function loadChatInbox(channelType, searchQuery) {
  if (STATE.loadingChat[channelType]) return
  STATE.loadingChat[channelType] = true

  // Wire subnav tabs
  const subnav = document.getElementById(`chat-subnav-${channelType}`)
  if (subnav && !subnav._wired) {
    subnav._wired = true
    subnav.addEventListener('click', e => {
      const btn = e.target.closest('.subnav-tab')
      if (!btn) return
      const bucket = btn.dataset.bucket
      if (bucket === STATE.chatBucket[channelType]) return
      STATE.chatBucket[channelType] = bucket
      STATE.chatPage[channelType] = 1
      STATE.chatSelectedId[channelType] = null
      subnav.querySelectorAll('.subnav-tab').forEach(b => b.classList.toggle('active', b === btn))
      const rp = document.getElementById(`chat-read-${channelType}`)
      if (rp) rp.innerHTML = `<div class="read-empty"><div class="read-empty-icon">${channelType==='whatsapp'?'💬':'📸'}</div><div class="read-empty-title">Select a message</div></div>`
      loadChatInbox(channelType)
    })
  }

  const listPane = document.getElementById(`chat-list-${channelType}`)
  try {
    const bucket      = STATE.chatBucket[channelType] || 'inbox'
    const page        = STATE.chatPage[channelType] || 1
    const searchParam = searchQuery ? `&search=${encodeURIComponent(searchQuery)}` : ''
    const url = `/agents/${STATE.agentId}/channels/gmail/inbox?channel=${channelType}&bucket=${bucket}&page=${page}&limit=${PAGE_SIZE}${searchParam}`
    const data = await apiFetch(url)
    const msgs = (data.messages || []).filter(m => m.channel === channelType || !m.channel || channelType !== 'email')
    STATE.chatMsgs[channelType]  = msgs
    STATE.chatTotal[channelType] = data.total || msgs.length

    // Update counts
    const cntEl = document.getElementById(`chat-cnt-inbox-${channelType}`)
    if (cntEl) cntEl.textContent = data.total || msgs.length

    renderChatMsgList(channelType)
  } catch (e) {
    if (listPane) listPane.innerHTML = `<div class="msg-list-empty"><div class="msg-list-empty-icon">😵</div><div class="msg-list-empty-title">Failed to load</div><div class="msg-list-empty-sub" style="color:var(--red)">${esc(e.message)}</div></div>`
  } finally {
    STATE.loadingChat[channelType] = false
  }
}

// Change 6: renderChatMsgList
function renderChatMsgList(channelType) {
  const pane = document.getElementById(`chat-list-${channelType}`)
  if (!pane) return
  const msgs   = STATE.chatMsgs[channelType] || []
  const isWA   = channelType === 'whatsapp'
  const icon   = isWA ? '💬' : '📸'
  const label  = isWA ? 'WhatsApp' : 'Instagram'

  if (!msgs.length) {
    pane.innerHTML = `
      <div class="msg-list-empty">
        <div class="msg-list-empty-icon">${icon}</div>
        <div class="msg-list-empty-title">No messages</div>
        <div class="msg-list-empty-sub">Incoming ${label} messages will appear here</div>
      </div>`
    return
  }

  pane.innerHTML = msgs.map((msg, idx) => {
    const from    = msg.from || 'Unknown'
    const name    = from.replace(/^(\+?\d+)$/, (m) => m) // show phone as-is
    const init    = (name[0] || '?').toUpperCase()
    const bg      = avatarColor(name)
    const time    = fmtRelTime(msg.created_at)
    const snippet = cleanBody(msg.body, 100)
    const sel     = STATE.chatSelectedId[channelType] === msg._id
    const cfg     = INTENT_CFG[msg.intent] || INTENT_CFG.other
    const chanBadgeCls = isWA ? 'bp-wa' : 'bp-ig'

    return `
    <div class="msg-row ${sel?'selected':''}" data-msgid="${esc(msg._id)}" data-channel="${channelType}"
         style="animation-delay:${idx*30}ms">
      <div class="msg-avatar" style="background:${bg}">${init}</div>
      <div class="msg-right">
        <div class="msg-row-top">
          <div class="msg-from-name">${esc(name)}</div>
          <div class="msg-time">${time}</div>
        </div>
        <div class="msg-snippet">${esc(snippet)}</div>
        <div class="msg-badges">
          <span class="badge-pill ${chanBadgeCls}">${icon} ${label}</span>
          <span class="badge-pill ${cfg.cls}">${cfg.emoji} ${cfg.label}</span>
          ${msg.ai_draft ? `<span class="badge-pill" style="background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)">✦ Draft ready</span>` : ''}
          ${msg.status==='replied'&&msg.auto_replied ? `<span class="badge-pill bp-auto-replied">✦ Auto-replied</span>` : ''}
          ${msg.status==='replied'&&!msg.auto_replied ? `<span class="badge-pill" style="background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)">✅ Replied</span>` : ''}
        </div>
      </div>
    </div>`
  }).join('')

  // Wire click
  pane.addEventListener('click', e => {
    const row = e.target.closest('.msg-row[data-msgid]')
    if (!row) return
    const ch  = row.dataset.channel || channelType
    const msg = (STATE.chatMsgs[ch] || []).find(m => m._id === row.dataset.msgid)
    if (!msg || STATE.chatSelectedId[ch] === row.dataset.msgid) return
    STATE.chatSelectedId[ch] = row.dataset.msgid
    pane.querySelectorAll('.msg-row').forEach(r => r.classList.toggle('selected', r.dataset.msgid === row.dataset.msgid))
    renderChatReadPane(ch, msg)
  })
}

// Change 6: renderChatReadPane
function renderChatReadPane(channelType, msg) {
  const pane = document.getElementById(`chat-read-${channelType}`)
  if (!pane) return
  const isWA    = channelType === 'whatsapp'
  const icon    = isWA ? '💬' : '📸'
  const label   = isWA ? 'WhatsApp' : 'Instagram'
  const from    = msg.from || 'Unknown'
  const init    = (from[0] || '?').toUpperCase()
  const bg      = avatarColor(from)
  const cfg     = INTENT_CFG[msg.intent] || INTENT_CFG.other
  const canReply = msg.status === 'inbox'

  // Check 24h window for WhatsApp
  const msgAgeMs    = Date.now() - new Date(msg.created_at).getTime()
  const waExpired   = isWA && msgAgeMs > 24 * 60 * 60 * 1000
  const chanBadgeCls = isWA ? 'bp-wa' : 'bp-ig'

  pane.innerHTML = `
  <div class="email-read-header">
    <div class="email-read-subject">${icon} ${label} Message</div>
    <div class="email-read-meta">
      <div class="email-read-avatar" style="background:${bg}">${init}</div>
      <div class="email-read-from-wrap">
        <div class="email-read-from-name">${esc(from)}</div>
        <div class="email-read-from-email">${isWA ? '📱 WhatsApp' : '📸 Instagram DM'}</div>
      </div>
      <div class="email-read-timestamp">${fmtRelTime(msg.created_at)}</div>
    </div>
    <div class="email-status-row">
      <span class="badge-pill ${chanBadgeCls}">${icon} ${label}</span>
      <span class="badge-pill ${cfg.cls}">${cfg.emoji} ${cfg.label}</span>
      ${msg.auto_replied ? `<span class="badge-pill bp-auto-replied">✦ Auto-replied</span>` : ''}
      ${msg.draft_tokens_used ? `<span class="token-chip loaded">⚡ ${msg.draft_tokens_used} tokens</span>` : ''}
    </div>
  </div>

  <div class="conversation-panel" id="chat-conv-${channelType}">
    <div class="conv-message direction-recv">
      <div class="conv-message-header">
        <span class="conv-dir-chip recv">↓ Received</span>
        <span class="conv-from">${esc(from)}</span>
        <span class="conv-time">${fmtRelTime(msg.created_at)}</span>
      </div>
      <div class="conv-body">${esc(msg.body || '')}</div>
    </div>
    ${msg.reply_sent ? `
    <div class="conv-message direction-sent">
      <div class="conv-message-header">
        <span class="conv-dir-chip sent">↑ Sent</span>
        <span class="conv-from">You${msg.auto_replied?'':''}</span>
        ${msg.auto_replied?'<span class="conv-ai-label">✦ AI Reply</span>':''}
        <span class="conv-time">${fmtRelTime(msg.replied_at||msg.updated_at)}</span>
      </div>
      <div class="conv-body">${esc(msg.reply_sent)}</div>
    </div>` : ''}
  </div>

  <div class="email-reply-composer">
    <div class="reply-composer-inner" id="chat-composer-inner-${channelType}">
      ${canReply ? renderChatComposer(channelType, msg, waExpired) : `
      <div class="replied-notice">
        ${msg.auto_replied ? '✦ Auto-replied by AI' : (msg.status==='replied' ? '✅ Replied' : '🗑 Dismissed')}
      </div>`}
    </div>
  </div>`

  if (canReply && !waExpired) {
    if (!msg.ai_draft) {
      pane.querySelector('#chat-gen-draft-btn')?.addEventListener('click', () => generateChatDraft(channelType, msg._id))
      pane.querySelector('#chat-dismiss-btn-cta')?.addEventListener('click', () => dismissChatMsg(channelType, msg._id))
    } else {
      pane.querySelector('#chat-send-btn')?.addEventListener('click', () => sendChatReply(channelType, msg._id))
      pane.querySelector('#chat-regen-btn')?.addEventListener('click', () => regenChatDraft(channelType, msg._id))
      pane.querySelector('#chat-dismiss-btn')?.addEventListener('click', () => dismissChatMsg(channelType, msg._id))
    }
  } else if (canReply && waExpired) {
    pane.querySelector('#chat-dismiss-btn-exp')?.addEventListener('click', () => dismissChatMsg(channelType, msg._id))
  } else {
    pane.querySelector('#chat-dismiss-btn-replied')?.addEventListener('click', () => dismissChatMsg(channelType, msg._id))
  }
}

// Change 6: generateChatDraft
async function generateChatDraft(channelType, msgId) {
  const btn = document.getElementById('chat-gen-draft-btn')
  setBtnLoading(btn, true)
  try {
    const data = await apiFetch(`/agents/${STATE.agentId}/channels/${channelType}/messages/${msgId}/generate-draft`, { method: 'POST' })
    const msgs = STATE.chatMsgs[channelType] || []
    const msg  = msgs.find(m => m._id === msgId)
    if (msg) { msg.ai_draft = data.ai_draft; msg.draft_tokens_used = data.tokens_used }
    showToast(`Draft generated ✦ (${data.tokens_used} tokens)`, 'success')
    if (msg) renderChatReadPane(channelType, msg)
    renderChatMsgList(channelType)
    loadTokenUsage()
  } catch (e) {
    showToast('Draft generation failed: ' + e.message, 'error')
    setBtnLoading(btn, false)
  }
}

// Change 6: regenChatDraft
async function regenChatDraft(channelType, msgId) {
  const btn = document.getElementById('chat-regen-btn')
  setBtnLoading(btn, true)
  try {
    const data = await apiFetch(`/agents/${STATE.agentId}/channels/${channelType}/messages/${msgId}/generate-draft`, { method: 'POST' })
    const msgs = STATE.chatMsgs[channelType] || []
    const msg  = msgs.find(m => m._id === msgId)
    if (msg) { msg.ai_draft = data.ai_draft; msg.draft_tokens_used = data.tokens_used }
    const ta = document.getElementById('chat-reply-text')
    if (ta) {
      ta.style.transition = 'opacity .2s'; ta.style.opacity = '0'
      setTimeout(() => { ta.value = data.ai_draft || ''; ta.style.opacity = '1' }, 200)
    }
    showToast(`Regenerated ✦ (${data.tokens_used} tokens)`, 'success')
    loadTokenUsage()
  } catch (e) { showToast('Regenerate failed: ' + e.message, 'error') }
  finally { setBtnLoading(btn, false) }
}

// Change 6: sendChatReply
async function sendChatReply(channelType, msgId) {
  const textarea = document.getElementById('chat-reply-text')
  const text     = textarea?.value?.trim()
  if (!text) { showToast('Reply cannot be empty', 'error'); return }
  const btn = document.getElementById('chat-send-btn')
  setBtnLoading(btn, true)
  try {
    await apiFetch(`/agents/${STATE.agentId}/channels/${channelType}/reply/${msgId}`, {
      method: 'POST',
      body: JSON.stringify({ reply: text }),
    })
    showToast('Reply sent! ✉️', 'success')
    STATE.chatSelectedId[channelType] = null
    const rp = document.getElementById(`chat-read-${channelType}`)
    if (rp) rp.innerHTML = `<div class="read-empty"><div class="read-empty-icon">${channelType==='whatsapp'?'💬':'📸'}</div><div class="read-empty-title">Select a message</div></div>`
    STATE.chatMsgs[channelType] = (STATE.chatMsgs[channelType] || []).filter(m => m._id !== msgId)
    renderChatMsgList(channelType)
    loadPage()
  } catch (e) {
    showToast('Send failed: ' + e.message, 'error')
    setBtnLoading(btn, false)
  }
}

}

// WIRE TABS
// ══════════════════════════════════════════════════════════════════════════════
function wireSubnavOnce() {
  const subnavTabs = document.getElementById('subnavTabs')
  if (!subnavTabs || subnavTabs._wired) return
  subnavTabs._wired = true
  subnavTabs.addEventListener('click', e => {
    const btn = e.target.closest('.subnav-tab')
    if (!btn) return
    const bucket = btn.dataset.bucket
    if (bucket === STATE.bucket) return
    STATE.bucket = bucket; STATE.intent = 'all'; STATE.page = 1
    STATE.selectedId = null; STATE.searchQuery = ''
    const si = document.getElementById('searchInput')
    if (si) si.value = ''
    subnavTabs.querySelectorAll('.subnav-tab').forEach(b => b.classList.toggle('active', b===btn))
    const ifb = document.getElementById('intentFilterBar')
    if (ifb) {
      ifb.style.display = ['noise','dismissed'].includes(bucket) ? 'none' : 'flex'
      ifb.querySelectorAll('.intent-pill').forEach(p => p.classList.toggle('active', p.dataset.intent==='all'))
    }
    const rp = document.getElementById('emailReadPane')
    if (rp) rp.innerHTML = renderReadEmpty()
    clearSelection(); loadInbox()
  })
}

function wireIntentFilterOnce() {
  const ifb = document.getElementById('intentFilterBar')
  if (!ifb || ifb._wired) return
  ifb._wired = true
  ifb.addEventListener('click', e => {
    const pill = e.target.closest('.intent-pill')
    if (!pill) return
    const intent = pill.dataset.intent
    if (intent === STATE.intent) return
    STATE.intent = intent; STATE.page = 1; STATE.selectedId = null
    ifb.querySelectorAll('.intent-pill').forEach(p => p.classList.toggle('active', p===pill))
    const rp = document.getElementById('emailReadPane')
    if (rp) rp.innerHTML = renderReadEmpty()
    loadInbox()
  })
}

// LOAD INBOX
// ══════════════════════════════════════════════════════════════════════════════
async function loadInbox(page) {
  if (page !== undefined) STATE.page = page
  if (STATE.loadingInbox) return
  STATE.loadingInbox = true
  wireSubnavOnce(); wireIntentFilterOnce()

  const listPane = document.getElementById('msgListPane')
  if (listPane && page !== undefined) {
    listPane.innerHTML = renderSkeletonList()
  }

  try {
    const apiBucket   = STATE.bucket === 'sent' ? 'replied' : STATE.bucket
    const intentParam = (STATE.intent && STATE.intent !== 'all') ? `&intent=${STATE.intent}` : ''
    const searchParam = STATE.searchQuery ? `&search=${encodeURIComponent(STATE.searchQuery)}` : ''
    const url = `/agents/${STATE.agentId}/channels/gmail/inbox?bucket=${apiBucket}&page=${STATE.page}&limit=${PAGE_SIZE}${intentParam}${searchParam}`
    const data = await apiFetch(url)

    let msgs  = data.messages || []
    let total = data.total    || msgs.length

    if (STATE.bucket === 'drafts') {
      msgs  = msgs.filter(m => !!m.ai_draft)
      total = msgs.length
    }
    if (STATE.searchQuery && msgs.length) {
      const q = STATE.searchQuery.toLowerCase()
      msgs = msgs.filter(m =>
        (m.subject||'').toLowerCase().includes(q) ||
        (m.from||'').toLowerCase().includes(q) ||
        (m.body||'').toLowerCase().includes(q)
      )
      total = msgs.length
    }

    STATE.msgs = msgs; STATE.total = total
    STATE.msgMap = {}
    msgs.forEach(m => { STATE.msgMap[m._id] = m })

    const ic = data.intent_counts || {}
    ;['enquiry','order','complaint','refund','other'].forEach(k => {
      const el = document.getElementById(`ic-${k}`)
      if (el) el.textContent = ic[k] || 0
    })

    renderMsgList()
  } catch (e) {
    const pane = document.getElementById('msgListPane')
    if (pane) pane.innerHTML = `
      <div class="msg-list-empty">
        <div class="msg-list-empty-icon">😵</div>
        <div class="msg-list-empty-title">Failed to load</div>
        <div class="msg-list-empty-sub" style="color:var(--red)">${esc(e.message)}</div>
      </div>`
  } finally {
    STATE.loadingInbox = false
  }
}

async function loadBucketCounts() {
  const bucketMap = { inbox:'inbox', sent:'replied', noise:'noise', dismissed:'dismissed' }
  const tasks = Object.entries(bucketMap).map(async ([key, apiBucket]) => {
    try {
      const data = await apiFetch(`/agents/${STATE.agentId}/channels/gmail/inbox?bucket=${apiBucket}&page=1&limit=1`)
      BUCKET_COUNTS[key] = data.total || 0
      const el = document.getElementById(`snt-${key}`)
      if (el) {
        const oldVal = el.textContent
        const newVal = String(data.total || 0)
        if (oldVal !== newVal) {
          el.textContent = newVal
          el.classList.add('bump')
          setTimeout(() => el.classList.remove('bump'), 400)
        }
      }
    } catch {}
  })
  await Promise.allSettled(tasks)
  try {
    const data = await apiFetch(`/agents/${STATE.agentId}/channels/gmail/inbox?bucket=inbox&page=1&limit=200`)
    const draftCount = (data.messages||[]).filter(m => !!m.ai_draft).length
    BUCKET_COUNTS.drafts = draftCount
    const el = document.getElementById('snt-drafts')
    if (el) el.textContent = draftCount
  } catch {}
  const ptBadge = document.getElementById('pt-badge-email')
  if (ptBadge) ptBadge.textContent = BUCKET_COUNTS.inbox || 0
  const nm = document.getElementById('m-noise')
  if (nm && nm.querySelector('.dots-loader')) animateValue(nm, BUCKET_COUNTS.noise || 0)
}

async function loadTokenUsage() {
  try {
    const data    = await apiFetch(`/agents/${STATE.agentId}/channels/token-usage`)
    const summary = data.summary || {}
    const total   = data.total_tokens_30d || 0
    const classify = summary['channel_classify']?.tokens || 0
    const draft    = summary['channel_draft']?.tokens    || 0
    const autoSent = summary['channel_auto_reply']?.calls || 0
    const calls    = (summary['channel_classify']?.calls||0) + (summary['channel_draft']?.calls||0)
    const fmt = n => n>=1000 ? (n/1000).toFixed(1)+'K' : String(n)
    const chip = document.getElementById('tokenChip')
    const val  = document.getElementById('tokenChipVal')
    if (val)  val.textContent  = fmt(total)+' tokens'
    if (chip && total>0) chip.classList.add('loaded')
    const set = (id, v) => {
      const el = document.getElementById(id)
      if (el) { el.textContent = v; el.style.color = 'var(--accent)'; setTimeout(() => el.style.color = '', 600) }
    }
    set('tu-classify', fmt(classify)); set('tu-draft', fmt(draft))
    set('tu-total', fmt(total)); set('tu-calls', calls); set('tu-auto', autoSent||'0')
    STATE.tokenUsage = summary
  } catch {}
}

// BULK ACTIONS
// ══════════════════════════════════════════════════════════════════════════════
function updateBulkBar() {
  const bar = document.getElementById('bulkBar'), cnt = document.getElementById('bulkCount')
  const n = STATE.selectedMsgIds.size
  if (!bar) return
  bar.classList.toggle('visible', n>0)
  if (cnt) cnt.textContent = `${n} selected`
}
function clearSelection() {
  STATE.selectedMsgIds.clear()
  document.querySelectorAll('.msg-checkbox').forEach(cb => { cb.checked = false })
  updateBulkBar()
}
async function bulkGenerateDrafts() {
  const ids = [...STATE.selectedMsgIds]
  if (!ids.length) return
  showToast(`Generating drafts for ${ids.length} emails…`, 'info')
  let done = 0
  for (const id of ids) {
    try {
      const data = await apiFetch(`/agents/${STATE.agentId}/channels/gmail/messages/${id}/generate-draft`, { method:'POST' })
      if (STATE.msgMap[id]) { STATE.msgMap[id].ai_draft = data.ai_draft; STATE.msgMap[id].draft_tokens_used = data.tokens_used }
      done++
    } catch {}
  }
  showToast(`Generated ${done}/${ids.length} drafts`, 'success')
  clearSelection(); loadInbox(); loadBucketCounts(); loadTokenUsage()
}
async function bulkDismiss() {
  const ids = [...STATE.selectedMsgIds]
  if (!ids.length) return
  if (!confirm(`Dismiss ${ids.length} emails?`)) return
  let done = 0
  for (const id of ids) {
    try {
      await apiFetch(`/agents/${STATE.agentId}/channels/gmail/messages/${id}/dismiss`, { method:'PUT' })
      STATE.msgs = STATE.msgs.filter(m => m._id!==id); STATE.total = Math.max(0, STATE.total-1)
      delete STATE.msgMap[id]; done++
    } catch {}
  }
  showToast(`Dismissed ${done} emails`, 'info')
  clearSelection(); renderMsgList(); loadBucketCounts()
}
function toggleCheck(msgId, checked) {
  if (checked) STATE.selectedMsgIds.add(msgId)
  else STATE.selectedMsgIds.delete(msgId)
  updateBulkBar()
}

// AVATAR HELPERS

const AVATAR_COLORS = [
  'linear-gradient(135deg,#6366f1,#8b5cf6)',
  'linear-gradient(135deg,#0ea5e9,#6366f1)',
  'linear-gradient(135deg,#f59e0b,#ef4444)',
  'linear-gradient(135deg,#10b981,#0ea5e9)',
  'linear-gradient(135deg,#ec4899,#8b5cf6)',
  'linear-gradient(135deg,#14b8a6,#6366f1)',
  'linear-gradient(135deg,#f97316,#ec4899)',
]
function avatarColor(str) {
  let h = 0
  for (const c of String(str||'')) h = (h*31 + c.charCodeAt(0)) & 0xffffffff
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length]
}

// RENDER MESSAGE LIST
// ══════════════════════════════════════════════════════════════════════════════
function renderMsgList() {
  const pane = document.getElementById('msgListPane')
  if (!pane) return
  if (!STATE.msgs.length) {
    const EMPTY_COPY = {
      inbox:{ icon:'📭',title:'Inbox is clear',sub:'All caught up! Sync to check for new emails.' },
      drafts:{ icon:'✦',title:'No AI drafts ready',sub:'Open a message and click Generate Reply' },
      sent:{ icon:'✅',title:'No sent replies yet',sub:'Sent replies will appear here' },
      noise:{ icon:'🔕',title:'No noise filtered',sub:'Transactional & promotional emails appear here' },
      dismissed:{ icon:'🗑',title:'Nothing dismissed',sub:'' },
    }
    const copyKey = STATE.searchQuery ? 'inbox' : STATE.bucket
    const e = EMPTY_COPY[copyKey] || EMPTY_COPY.inbox
    pane.innerHTML = `
      <div class="msg-list-empty">
        <div class="msg-list-empty-icon">${e.icon}</div>
        <div class="msg-list-empty-title">${STATE.searchQuery ? 'No results found' : e.title}</div>
        <div class="msg-list-empty-sub">${STATE.searchQuery ? `No emails match "${esc(STATE.searchQuery)}"` : e.sub}</div>
      </div>`
    return
  }

  const listHTML = STATE.msgs.map((msg, idx) => {
    const from    = parseFrom(msg.from)
    const name    = from.name || from.email || 'Unknown'
    const init    = (name[0]||'?').toUpperCase()
    const bg      = avatarColor(name)
    const time    = fmtRelTime(msg.created_at)
    const snippet = cleanBody(msg.body, 120)
    const subject = msg.subject || '(no subject)'
    const sel     = STATE.selectedId === msg._id
    const cfg     = INTENT_CFG[msg.intent] || INTENT_CFG.other
    const isNoise = msg.status === 'noise'
    const checked = STATE.selectedMsgIds.has(msg._id)
    const canSel  = !['noise','dismissed'].includes(STATE.bucket)
    const threadCount = (msg.thread_history || []).length

    return `
    <div class="msg-row ${sel?'selected':''} ${isNoise?'noise-row':''}" data-msgid="${esc(msg._id)}"
         style="animation-delay:${idx * 30}ms">
      ${canSel ? `<input class="msg-checkbox" type="checkbox" ${checked?'checked':''} data-chk="${esc(msg._id)}" onclick="event.stopPropagation();toggleCheck('${esc(msg._id)}',this.checked)">` : ''}
      <div class="msg-avatar" style="background:${bg}">${init}</div>
      <div class="msg-right">
        <div class="msg-row-top">
          <div class="msg-from-name">${esc(name)}</div>
          <div class="msg-time">${time}</div>
        </div>
        <div class="msg-subj">${esc(subject)}</div>
        <div class="msg-snippet">${esc(snippet)}</div>
        <div class="msg-badges">
          <span class="badge-pill ${cfg.cls}">${cfg.emoji} ${cfg.label}</span>
          ${threadCount > 0 ? `<span class="badge-pill bp-other">💬 ${threadCount+1} msgs</span>` : ''}
          ${msg.ai_draft ? `<span class="badge-pill" style="background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)">✦ Draft ready</span>` : ''}
          ${msg.status==='replied'&&msg.auto_replied ? `<span class="badge-pill bp-auto-replied">✦ Auto-replied</span>` : ''}
          ${msg.status==='replied'&&!msg.auto_replied ? `<span class="badge-pill" style="background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)">✅ Replied</span>` : ''}
        </div>
      </div>
    </div>`
  }).join('')

  const totalPages = Math.ceil(STATE.total / PAGE_SIZE)
  const paginHTML  = totalPages > 1 ? renderPagination(totalPages) : ''
  pane.innerHTML   = listHTML + paginHTML

  pane.querySelectorAll('.msg-row').forEach((row, i) => {
    row.classList.add('entering')
    setTimeout(() => row.classList.remove('entering'), 300 + i*30)
  })

  pane.addEventListener('click', e => {
    const row = e.target.closest('.msg-row[data-msgid]')
    if (!row || e.target.classList.contains('msg-checkbox')) return
    const msg = STATE.msgMap[row.dataset.msgid]
    if (!msg || STATE.selectedId === row.dataset.msgid) return
    STATE.selectedId = row.dataset.msgid
    pane.querySelectorAll('.msg-row').forEach(r => {
      r.classList.toggle('selected', r.dataset.msgid===STATE.selectedId)
      const nameEl = r.querySelector('.msg-from-name')
      if (nameEl) nameEl.style.color = r.classList.contains('selected') ? 'var(--accent)' : ''
    })
    renderReadPane(msg)
  })
}

function renderPagination(totalPages) {
  const start = (STATE.page-1)*PAGE_SIZE+1
  const end   = Math.min(STATE.page*PAGE_SIZE, STATE.total)
  let btns = ''
  btns += `<button class="pg-btn" onclick="loadInbox(${STATE.page-1})" ${STATE.page<=1?'disabled':''}>←</button>`
  let lo = Math.max(1, STATE.page-2), hi = Math.min(totalPages, lo+4)
  lo = Math.max(1, hi-4)
  for (let p=lo; p<=hi; p++)
    btns += `<button class="pg-btn ${p===STATE.page?'active':''}" onclick="loadInbox(${p})">${p}</button>`
  btns += `<button class="pg-btn" onclick="loadInbox(${STATE.page+1})" ${STATE.page>=totalPages?'disabled':''}>→</button>`
  return `<div class="pagination-bar"><span class="pagination-info">${start}–${end} of ${STATE.total}</span><div class="pagination-btns">${btns}</div></div>`
}

// READING PANE WITH FULL CONVERSATION THREAD
// ══════════════════════════════════════════════════════════════════════════════
function renderReadPane(msg) {
  const pane = document.getElementById('emailReadPane')
  if (!pane) return

  const from     = parseFrom(msg.from)
  const name     = from.name || from.email || 'Unknown'
  const init     = (name[0]||'?').toUpperCase()
  const bg       = avatarColor(name)
  const cfg      = INTENT_CFG[msg.intent] || INTENT_CFG.other
  const canReply = msg.status === 'inbox'
  const isNoise  = msg.status === 'noise'

  pane.innerHTML = `
  <div class="email-read-header">
    <div class="email-read-subject">${esc(msg.subject || '(no subject)')}</div>
    <div class="email-read-meta">
      <div class="email-read-avatar" style="background:${bg}">${init}</div>
      <div class="email-read-from-wrap">
        <div class="email-read-from-name">${esc(name)}</div>
        <div class="email-read-from-email">${esc(from.email)}</div>
      </div>
      <div class="email-read-timestamp">${fmtRelTime(msg.created_at)}</div>
    </div>
    <div class="email-status-row">
      <span class="badge-pill ${cfg.cls}">${cfg.emoji} ${cfg.label}</span>
      ${msg.intent_source==='pre_filter' ? `<span class="badge-pill bp-other">🔕 auto-filtered</span>` : ''}
      ${msg.intent_source==='ai_classify'||msg.intent_source==='ai_draft' ? `<span class="badge-pill" style="background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)">✦ AI classified</span>` : ''}
      ${msg.auto_replied ? `<span class="badge-pill bp-auto-replied">✦ Auto-replied</span>` : ''}
      ${msg.draft_tokens_used ? `<span class="token-chip loaded">⚡ ${msg.draft_tokens_used} tokens</span>` : ''}
    </div>
  </div>

  <div class="conversation-panel" id="convPanel">
    ${renderConversationFromCache(msg)}
  </div>

  <div class="email-reply-composer">
    <div class="reply-composer-inner">
      ${canReply ? renderComposer(msg) : renderNonActionableFooter(msg, isNoise)}
    </div>
  </div>`

  if (canReply) {
    if (!msg.ai_draft) {
      pane.querySelector('#generateDraftBtn')?.addEventListener('click', () => generateDraft(msg._id))
      pane.querySelector('#dismissBtnCta')  ?.addEventListener('click', () => dismissMsg(msg._id))
    } else {
      pane.querySelector('#sendReplyBtn')?.addEventListener('click', () => sendReply(msg._id))
      pane.querySelector('#regenBtn')    ?.addEventListener('click', () => regenerateDraft(msg._id))
      pane.querySelector('#dismissBtn')  ?.addEventListener('click', () => dismissMsg(msg._id))
    }
  } else if (isNoise) {
    pane.querySelector('#moveToInboxBtn')?.addEventListener('click', () => moveToInbox(msg._id))
  } else {
    pane.querySelector('#toggleSentBtn')?.addEventListener('click', () => {
      const w = document.getElementById('sentWrap')
      if (w) w.style.display = w.style.display==='none' ? 'block' : 'none'
    })
  }

  requestAnimationFrame(() => {
    const panel = document.getElementById('convPanel')
    if (panel) panel.scrollTop = panel.scrollHeight
  })

  fetchAndRenderThread(msg)
}

function renderConversationFromCache(msg) {
  if (STATE.threadCache[msg._id]) {
    return renderThreadMessages(STATE.threadCache[msg._id], msg)
  }
  const allMessages = []
  if (msg.thread_history && msg.thread_history.length > 0) {
    msg.thread_history.forEach(h => {
      allMessages.push({
        direction: h.direction,
        from:      h.direction === 'sent' ? (STATE.channelEmail || 'You') : (h.from || msg.from),
        body:      h.body || '',
        date:      h.created_at,
        isAi:      false,
      })
    })
  }
  allMessages.push({
    direction: 'recv', from: msg.from, body: msg.body || '',
    date: msg.created_at, isCurrent: true,
  })
  if (msg.reply_sent) {
    allMessages.push({
      direction: 'sent', from: STATE.channelEmail || 'You',
      body: msg.reply_sent, date: msg.replied_at || msg.updated_at, isAi: msg.auto_replied,
    })
  }
  return allMessages.map((m, i) => renderSingleMessage(m, i, allMessages.length)).join('')
}

function renderThreadMessages(threadMsgs, currentMsg) {
  if (!threadMsgs || !threadMsgs.length) {
    return renderSingleMessage({
      direction: 'recv', from: currentMsg.from,
      body: currentMsg.body || '', date: currentMsg.created_at, isCurrent: true,
    }, 0, 1)
  }
  return threadMsgs.map((m, i) => {
    const isCurrent = m.gmail_message_id === currentMsg.channel_message_id
    return renderSingleMessage({
      direction: m.direction,
      from:      m.from || (m.direction==='sent' ? STATE.channelEmail : currentMsg.from),
      body:      m.body || '',
      date:      m.date || m.internalDate,
      isCurrent, snippet: m.snippet,
    }, i, threadMsgs.length)
  }).join('')
}

function renderSingleMessage(m, index, total) {
  const isLast   = index === total - 1
  const isSent   = m.direction === 'sent'
  const fromParsed = parseFrom(m.from || '')
  const fromName   = fromParsed.name || fromParsed.email || (isSent ? 'You' : 'Customer')
  const fromEmail  = fromParsed.email || ''
  const body       = cleanBodyFull(m.body || '')
  const time       = m.date ? fmtRelTime(m.date) : ''
  const shouldCollapse = !isLast && index < total - 2 && body.length > 200

  return `
  <div class="conv-message direction-${isSent?'sent':'recv'}" style="animation-delay:${index*40}ms">
    <div class="conv-message-header">
      <span class="conv-dir-chip ${isSent?'sent':'recv'}">${isSent?'↑ Sent':'↓ Received'}</span>
      <span class="conv-from" title="${esc(fromEmail)}">${esc(fromName)}${fromEmail && fromName !== fromEmail ? ` <span style="opacity:.6;font-weight:400">&lt;${esc(fromEmail)}&gt;</span>` : ''}</span>
      ${m.isAi ? `<span class="conv-ai-label">✦ AI Reply</span>` : ''}
      ${m.isCurrent ? `<span class="conv-ai-label" style="background:var(--accent-dim);color:var(--accent)">● Current</span>` : ''}
      <span class="conv-time">${time}</span>
    </div>
    <div class="conv-body ${shouldCollapse?'collapsed':''}" id="conv-body-${index}">${formatBody(body)}</div>
    ${shouldCollapse ? `<button class="conv-expand-btn" onclick="expandMsg(${index})">▾ Show full message</button>` : ''}
  </div>`
}

function expandMsg(index) {
  const body = document.getElementById(`conv-body-${index}`)
  const btn  = body?.nextElementSibling
  if (body) body.classList.remove('collapsed')
  if (btn)  btn.remove()
}

async function fetchAndRenderThread(msg) {
  const convPanel = document.getElementById('convPanel')
  if (!convPanel) return
  if (STATE.threadCache[msg._id]) return

  const loadingBar = document.createElement('div')
  loadingBar.className = 'thread-fetch-bar'
  loadingBar.innerHTML = `<div class="thread-fetch-spinner"></div><span class="thread-fetch-label">Loading full conversation…</span>`
  convPanel.insertBefore(loadingBar, convPanel.firstChild)

  try {
    const data = await apiFetch(`/agents/${STATE.agentId}/channels/gmail/messages/${msg._id}/thread`)
    const threadMsgs = data.messages || []
    STATE.threadCache[msg._id] = threadMsgs
    if (STATE.selectedId === msg._id) {
      const panel = document.getElementById('convPanel')
      if (panel) {
        panel.innerHTML = renderThreadMessages(threadMsgs, msg)
        panel.scrollTop = panel.scrollHeight
      }
    }
  } catch (e) {
    const loadingEl = document.querySelector('.thread-fetch-bar')
    if (loadingEl) loadingEl.remove()
  }
}

function setBtnLoading(btn, loading, originalHTML) {
  if (!btn) return
  if (loading) {
    btn.disabled = true
    btn.dataset.originalHtml = btn.innerHTML
    btn.innerHTML = `<span class="spin-ring"></span>`
  } else {
    btn.disabled = false
    btn.innerHTML = originalHTML || btn.dataset.originalHtml || btn.innerHTML
  }
}

async function generateDraft(msgId) {
  const btn = document.getElementById('generateDraftBtn')
  setBtnLoading(btn, true)
  try {
    const data = await apiFetch(`/agents/${STATE.agentId}/channels/gmail/messages/${msgId}/generate-draft`, { method:'POST' })
    if (STATE.msgMap[msgId]) {
      STATE.msgMap[msgId].ai_draft = data.ai_draft
      STATE.msgMap[msgId].draft_tokens_used = data.tokens_used
      STATE.msgMap[msgId].intent_source = 'ai_draft'
    }
    showToast(`Draft generated ✦ (${data.tokens_used} tokens)`, 'success')
    renderReadPane(STATE.msgMap[msgId])
    renderMsgList(); loadTokenUsage(); loadBucketCounts()
  } catch (e) {
    showToast('Draft generation failed: ' + e.message, 'error')
    setBtnLoading(btn, false)
  }
}

async function regenerateDraft(msgId) {
  const btn = document.getElementById('regenBtn')
  setBtnLoading(btn, true)
  try {
    const data = await apiFetch(`/agents/${STATE.agentId}/channels/gmail/messages/${msgId}/generate-draft`, { method:'POST' })
    if (STATE.msgMap[msgId]) { STATE.msgMap[msgId].ai_draft=data.ai_draft; STATE.msgMap[msgId].draft_tokens_used=data.tokens_used }

async function sendReply(msgId) {

  const bcc = document.getElementById('replyBcc')?.value?.trim() || ''

      method:'POST',

function closeCompose() {

function toggleCcBcc() {
  const ccField  = document.getElementById('composeCcField')
  const bccField = document.getElementById('composeBccField')

  bccField.style.display = bothHidden ? 'block' : 'none'

async function sendCompose() {
  const to      = document.getElementById('composeTo')?.value?.trim()
  const subject = document.getElementById('composeSubject')?.value?.trim()
  const body    = document.getElementById('composeBody')?.value?.trim()
  const cc      = document.getElementById('composeCc')?.value?.trim()
  const bcc     = document.getElementById('composeBcc')?.value?.trim()

    await apiFetch(`/agents/${STATE.agentId}/channels/gmail/compose`, {

async function disconnectGmail() {
  if (!confirm('Disconnect Gmail? The agent will stop processing emails.')) return
  showSyncProgress()
  try {
    await apiFetch(`/agents/${STATE.agentId}/channels/gmail`, { method:'DELETE' })
    showToast('Gmail disconnected', 'info')
    STATE.channelEmail = null; STATE.threadCache = {}
    await loadPage()
  } catch (e) { showToast(e.message, 'error') }
  finally { hideSyncProgress() }
}

async function syncGmail(btn) {
  if (btn) btn.classList?.add('spinning')
  showSyncProgress()

  const inboxWrap = document.getElementById('inboxWrap')
  let overlay = null
  if (inboxWrap) {
    overlay = document.createElement('div')
    overlay.className = 'inbox-loading-overlay'
    overlay.innerHTML = `
      <div class="spin-ring spin-ring-dark" style="width:28px;height:28px;border-width:3px"></div>
      <div class="inbox-loading-text">Syncing emails…</div>
      <div class="dots-loader"><span></span><span></span><span></span></div>
    `
    inboxWrap.appendChild(overlay)
  }

  try {
    const data = await apiFetch(`/agents/${STATE.agentId}/channels/gmail/sync`, { method:'POST' })
    const sinceMsg = data.synced_since ? ` (since ${new Date(data.synced_since).toLocaleDateString()})` : ''
    showToast(`Synced ${data.synced||0} new email(s) — ${data.noise_filtered||0} auto-filtered${sinceMsg}`, 'success')
    STATE.page = 1; STATE.threadCache = {}
    await loadInbox(); await loadBucketCounts(); await loadMetrics()
    const ptBadge = document.getElementById('pt-badge-email')
    if (ptBadge) ptBadge.textContent = data.inbox_count || BUCKET_COUNTS.inbox || 0
    const mInbox = document.getElementById('m-inbox')
    if (mInbox) animateValue(mInbox, data.inbox_count || 0)
  } catch (e) { showToast('Sync failed: ' + e.message, 'error') }
  finally {
    if (btn) { btn.classList?.remove('spinning'); btn.disabled = false }
    if (overlay) {
      overlay.style.transition = 'opacity .3s'
      overlay.style.opacity = '0'
      setTimeout(() => overlay.remove(), 300)
    }
    hideSyncProgress()
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// EMAIL BODY HELPERS
// ══════════════════════════════════════════════════════════════════════════════
const HTML_ENTITIES = {
  '&nbsp;':' ','&amp;':'&','&lt;':'<','&gt;':'>','&quot;':'"','&#39;':"'",
  '&zwnj;':'','&zwj;':'','&lrm;':'','&rlm;':'','&ensp;':' ','&emsp;':' ',
  '&thinsp;':' ','&mdash;':'—','&ndash;':'–','&hellip;':'…','&trade;':'™',
  '&copy;':'©','&reg;':'®','&bull;':'•',
}
function decodeEntities(str) {
  return str
    .replace(/&#(\d+);/g, (_, n) => String.fromCharCode(Number(n)))
    .replace(/&#x([0-9a-f]+);/gi, (_, h) => String.fromCharCode(parseInt(h,16)))
    .replace(/&[a-z]+;/gi, m => HTML_ENTITIES[m.toLowerCase()] ?? m)
}
function cleanBody(raw, maxLen) {
  if (!raw) return ''
  let text = raw
  if (text.trim().startsWith('{')) { try { const p=JSON.parse(text); text=p.body||p.text||p.content||text } catch {} }
  text = text
    .replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
    .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
    .replace(/<[^>]+>/g,' ')
    .replace(/https?:\/\/[^\s\])"]+/g,'')
    .replace(/\\n/g,'\n').replace(/\\r/g,'').replace(/\\t/g,' ')
  text = decodeEntities(text)
  text = text.replace(/[ \t]+/g,' ').replace(/\n{3,}/g,'\n\n').trim()
  if (maxLen && text.length > maxLen) return text.slice(0, maxLen).trimEnd()+'…'
  return text
}
function cleanBodyFull(raw) {
  if (!raw) return ''
  let text = raw
  if (text.trim().startsWith('{')) { try { const p=JSON.parse(text); text=p.body||p.text||p.content||text } catch {} }
  text = text
    .replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
    .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
    .replace(/<br\s*\/?>/gi,'\n').replace(/<\/p>/gi,'\n\n')
    .replace(/<\/div>/gi,'\n').replace(/<\/li>/gi,'\n').replace(/<[^>]+>/g,'')
    .replace(/\\n/g,'\n').replace(/\\r/g,'').replace(/\\t/g,' ')
  text = decodeEntities(text)
  text = text.replace(/[ \t]+/g,' ').replace(/\n{4,}/g,'\n\n\n').trim()
  return text
}
function formatBody(text) {
  if (!text) return '<span style="color:var(--text-3);font-style:italic">No message content</span>'
  const lines = text.split('\n')
  let result = '', inQuote = false
  for (const line of lines) {
    const trimmed = line.trim()
    const isQ = trimmed.startsWith('>') ||
      /^(On .+ wrote:|From:|Sent:|To:|Subject:|--{2,}|-{3,}|_{3,}|={3,})/.test(trimmed)
    if (isQ && !inQuote) { inQuote=true; result+=`<hr style="border:none;border-top:1px dashed var(--border);margin:12px 0"><div style="opacity:.5;font-size:12px;color:var(--text-3)">` }
    if (!isQ && inQuote) { inQuote=false; result+='</div>' }
    result += esc(isQ ? trimmed.replace(/^>+ ?/,'') : line) + '\n'
  }
  if (inQuote) result += '</div>'
  return result || '<span style="color:var(--text-3);font-style:italic">No message content</span>'
}

// ══════════════════════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════════════════════
function parseFrom(from) {
  if (!from) return { name:'', email:'' }
  const m = from.match(/^(.*?)\s*<(.+?)>$/)
  if (m) return { name: m[1].replace(/^["']|["']$/g,'').trim(), email: m[2].trim() }
  return { name:'', email: from.trim() }
}
function fmtRelTime(ts) {
  if (!ts) return ''
  const d = new Date(ts), now = new Date(), diff = Math.floor((now-d)/1000)
  if (diff < 60) return 'just now'
  if (diff < 3600) return Math.floor(diff/60)+'m ago'
  if (diff < 86400) return Math.floor(diff/3600)+'h ago'
  if (diff < 604800) return Math.floor(diff/86400)+'d ago'
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})
}
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ══════════════════════════════════════════════════════════════════════════════
// TOASTS
// ══════════════════════════════════════════════════════════════════════════════
function showToast(msg, type='info', duration=4000) {
  const wrap = document.getElementById('toastWrap')
  const el   = document.createElement('div')
  el.className = `toast-item toast-${type}`
  el.innerHTML = `<span style="flex:1">${esc(msg)}</span>`
  const prog = document.createElement('div')
  prog.className = 'toast-progress'
  prog.style.animationDuration = duration + 'ms'
  el.appendChild(prog)
  el.addEventListener('click', () => removeToast(el))
  wrap.appendChild(el)
  const timer = setTimeout(() => removeToast(el), duration)
  el._timer = timer
}
function removeToast(el) {
  clearTimeout(el._timer)
  el.classList.add('removing')
  setTimeout(() => el.remove(), 260)
}

}
