<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>My Agents — SupportGent</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(300px,100%),1fr));gap:14px}
.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:border-color .18s var(--ease),transform .18s var(--ease),box-shadow .18s var(--ease);cursor:pointer;box-shadow:var(--sh-sm);animation:cardIn .3s var(--ease) both}
.agent-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--sh),0 0 0 1px var(--accent-dim)}
.agent-card:nth-child(1){animation-delay:.04s}.agent-card:nth-child(2){animation-delay:.08s}.agent-card:nth-child(3){animation-delay:.12s}.agent-card:nth-child(4){animation-delay:.16s}.agent-card:nth-child(5){animation-delay:.20s}.agent-card:nth-child(6){animation-delay:.24s}
.ac-stripe{height:3px;width:100%;display:block}
.ac-header{display:flex;align-items:center;gap:11px;padding:14px 16px 10px}
.ac-logo{width:40px;height:40px;border-radius:11px;flex-shrink:0;border:1px solid var(--border-md);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;letter-spacing:-.03em;color:white;overflow:hidden}
.ac-logo img{width:100%;height:100%;object-fit:contain;padding:3px}
.ac-header-info{flex:1;min-width:0}
.ac-name{font-size:13.5px;font-weight:700;color:var(--text);letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px;margin-bottom:2px}
.ac-slug{font-size:10.5px;color:var(--text-3);font-family:var(--mono)}
.ac-kpis{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.ac-kpi{padding:9px 6px;text-align:center;border-right:1px solid var(--border);transition:background .12s}
.ac-kpi:last-child{border-right:none}
.ac-kpi:hover{background:var(--surface-2)}
.ac-kpi-val{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1;margin-bottom:3px}
.ac-kpi-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text-3)}
.ac-footer{display:flex;gap:7px;padding:10px 14px}
.create-card{background:var(--surface);border:2px dashed var(--border-md);border-radius:var(--r-lg);padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;text-align:center;min-height:190px;transition:all .2s;box-shadow:var(--sh-sm)}
.create-card:hover{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-2px)}
.create-card-icon{width:48px;height:48px;border-radius:14px;background:var(--accent-dim);border:1px solid rgba(124,111,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:2px}
.create-card-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.create-card-sub{font-size:12px;color:var(--text-3)}
/* Type picker */
.type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:4px}
.type-opt{padding:11px 12px;border:1px solid var(--border-md);border-radius:var(--r-sm);cursor:pointer;transition:var(--t);background:var(--surface-2);display:flex;gap:10px;align-items:flex-start}
.type-opt:hover{border-color:var(--accent);background:var(--accent-dim)}
.type-opt.active{border-color:var(--accent);background:var(--accent-dim)}
.type-opt-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.type-opt-name{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:2px;letter-spacing:-.02em}
.type-opt-sub{font-size:11px;color:var(--text-3);line-height:1.4}
</style>
</head>
<body>
<div id="page-skeleton">
  <div class="skel-topbar"><div class="skel" style="height:14px;width:120px;border-radius:6px"></div><div class="skel" style="height:30px;width:100px;border-radius:8px"></div></div>
  <div class="skel-body">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">
      <div class="skel" style="height:190px;border-radius:18px"></div>
      <div class="skel" style="height:190px;border-radius:18px"></div>
      <div class="skel" style="height:190px;border-radius:18px"></div>
    </div>
  </div>
</div>

<div class="mobile-topbar">
  <div class="mob-left"><button class="hamburger" id="mob-menu-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><a href="home.html" class="mob-logo">Support<span>Gent</span></a></div>
  <div class="mob-right"><button class="theme-toggle"></button></div>
</div>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>
<aside class="sidebar" id="sidebar"></aside>

<div class="main-wrap">
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="topbar-title">My Agents</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:1px;" id="agents-sub">Loading…</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="theme-toggle"></button>
      <button class="btn btn-primary btn-sm" onclick="openCreate()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Agent
      </button>
    </div>
  </div>
  <div class="content" id="main-content" style="display:none;">
    <div class="agents-grid" id="agents-grid"></div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <div><div class="modal-title">Create Agent</div><div class="modal-sub">Choose a type and give it a name to get started.</div></div>
      <button class="modal-close" onclick="closeCreate()">✕</button>
    </div>
    <div class="field"><label>Agent Name *</label><input type="text" id="cm-name" class="" style="width:100%;font-family:var(--font);font-size:13px;height:40px;padding:0 12px;border-radius:var(--r-sm);border:1px solid var(--border-md);background:var(--surface-2);color:var(--text);outline:none;transition:var(--t)" placeholder="e.g. Support Bot, Sales Agent, FAQ Bot" autofocus/></div>
    <div class="field">
      <label>Agent Type</label>
      <div class="type-grid" id="type-grid">
        <div class="type-opt active" data-type="support" onclick="selectType('support',this)"><div class="type-opt-icon">🎧</div><div><div class="type-opt-name">Support</div><div class="type-opt-sub">Handle customer queries</div></div></div>
        <div class="type-opt" data-type="sales" onclick="selectType('sales',this)"><div class="type-opt-icon">🛒</div><div><div class="type-opt-name">Sales</div><div class="type-opt-sub">Sell products via chat</div></div></div>
        <div class="type-opt" data-type="faq" onclick="selectType('faq',this)"><div class="type-opt-icon">❓</div><div><div class="type-opt-name">FAQ Bot</div><div class="type-opt-sub">Answer common questions</div></div></div>
        <div class="type-opt" data-type="general" onclick="selectType('general',this)"><div class="type-opt-icon">🤖</div><div><div class="type-opt-name">General</div><div class="type-opt-sub">Flexible assistant</div></div></div>
      </div>
    </div>
    <div class="field" style="margin-bottom:0;">
      <label>Brand Color</label>
      <div class="color-palette" id="cm-palette">
        <div class="color-swatch active" style="background:#6C5FF5;" onclick="cmColor('#6C5FF5',this)"></div>
        <div class="color-swatch" style="background:#F26B6B;" onclick="cmColor('#F26B6B',this)"></div>
        <div class="color-swatch" style="background:#2DD4A0;" onclick="cmColor('#2DD4A0',this)"></div>
        <div class="color-swatch" style="background:#F5A523;" onclick="cmColor('#F5A523',this)"></div>
        <div class="color-swatch" style="background:#60A5FA;" onclick="cmColor('#60A5FA',this)"></div>
        <div class="color-swatch" style="background:#EC4899;" onclick="cmColor('#EC4899',this)"></div>
        <div class="color-swatch" style="background:#A78BFA;" onclick="cmColor('#A78BFA',this)"></div>
        <div class="color-swatch" style="background:#14B8A6;" onclick="cmColor('#14B8A6',this)"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeCreate()">Cancel</button>
      <button class="btn btn-primary" onclick="createAgent()" id="cm-btn">Create Agent →</button>
    </div>
  </div>
</div>

<script src="api.js"></script><script src="nav.js"></script>
<script>
let _cmColor = '#6C5FF5', _cmType = 'support'
const PROMPTS = {
  support: 'You are a helpful customer support agent for {name}. Answer only from the provided knowledge base. Be empathetic, friendly, and concise. If you cannot find the answer, politely direct the user to contact support directly.',
  sales:   'You are a knowledgeable sales assistant for {name}. Help customers find the right products, answer questions about pricing and availability, and guide them towards purchase. Be enthusiastic, helpful, and honest.',
  faq:     'You are a friendly FAQ bot for {name}. Answer customer questions strictly from the knowledge base. Be concise and clear. If a question is not covered, politely say so and suggest contacting the team.',
  general: 'You are a helpful AI assistant for {name}. Answer questions from the provided knowledge base. Be friendly, accurate, and concise.',
}

;(async () => {
  const { user } = await initNav('agents')
  if (!user) return
  try { await loadAgents(user) } catch(e) { toast(e.message, 'error') }
  dismissSkeleton()
})()

async function loadAgents(user) {
  const agents = await apiFetch('/agents')
  const planLimits = { starter:3, grower:10, enterprise:Infinity }
  const limit = planLimits[user?.plan || 'starter'] || 3
  document.getElementById('agents-sub').textContent = `${agents.length} of ${limit === Infinity ? '∞' : limit} agents`
  document.getElementById('main-content').style.display = 'block'
  const grid = document.getElementById('agents-grid')

  if (!agents.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;"><div class="empty-state"><div class="empty-icon-wrap">🤖</div><h3>No agents yet</h3><p>Create your first AI agent to start handling customer queries, showcase products, and process orders via chat.</p><button class="btn btn-primary btn-lg" onclick="openCreate()">Create Your First Agent</button></div></div>`
    return
  }
  grid.innerHTML = agents.map(a => `
    <div class="agent-card" onclick="location.href='agent.html?id=${a._id}'">
      <div class="ac-stripe" style="background:${a.brand_color || '#6C5FF5'}"></div>
      <div class="ac-header">
        <div class="ac-logo" style="background:${a.brand_color || '#6C5FF5'}">
          ${a.logo_base64 ? `<img src="${a.logo_base64}" alt=""/>` : (a.name?.[0]?.toUpperCase() || 'A')}
        </div>
        <div class="ac-header-info">
          <div class="ac-name">
            ${a.name}
            <span class="status-badge ${a.published ? 'badge-live' : 'badge-draft'}">${a.published ? 'Live' : 'Draft'}</span>
          </div>
          <div class="ac-slug">/${a.slug || '—'}</div>
        </div>
      </div>
      <div class="ac-kpis">
        <div class="ac-kpi"><div class="ac-kpi-val">${fmtNum(a.query_count||0)}</div><div class="ac-kpi-label">Chats</div></div>
        <div class="ac-kpi"><div class="ac-kpi-val">${fmtNum(a.sources_count||0)}</div><div class="ac-kpi-label">Sources</div></div>
        <div class="ac-kpi"><div class="ac-kpi-val">${fmtNum(a.products_count||0)||'—'}</div><div class="ac-kpi-label">Products</div></div>
      </div>
      <div class="ac-footer">
        <a class="btn btn-secondary btn-sm" style="flex:1;justify-content:center;" href="agent.html?id=${a._id}" onclick="event.stopPropagation()">Edit</a>
        ${a.published
          ? `<a class="btn btn-accent-ghost btn-sm" style="flex:1;justify-content:center;" href="${a.published_url}" target="_blank" onclick="event.stopPropagation()">Open Chat ↗</a>`
          : `<button class="btn btn-primary btn-sm" style="flex:1;justify-content:center;" onclick="event.stopPropagation();quickPublish('${a._id}',this)">Publish</button>`}
      </div>
    </div>
  `).join('') + (agents.length < limit ? `
    <div class="create-card" onclick="openCreate()">
      <div class="create-card-icon">➕</div>
      <div class="create-card-title">New Agent</div>
      <div class="create-card-sub">Build another AI assistant</div>
    </div>
  ` : '')
}

function selectType(t, el) {
  _cmType = t
  document.querySelectorAll('.type-opt').forEach(e => e.classList.remove('active'))
  el.classList.add('active')
}
function cmColor(c, el) {
  _cmColor = c
  document.querySelectorAll('#cm-palette .color-swatch').forEach(s => s.classList.remove('active'))
  el.classList.add('active')
}
function openCreate()  { document.getElementById('create-modal').classList.add('open'); document.getElementById('cm-name').focus() }
function closeCreate() { document.getElementById('create-modal').classList.remove('open') }
async function createAgent() {
  const name = document.getElementById('cm-name').value.trim()
  if (!name) { toast('Enter a name', 'error'); return }
  const btn = document.getElementById('cm-btn'); btn.disabled=true; btn.textContent='Creating…'
  try {
    const agent = await apiFetch('/agents', { method:'POST', body:JSON.stringify({ name, brand_color:_cmColor, system_prompt:PROMPTS[_cmType].replace('{name}',name), welcome_message:`Hi! I'm ${name}. How can I help you today?` })})
    toast('Agent created!'); closeCreate(); location.href = 'agent.html?id=' + agent._id
  } catch(e) { toast(e.message,'error'); btn.disabled=false; btn.textContent='Create Agent →' }
}
async function quickPublish(id, btn) {
  btn.disabled=true; btn.textContent='Publishing…'
  try { await apiFetch(`/agents/${id}/publish`,{method:'POST'}); toast('Published!'); location.reload() }
  catch(e) { toast(e.message,'error'); btn.disabled=false; btn.textContent='Publish' }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('create-modal').classList.contains('open')) createAgent() })
</script>
</body>
</html>
