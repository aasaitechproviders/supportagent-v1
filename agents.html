<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Agents — SupportGent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .agent-card-footer{display:flex;gap:8px;padding-top:14px;border-top:1px solid var(--border);margin-top:14px;}
    .create-card{background:var(--surface);border:2px dashed var(--border2);border-radius:var(--radius);padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;text-align:center;min-height:200px;transition:all .2s;}
    .create-card:hover{border-color:var(--accent);background:var(--accent-l);}
    .create-card-icon{width:48px;height:48px;border-radius:14px;background:rgba(var(--accent-rgb),.12);display:flex;align-items:center;justify-content:center;font-size:22px;}
  </style>
</head>
<body>
<div id="page-skeleton" class="page-skeleton"><div style="display:flex;flex-direction:column;align-items:center;gap:12px;"><div class="skel-spinner"></div><div style="font-size:13px;color:var(--text3);font-family:'Sora',sans-serif;">Loading agents…</div></div></div>
<div class="mobile-topbar" id="mobile-topbar"><button class="mobile-menu-btn" id="mob-menu-btn"><span></span><span></span><span></span></button><div style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;" id="mobile-topbar-logo"></div></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <div class="topbar">
    <div><div class="page-title">My Agents</div><div class="page-sub" id="agents-sub">—</div></div>
    <button class="btn-primary" onclick="openCreateModal()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Agent
    </button>
  </div>
  <div class="content page-enter" id="main-content" style="display:none;">
    <div class="agents-grid" id="agents-grid"></div>
  </div>
</main>

<!-- Create Agent Modal -->
<div class="modal-overlay hidden" id="create-modal">
  <div class="modal" style="max-width:440px;">
    <button class="modal-close" onclick="closeCreateModal()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <div class="modal-title">Create New Agent</div>
    <div class="modal-sub">Give your agent a name to get started. You can customise everything after.</div>
    <div class="form-group" style="margin-bottom:14px;">
      <label>Agent Name *</label>
      <input type="text" id="cm-name" class="input" placeholder="e.g. Support Bot, Sales Assistant, FAQ Bot" autofocus/>
    </div>
    <div class="form-group" style="margin-bottom:14px;">
      <label>Brand Color</label>
      <div class="color-palette" id="cm-palette">
        <div class="color-swatch selected" style="background:#6c63ff;" onclick="cmSelectColor('#6c63ff',this)"></div>
        <div class="color-swatch" style="background:#f87171;" onclick="cmSelectColor('#f87171',this)"></div>
        <div class="color-swatch" style="background:#22c55e;" onclick="cmSelectColor('#22c55e',this)"></div>
        <div class="color-swatch" style="background:#fbbf24;" onclick="cmSelectColor('#fbbf24',this)"></div>
        <div class="color-swatch" style="background:#06b6d4;" onclick="cmSelectColor('#06b6d4',this)"></div>
        <div class="color-swatch" style="background:#ec4899;" onclick="cmSelectColor('#ec4899',this)"></div>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:0;">
      <label>Type</label>
      <select id="cm-type" class="select">
        <option value="support">Customer Support</option>
        <option value="sales">Sales / Shopping</option>
        <option value="faq">FAQ Bot</option>
        <option value="general">General Assistant</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeCreateModal()">Cancel</button>
      <button class="btn-primary" onclick="createAgent()" id="cm-create-btn">Create Agent →</button>
    </div>
  </div>
</div>

<script src="api.js"></script><script src="nav.js"></script>
<script>
let cmColor = '#6c63ff'
const PROMPTS = {
  support: 'You are a helpful customer support agent. Answer only from the provided knowledge base. Be empathetic, friendly, and concise. If you cannot find the answer, direct the user to contact support.',
  sales:   'You are a knowledgeable sales assistant. Help customers find the right products, answer questions about pricing and availability, and guide them towards purchase. Be enthusiastic and helpful.',
  faq:     'You are a friendly FAQ bot. Answer customer questions strictly from the knowledge base. Be concise and clear. If a question is not covered, politely say so and suggest contacting the team.',
  general: 'You are a helpful AI assistant. Answer questions from the provided knowledge base. Be friendly, accurate, and concise.',
}
;(async () => {
  const { user } = await initNav('agents')
  if (!user) return
  await loadAgents(user)
  dismissSkeleton()
})()
async function loadAgents(user) {
  try {
    const agents = await apiFetch('/agents')
    const planCfg = { starter:3, grower:10, enterprise:Infinity }
    const limit = planCfg[user?.plan||'starter'] || 3
    document.getElementById('agents-sub').textContent = `${agents.length} of ${limit === Infinity ? '∞' : limit} agents`
    document.getElementById('main-content').style.display = 'block'
    const grid = document.getElementById('agents-grid')
    if (!agents.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;"><div class="empty-state"><div class="empty-state-icon">🤖</div><div class="empty-state-title">No agents yet</div><div class="empty-state-sub">Create your first AI agent to start handling customer queries, showcasing products, and more.</div><button class="btn-primary" onclick="openCreateModal()">Create Your First Agent</button></div></div>`
      return
    }
    grid.innerHTML = agents.map(a => `
      <div class="agent-card" style="--accent-color:${a.brand_color||'#6c63ff'};" onclick="location.href='agent.html?id=${a._id}'">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
          <div class="agent-card-logo" style="background:${a.brand_color||'#6c63ff'};">
            ${a.logo_base64 ? `<img src="${a.logo_base64}" style="width:100%;height:100%;object-fit:contain;" alt=""/>` : (a.name?.[0]?.toUpperCase()||'A')}
          </div>
          <div style="flex:1;min-width:0;">
            <div class="agent-card-name">${a.name}<span class="badge ${a.published?'badge-green':'badge-gray'}" style="font-size:10px;margin-left:4px;">${a.published?'Live':'Draft'}</span></div>
            <div style="font-size:11.5px;color:var(--text3);">/${a.slug||'—'}</div>
          </div>
        </div>
        <div class="agent-card-stats">
          <div class="agent-card-stat"><strong>${a.query_count||0}</strong> chats</div>
          <div class="agent-card-stat"><strong>${a.sources_count||0}</strong> sources</div>
          ${a.products_count ? `<div class="agent-card-stat"><strong>${a.products_count}</strong> products</div>` : ''}
          <div class="agent-card-stat" style="margin-left:auto;font-size:11px;color:var(--text3);">${timeAgo(a.updated_at)}</div>
        </div>
        <div class="agent-card-footer">
          <a href="agent.html?id=${a._id}" class="btn-secondary" style="flex:1;justify-content:center;" onclick="event.stopPropagation()">Edit</a>
          ${a.published ? `<a href="${a.published_url}" target="_blank" class="btn-primary" style="flex:1;justify-content:center;" onclick="event.stopPropagation()">Open Chat</a>` : `<button class="btn-primary" style="flex:1;justify-content:center;" onclick="event.stopPropagation();quickPublish('${a._id}',this)">Publish</button>`}
        </div>
      </div>
    `).join('') + (agents.length < limit ? `<div class="create-card" onclick="openCreateModal()"><div class="create-card-icon">➕</div><div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;">Create New Agent</div><div style="font-size:13px;color:var(--text2);">Build another AI assistant</div></div>` : '')
  } catch(e) { toast(e.message,'error') }
}
function cmSelectColor(c, el) { cmColor=c; document.querySelectorAll('#cm-palette .color-swatch').forEach(s=>s.classList.remove('selected')); el.classList.add('selected') }
function openCreateModal() { document.getElementById('create-modal').classList.remove('hidden'); document.getElementById('cm-name').focus() }
function closeCreateModal() { document.getElementById('create-modal').classList.add('hidden') }
async function createAgent() {
  const name = document.getElementById('cm-name').value.trim()
  if (!name) { toast('Enter a name','error'); return }
  const type = document.getElementById('cm-type').value
  const btn = document.getElementById('cm-create-btn'); btn.disabled=true; btn.textContent='Creating…'
  try {
    const agent = await apiFetch('/agents', { method:'POST', body:JSON.stringify({ name, brand_color:cmColor, system_prompt:PROMPTS[type]||PROMPTS.general, welcome_message:`Hi! I'm ${name}. How can I help you today?` })})
    toast('Agent created!'); closeCreateModal(); location.href = 'agent.html?id=' + agent._id
  } catch(e) { toast(e.message,'error') } finally { btn.disabled=false; btn.textContent='Create Agent →' }
}
async function quickPublish(id, btn) {
  btn.disabled=true; btn.textContent='Publishing…'
  try { await apiFetch(`/agents/${id}/publish`, { method:'POST' }); toast('Published!'); location.reload() }
  catch(e) { toast(e.message,'error'); btn.disabled=false; btn.textContent='Publish' }
}
document.getElementById('cm-name')?.addEventListener('keydown', e => { if (e.key==='Enter') createAgent() })
</script>
</body>
</html>
