<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>My Agents — SupportGent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr));gap:14px}
.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:border-color .18s var(--ease),transform .18s var(--ease),box-shadow .18s var(--ease);box-shadow:var(--sh-sm);animation:cardIn .3s var(--ease) both}
.agent-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--sh),0 0 0 1px var(--accent-dim)}
.agent-card:nth-child(1){animation-delay:.04s}.agent-card:nth-child(2){animation-delay:.08s}
.agent-card:nth-child(3){animation-delay:.12s}.agent-card:nth-child(4){animation-delay:.16s}
.ac-stripe{height:3px;width:100%}
.ac-header{display:flex;align-items:center;gap:11px;padding:14px 16px 10px}
.ac-logo{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;overflow:hidden;border:1px solid var(--border-md)}
.ac-logo img{width:100%;height:100%;object-fit:cover}
.ac-name{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ac-slug{font-size:10.5px;color:var(--text-3);font-family:var(--mono)}
.ac-kpis{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.ac-kpi{padding:9px 6px;text-align:center;border-right:1px solid var(--border);transition:background .12s}
.ac-kpi:last-child{border-right:none}
.ac-kpi:hover{background:var(--surface-2)}
.ac-kpi-val{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text);margin-bottom:2px}
.ac-kpi-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text-3)}
.ac-footer{display:flex;gap:7px;padding:10px 13px;flex-wrap:wrap}
.create-card{background:var(--surface);border:2px dashed var(--border-md);border-radius:var(--r-lg);padding:32px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;text-align:center;transition:var(--t)}
.create-card:hover{border-color:var(--accent);background:var(--accent-dim)}
/* Create modal */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.type-opt{padding:12px;border:1px solid var(--border-md);border-radius:var(--r-sm);cursor:pointer;transition:var(--t);background:var(--surface-2);display:flex;gap:10px;align-items:flex-start}
.type-opt:hover,.type-opt.active{border-color:var(--accent);background:var(--accent-dim)}
.type-opt-icon{font-size:20px;flex-shrink:0}
.type-opt-name{font-size:13px;font-weight:700;margin-bottom:2px}
.type-opt-sub{font-size:11px;color:var(--text-3)}
/* Tablet */
@media(max-width:1024px) and (min-width:649px){
  .agents-grid{grid-template-columns:repeat(auto-fill,minmax(min(240px,100%),1fr))}
}
/* Mobile */
@media(max-width:648px){
  /* Topbar: hide "Demo Store" label, show icon only */
  .demo-store-label{display:none}
  /* Type grid in modal: 1 col on very small screens */
  .type-grid{grid-template-columns:1fr 1fr}
  /* Demo banner in empty state stacks */
  .demo-banner{flex-direction:column;text-align:center;padding:16px 14px;gap:12px}
  .demo-banner-icon{width:44px;height:44px;font-size:22px}
  .demo-banner-actions{justify-content:center;flex-wrap:wrap}
  .btn-demo{font-size:12px;padding:8px 14px}
  /* Agent cards: min 1 col */
  .agents-grid{grid-template-columns:1fr}
  .ac-footer .btn{flex:1;justify-content:center}
}
@media(max-width:380px){
  .type-grid{grid-template-columns:1fr}
}
</style>
<link rel="stylesheet" href="shared.css">
<script>
;(function(){var p=new URLSearchParams(location.search),t=p.get('token');if(t){localStorage.setItem('sg_token',t);history.replaceState({},'',location.pathname);}var d=localStorage.getItem('sg_theme')==='dark';document.documentElement[d?'setAttribute':'removeAttribute']('data-theme','dark');document.documentElement.style.background=d?'#07080D':'#F2F3F9';})();
</script>
<script src="i18n.js"></script>
<script src="api.js"></script>
<script src="nav.js"></script>
<script src="onboarding.js"></script>
</head>
<body>
<div id="toast-container"></div>
<div class="mobile-topbar">
  <div class="mob-left">
    <button class="hamburger" onclick="openMobileSidebar()"><svg viewBox="0 0 16 16"><line x1="1" y1="4" x2="15" y2="4"/><line x1="1" y1="8" x2="15" y2="8"/><line x1="1" y1="12" x2="15" y2="12"/></svg></button>
    <a class="mob-logo" href="home.html">Support<span>Gent</span></a>
  </div>
  <div class="mob-right"><button class="theme-toggle" style="font-size:15px"></button></div>
</div>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeMobileSidebar()"></div>
<div class="sidebar" id="sidebar"></div>

<div id="page-skeleton">
  <div class="skel-topbar">
    <div class="skel" style="height:13px;width:120px;border-radius:4px"></div>
    <div class="skel" style="height:34px;width:110px;border-radius:var(--r-sm)"></div>
  </div>
  <div class="skel-body">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">
      <div class="skel" style="height:180px;border-radius:var(--r-lg)"></div>
      <div class="skel" style="height:180px;border-radius:var(--r-lg);opacity:.7"></div>
      <div class="skel" style="height:180px;border-radius:var(--r-lg);opacity:.45"></div>
    </div>
  </div>
</div>

<div class="main-wrap">
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="topbar-title" data-i18n="myAgents">My Agents</div>
        <div class="topbar-subtitle" id="agents-sub">Loading…</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="theme-toggle" style="font-size:15px"></button>
      <button class="btn btn-secondary btn-sm" onclick="SG_OB.loadDemoStore()" title="Load a fully pre-built demo store in under 30 seconds" style="gap:6px">⚡ <span class="demo-store-label">Demo Store</span></button>
      <button class="btn btn-primary" onclick="openCreate()" id="btn-new-agent">+ New Agent</button>
    </div>
  </div>
  <div class="content" id="page-content" style="display:none">
    <div class="agents-grid" id="agents-grid"></div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div>
        <div class="modal-title" data-i18n="createNewAgent">Create New Agent</div>
        <div class="modal-sub" data-i18n="createModalSub">Takes less than a minute to set up</div>
      </div>
      <button class="modal-close" onclick="closeCreate()">✕</button>
    </div>
    <div class="field">
      <label data-i18n="agentNameLabel">Agent Name *</label>
      <input type="text" id="cm-name" placeholder="e.g. Support Bot, Sales Agent, FAQ Bot" id="cm-name-inp" autofocus>
    </div>
    <div class="field">
      <label data-i18n="agentType">Agent Type</label>
      <div class="type-grid" id="type-grid">
        <div class="type-opt active" onclick="selectType('support',this)"><div class="type-opt-icon">🎧</div><div><div class="type-opt-name" data-i18n="typeSupport">Support</div><div class="type-opt-sub" data-i18n="typeSupportSub">Handle customer queries</div></div></div>
        <div class="type-opt" onclick="selectType('sales',this)"><div class="type-opt-icon">🛒</div><div><div class="type-opt-name" data-i18n="typeSales">Sales</div><div class="type-opt-sub" data-i18n="typeSalesSub">Sell products via chat</div></div></div>
        <div class="type-opt" onclick="selectType('faq',this)"><div class="type-opt-icon">❓</div><div><div class="type-opt-name" data-i18n="typeFaq">FAQ Bot</div><div class="type-opt-sub" data-i18n="typeFaqSub">Answer common questions</div></div></div>
        <div class="type-opt" onclick="selectType('general',this)"><div class="type-opt-icon">🤖</div><div><div class="type-opt-name" data-i18n="typeGeneral">General</div><div class="type-opt-sub" data-i18n="typeGeneralSub">Flexible assistant</div></div></div>
      </div>
    </div>
    <div class="field" style="margin-bottom:0">
      <label data-i18n="brandColour">Brand Colour</label>
      <div class="color-palette" id="cm-palette">
        <div class="color-swatch active" style="background:#7C6FFF" onclick="cmColor('#7C6FFF',this)"></div>
        <div class="color-swatch" style="background:#F26B6B" onclick="cmColor('#F26B6B',this)"></div>
        <div class="color-swatch" style="background:#2DD4A0" onclick="cmColor('#2DD4A0',this)"></div>
        <div class="color-swatch" style="background:#F5A523" onclick="cmColor('#F5A523',this)"></div>
        <div class="color-swatch" style="background:#60A5FA" onclick="cmColor('#60A5FA',this)"></div>
        <div class="color-swatch" style="background:#EC4899" onclick="cmColor('#EC4899',this)"></div>
        <div class="color-swatch" style="background:#A78BFA" onclick="cmColor('#A78BFA',this)"></div>
        <div class="color-swatch" style="background:#14B8A6" onclick="cmColor('#14B8A6',this)"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeCreate()" id="btn-cancel-create">Cancel</button>
      <button class="btn btn-primary" onclick="createAgent()" id="cm-btn">Create Agent →</button>
    </div>
  </div>
</div>

<script>
/* ── State ─────────────────────────────────────────────────────── */
let _cmColor = '#7C6FFF', _cmType = 'support'

const PROMPTS = {
  support: 'You are a helpful customer support agent. Answer from the knowledge base. Be empathetic and concise.',
  sales:   'You are a knowledgeable sales assistant. Help customers find products, answer pricing questions, guide them to purchase.',
  faq:     'You are a friendly FAQ bot. Answer questions strictly from the knowledge base. Be concise.',
  general: 'You are a helpful AI assistant. Answer questions from the knowledge base. Be friendly, accurate, and concise.'
}

/* ── Boot ──────────────────────────────────────────────────────── */
;(async () => {
  const nav = await renderNav('agents')
  if (!nav) return
  const { user } = nav
  if (new URLSearchParams(location.search).get('create') === '1') setTimeout(openCreate, 400)
  try { await loadAgents(user) } catch(e) { toast(e.message, 'error') }
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n))
  document.getElementById('btn-new-agent').textContent=t('newAgent')
  document.getElementById('btn-cancel-create').textContent=t('cancel')
  document.getElementById('cm-btn').textContent=t('createAgentBtn')
  dismissSkeleton()
})()

/* ── Load & render agent grid ──────────────────────────────────── */
async function loadAgents(user) {
  const agents = await apiFetch('/agents')
  const planLimits = { starter: 3, grower: 10, enterprise: Infinity }
  const limit = planLimits[user?.plan || 'starter'] || 3
  document.getElementById('agents-sub').textContent =
    agents.length + ' of ' + (limit === Infinity ? '∞' : limit) + ' agents'
  document.getElementById('page-content').style.display = 'block'

  const grid = document.getElementById('agents-grid')
  if (!agents.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1">
        <!-- Demo store banner -->
        <div class="demo-banner" style="margin-bottom:20px">
          <div class="demo-banner-icon">⚡</div>
          <div class="demo-banner-body">
            <div class="demo-banner-title">Try a live demo in 30 seconds</div>
            <div class="demo-banner-sub">Load "Priya's Boutique" — a fully working AI shopping assistant with 11 products, smart knowledge base, and live chat. See exactly what your customers will experience.</div>
            <div class="demo-banner-actions">
              <button class="btn-demo" onclick="SG_OB.loadDemoStore()">⚡ Load Demo Store</button>
              <button class="btn-demo secondary" onclick="openCreate()">+ Create My Own Agent</button>
            </div>
          </div>
        </div>
        <!-- How it works inline guide -->
        <div class="ob-tip" style="margin-bottom:20px">
          <div class="ob-tip-icon">🗺️</div>
          <div class="ob-tip-body">
            <div class="ob-tip-title">How to set up your AI agent (3 steps)</div>
            <div class="ob-tip-desc">
              <strong>Step 1 — Create agent:</strong> Click "+ New Agent", give it a name, choose type (Support / Sales / FAQ), pick a brand colour.<br>
              <strong>Step 2 — Add knowledge:</strong> Upload your Products CSV, paste your FAQ, or add your website URL. The AI learns from this data.<br>
              <strong>Step 3 — Publish:</strong> Hit Publish. You get a live link (e.g. <code>your-store.supportagent.aasaitech.in</code>) to share anywhere.
            </div>
            <button class="ob-tip-cta" onclick="openCreate()">🤖 Create My First Agent →</button>
          </div>
          <button class="ob-tip-close" onclick="this.closest('.ob-tip').remove()">✕</button>
        </div>
        <div class="empty-state">
          <div class="empty-icon">🤖</div>
          <div class="empty-title">${t('noAgentsYet')}</div>
          <div class="empty-desc">${t('noAgentsDesc')}</div>
          <button class="btn btn-primary" style="margin:0 auto" onclick="openCreate()">${t('createFirstAgentBtn')}</button>
        </div>
      </div>`
    return
  }

  // Build cards via DOM — avoids XSS from agent.name / brand_color / logo
  grid.innerHTML = ''
  agents.forEach((a, i) => {
    const card = buildAgentCard(a, i, limit)
    grid.appendChild(card)
  })

  // Create card
  if (agents.length < limit) {
    const cc = document.createElement('div')
    cc.className = 'create-card'
    cc.onclick = openCreate
    cc.innerHTML = `
      <div style="font-size:36px;opacity:.35">+</div>
      <div style="font-size:14px;font-weight:700" data-i18n="newAgentCard">New Agent</div>
      <div style="font-size:12px;color:var(--text-3)" data-i18n="newAgentCardSub">Build another AI assistant</div>`
    grid.appendChild(cc)
  }
}

function buildAgentCard(a, i, limit) {
  const card = document.createElement('div')
  card.className = 'agent-card'
  card.style.animationDelay = (i * 0.04 + 0.04) + 's'
  card.onclick = () => location.href = 'agent.html?id=' + a._id

  // Stripe
  const stripe = document.createElement('div')
  stripe.className = 'ac-stripe'
  stripe.style.background = sanitizeColor(a.brand_color)
  card.appendChild(stripe)

  // Header
  const hdr = document.createElement('div')
  hdr.className = 'ac-header'

  const logo = document.createElement('div')
  logo.className = 'ac-logo'
  logo.style.background = sanitizeColor(a.brand_color)
  if (a.logo_base64 && /^data:image\//.test(a.logo_base64)) {
    const img = document.createElement('img')
    img.src = a.logo_base64
    img.alt = ''
    logo.appendChild(img)
  } else {
    logo.textContent = (a.name?.[0] || 'A').toUpperCase()
  }

  const info = document.createElement('div')
  info.style.cssText = 'flex:1;min-width:0'

  const name = document.createElement('div')
  name.className = 'ac-name'
  name.textContent = a.name   // textContent — XSS safe

  const slug = document.createElement('div')
  slug.className = 'ac-slug'
  slug.textContent = '/' + (a.slug || '—')

  info.appendChild(name)
  info.appendChild(slug)

  const badge = document.createElement('span')
  badge.className = 'badge ' + (a.published ? 'badge-green' : 'badge-gray')
  badge.textContent = a.published ? t('labelLive') : t('labelDraft')

  hdr.appendChild(logo)
  hdr.appendChild(info)
  hdr.appendChild(badge)
  card.appendChild(hdr)

  // KPIs
  const kpis = document.createElement('div')
  kpis.className = 'ac-kpis'
  ;[
    [fmtNum(a.query_count || 0), t('chats')],
    [fmtNum(a.sources_count || 0), t('sources')],
    [a.products_count || 0, t('products')],
  ].forEach(([val, label]) => {
    const kpi = document.createElement('div')
    kpi.className = 'ac-kpi'
    kpi.innerHTML = `<div class="ac-kpi-val">${val}</div><div class="ac-kpi-label">${label}</div>`
    kpis.appendChild(kpi)
  })
  card.appendChild(kpis)

  // Footer buttons
  const footer = document.createElement('div')
  footer.className = 'ac-footer'

  const editBtn = document.createElement('a')
  editBtn.className = 'btn btn-secondary btn-sm'
  editBtn.style.cssText = 'flex:1;justify-content:center'
  editBtn.href = 'agent.html?id=' + a._id
  editBtn.textContent = '⚙ Edit'
  editBtn.onclick = e => e.stopPropagation()
  footer.appendChild(editBtn)

  if (a.published) {
    const agentUrl = a.custom_domain
      ? 'https://' + a.custom_domain
      : a.subdomain_url || a.published_url || (a.slug ? 'https://' + a.slug + '.supportagent.aasaitech.in' : null)

    if (agentUrl) {
      const openBtn = document.createElement('a')
      openBtn.className = 'btn btn-secondary btn-sm'
      openBtn.style.cssText = 'justify-content:center;flex-shrink:0'
      openBtn.href = agentUrl
      openBtn.target = '_blank'
      openBtn.title = 'Open live agent'
      openBtn.textContent = 'Open ↗'
      openBtn.onclick = e => e.stopPropagation()
      footer.appendChild(openBtn)

      const shareBtn = document.createElement('button')
      shareBtn.className = 'btn btn-accent-ghost btn-sm'
      shareBtn.style.cssText = 'flex:1;justify-content:center'
      shareBtn.innerHTML = '🔗 Share'
      shareBtn.title = 'Share agent link'
      shareBtn.onclick = e => {
        e.stopPropagation()
        shareUrl(agentUrl, a.name || 'Agent')
      }
      footer.appendChild(shareBtn)
    } else {
      const openBtn = document.createElement('a')
      openBtn.className = 'btn btn-accent-ghost btn-sm'
      openBtn.style.cssText = 'flex:1;justify-content:center'
      openBtn.href = a.subdomain_url || a.published_url || '#'
      openBtn.target = '_blank'
      openBtn.textContent = 'Open ↗'
      openBtn.onclick = e => e.stopPropagation()
      footer.appendChild(openBtn)
    }
  } else {
    const pubBtn = document.createElement('button')
    pubBtn.className = 'btn btn-primary btn-sm'
    pubBtn.style.cssText = 'flex:1;justify-content:center'
    pubBtn.textContent = '🚀 Publish'
    pubBtn.onclick = e => { e.stopPropagation(); quickPublish(a._id, pubBtn) }
    footer.appendChild(pubBtn)
  }

  card.appendChild(footer)
  return card
}

// Only allow safe hex / rgb color values — prevent CSS injection
function sanitizeColor(c) {
  if (!c) return '#7C6FFF'
  return /^#[0-9a-fA-F]{3,8}$/.test(c) ? c : '#7C6FFF'
}

/* ── Create agent ──────────────────────────────────────────────── */
function selectType(t, el) {
  _cmType = t
  document.querySelectorAll('.type-opt').forEach(e => e.classList.remove('active'))
  el.classList.add('active')
}
function cmColor(c, el) {
  _cmColor = c
  document.querySelectorAll('#cm-palette .color-swatch').forEach(s => s.classList.remove('active'))
  el.classList.add('active')
}
function openCreate() {
  document.getElementById('create-modal').classList.add('open')
  document.getElementById('cm-name').focus()
  document.body.style.overflow = 'hidden'
}
function closeCreate() {
  document.getElementById('create-modal').classList.remove('open')
  document.body.style.overflow = ''
}
async function createAgent() {
  const name = document.getElementById('cm-name').value.trim()
  if (!name) { toast(t('toastEnterName'), 'error'); return }
  const btn = document.getElementById('cm-btn')
  btn.disabled = true; btn.textContent = t('creating')
  try {
    const a = await apiFetch('/agents', { method: 'POST', body: JSON.stringify({
      name, brand_color: _cmColor,
      system_prompt: PROMPTS[_cmType],
      welcome_message: `Hi! I'm ${name}. How can I help you today?`
    })})
    toast(t('toastAgentCreated'), 'success')
    closeCreate()
    location.href = 'agent.html?id=' + a._id
  } catch(e) {
    toast(e.message, 'error')
    btn.disabled = false
    btn.textContent = t('createAgentBtn')
  }
}

/* ── Quick publish ─────────────────────────────────────────────── */
async function quickPublish(id, btn) {
  btn.disabled = true; btn.textContent = t('saving')
  try {
    await apiFetch(`/agents/${id}/publish`, { method: 'POST' })
    toast(t('toastPublished'), 'success')
    location.reload()
  } catch(e) {
    toast(e.message, 'error')
    btn.disabled = false
    btn.textContent = '🚀 Publish'
  }
}

/* ── Share agent URL (Web Share API with clipboard fallback) ─────── */
function shareUrl(url, name) {
  if (navigator.share) {
    navigator.share({ title: name + ' — AI Agent', url }).catch(() => {})
  } else {
    navigator.clipboard.writeText(url).then(() => toast('Link copied!', 'success'))
  }
}

/* ── Keyboard shortcuts ────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  const modal = document.getElementById('create-modal')
  if (!modal.classList.contains('open')) return
  if (e.key === 'Escape') closeCreate()
  if (e.key === 'Enter' && e.target !== document.getElementById('cm-name')) createAgent()
})
document.getElementById('create-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCreate()
})
</script>
</body>
</html>
