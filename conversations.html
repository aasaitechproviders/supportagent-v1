<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Conversations — SupportGent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
/* ── Layout ──────────────────────────────────────────────────────── */
.convs-wrap {
  display: grid;
  grid-template-columns: 310px 1fr;
  height: calc(100vh - 109px);
  min-height: 480px;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--surface);
  box-shadow: var(--sh-sm);
  overflow: hidden;
}

/* ── Left panel ──────────────────────────────────────────────────── */
.cv-left {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  min-height: 0;
  background: var(--surface);
}
.cv-left-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
  flex-shrink: 0;
}
.cv-left-hdr-title { font-size: 11.5px; font-weight: 700; color: var(--text); letter-spacing: .04em; text-transform: uppercase; }
.cv-search {
  padding: 9px 11px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.cv-search-wrap { position: relative; }
.cv-search-icon {
  position: absolute; left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-3); pointer-events: none;
}
.cv-search-inp {
  width: 100%; height: 32px;
  padding: 0 9px 0 30px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-md);
  background: var(--surface-2);
  color: var(--text); font-family: var(--font);
  font-size: 12px; outline: none;
  transition: var(--t); box-sizing: border-box;
}
.cv-search-inp:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
  background: var(--surface-3);
}
.cv-search-inp::placeholder { color: var(--text-3); }

/* Session list */
.session-list {
  flex: 1; overflow-y: auto; min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--surface-4) transparent;
}

/* ── Session item ─────────────────────────────────────────────────── */
.session-item {
  padding: 10px 13px 9px;
  border-bottom: 1px solid var(--border);
  border-left: 3px solid transparent;
  cursor: pointer; transition: background .1s; user-select: none;
  position: relative;
}
.session-item:last-child { border-bottom: none; }
.session-item:hover { background: var(--surface-2); }
.session-item.active {
  background: var(--accent-dim);
  border-left-color: var(--accent);
}

/* First message preview */
.sess-preview {
  font-size: 12.5px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 5px; line-height: 1.4;
}
.session-item.active .sess-preview { color: var(--accent); }

/* IP badge row */
.sess-ip-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 5px;
}
.sess-ip-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 4px;
  font-size: 10.5px; font-weight: 600;
  font-family: var(--mono, 'JetBrains Mono', monospace);
  background: var(--surface-3);
  color: var(--text-2);
  border: 1px solid var(--border-md);
  letter-spacing: .01em;
  cursor: pointer; transition: border-color .12s, color .12s;
  max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sess-ip-badge:hover {
  border-color: var(--accent-glow);
  color: var(--accent);
}
.sess-ip-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0; opacity: .7;
}
.session-item.active .sess-ip-badge {
  background: rgba(99,102,241,.15);
  border-color: var(--accent-glow);
  color: var(--accent);
}

/* Stats row */
.sess-stats {
  display: flex; align-items: center; justify-content: space-between;
  gap: 6px; font-size: 10.5px; color: var(--text-3);
  margin-bottom: 4px;
}
.sess-stats-left { display: flex; align-items: center; gap: 8px; }
.sess-dot { opacity: .4; }

/* Tags */
.session-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px; }
.session-tag {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 1.5px 6px; border-radius: 20px;
  font-size: 9.5px; font-weight: 700; letter-spacing: .03em;
  text-transform: uppercase;
}
.tag-sales    { background: rgba(16,185,129,.15); color: #10b981; }
.tag-support  { background: rgba(99,102,241,.15);  color: var(--accent); }
.tag-faq      { background: rgba(245,158,11,.15);  color: #f59e0b; }
.tag-general  { background: rgba(100,116,139,.15); color: #64748b; }
.tag-checkout { background: rgba(16,185,129,.2);   color: #10b981; border: 1px solid rgba(16,185,129,.25); }
.tag-products { background: rgba(99,102,241,.15);  color: var(--accent); }

/* Agent dropdown */
.agent-sel {
  height: 34px; padding: 0 10px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-md);
  background: var(--surface-2); color: var(--text);
  font-family: var(--font); font-size: 12.5px;
  outline: none; cursor: pointer; transition: var(--t); min-width: 148px;
}
.agent-sel:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.agent-sel option { background: var(--surface); color: var(--text); }

/* ── Right panel ─────────────────────────────────────────────────── */
.cv-right {
  display: flex; flex-direction: column;
  background: var(--bg); min-height: 0; overflow: hidden;
}

/* Empty state */
.cv-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
}
.cv-empty.hidden { display: none; }
.cv-empty-icon  { font-size: 38px; opacity: .22; line-height: 1; }
.cv-empty-title { font-size: 13.5px; font-weight: 700; color: var(--text-2); }
.cv-empty-sub   { font-size: 12px; color: var(--text-3); }

/* Thread */
.cv-thread { display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
.cv-thread.visible { display: flex; }

/* ── Thread header ─────────────────────────────────────────────────── */
.cv-thread-hdr {
  padding: 0;
  border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.cv-thread-hdr-top {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px 0;
}
.cv-thread-hdr-info { flex: 1; min-width: 0; }
.cv-thread-title {
  font-size: 13px; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Session stats bar */
.sess-stat-bar {
  display: flex; align-items: center; gap: 0;
  padding: 7px 16px 9px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.sess-stat-bar::-webkit-scrollbar { display: none; }
.sess-stat-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; font-size: 11px; font-weight: 500;
  color: var(--text-2); white-space: nowrap; flex-shrink: 0;
  border-right: 1px solid var(--border);
}
.sess-stat-pill:last-child { border-right: none; }
.sess-stat-pill strong {
  font-weight: 700; color: var(--text);
}
.sess-ip-pill {
  font-family: var(--mono, 'JetBrains Mono', monospace);
  font-size: 10.5px; font-weight: 600;
  background: var(--surface-2);
  border-radius: 4px; padding: 2px 8px;
  color: var(--text-2); border: 1px solid var(--border-md);
  flex-shrink: 0; margin-right: 4px;
  cursor: pointer; transition: border-color .12s, color .12s;
}
.sess-ip-pill:hover { border-color: var(--accent-glow); color: var(--accent); }

/* ── Chat scroll area ────────────────────────────────────────────── */
.cv-msgs {
  flex: 1; overflow-y: auto;
  padding: 18px 20px 24px;
  display: flex; flex-direction: column; gap: 4px;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--surface-4) transparent;
}

/* ── Date separator ──────────────────────────────────────────────── */
.chat-date-sep {
  display: flex; align-items: center; gap: 10px;
  margin: 14px 0 10px;
}
.chat-date-sep::before, .chat-date-sep::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.chat-date-sep span {
  font-size: 10.5px; font-weight: 600; color: var(--text-3);
  letter-spacing: .05em; text-transform: uppercase;
  padding: 2px 8px; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 20px;
  flex-shrink: 0;
}

/* ── Message bubbles ─────────────────────────────────────────────── */
.chat-msg {
  display: flex; flex-direction: column;
  max-width: 80%;
  margin-bottom: 2px;
}
.chat-msg.from-user {
  align-self: flex-end; align-items: flex-end;
}
.chat-msg.from-ai {
  align-self: flex-start; align-items: flex-start;
}

/* Sender label (shown only on first of a group) */
.chat-sender {
  font-size: 10px; font-weight: 700; letter-spacing: .05em;
  text-transform: uppercase; margin-bottom: 3px; padding: 0 4px;
}
.from-user .chat-sender { color: var(--accent); opacity: .7; }
.from-ai   .chat-sender { color: var(--text-3); }

/* Bubble */
.chat-bubble {
  padding: 9px 13px;
  font-size: 13.5px; line-height: 1.65;
  word-break: break-word;
  position: relative;
}
.from-user .chat-bubble {
  background: var(--accent-dim);
  border: 1px solid var(--accent-glow);
  border-radius: 14px 14px 4px 14px;
  color: var(--text);
}
.from-ai .chat-bubble {
  background: var(--surface);
  border: 1px solid var(--border-md);
  border-radius: 4px 14px 14px 14px;
  color: var(--text-2);
}

/* Rich HTML inside AI bubble */
.chat-bubble p               { margin: 0 0 9px; }
.chat-bubble p:last-child    { margin-bottom: 0; }
.chat-bubble ul, .chat-bubble ol { padding-left: 18px; margin: 0 0 9px; }
.chat-bubble li              { margin-bottom: 4px; }
.chat-bubble h1,.chat-bubble h2,.chat-bubble h3 {
  font-size: 13px; font-weight: 700; margin: 10px 0 5px; color: var(--text);
}
.chat-bubble h1:first-child,.chat-bubble h2:first-child,.chat-bubble h3:first-child { margin-top: 0; }
.chat-bubble table           { font-size: 12px; border-collapse: collapse; width: 100%; }
.chat-bubble td, .chat-bubble th { padding: 5px 9px; border: 1px solid var(--border-md); }
.chat-bubble pre             { overflow-x: auto; font-size: 12px; }
.chat-bubble code            { font-family: var(--mono, monospace); font-size: 11.5px; }
.chat-bubble strong, .chat-bubble b { color: var(--text); }
.chat-bubble a               { color: var(--accent); }

/* Message timestamp + meta */
.chat-meta {
  display: flex; align-items: center; gap: 6px;
  margin-top: 3px; padding: 0 4px;
  font-size: 10px; color: var(--text-3);
}
.from-user .chat-meta { justify-content: flex-end; }
.chat-meta-chip {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 1px 5px; border-radius: 10px;
  font-size: 9.5px; font-weight: 600;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-3);
}

/* Deflect bubble */
.chat-bubble.deflect {
  background: var(--surface-2);
  border-color: var(--border);
  display: flex; align-items: flex-start; gap: 9px;
}
.deflect-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

/* Sales plain text */
.chat-bubble.sales-plain { font-size: 13.5px; color: var(--text); }

/* ── Product cards grid ──────────────────────────────────────────── */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 7px; margin-top: 7px; width: 100%;
  max-width: 460px;
}
.product-card {
  background: var(--surface);
  border: 1px solid var(--border-md);
  border-radius: 9px; overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
}
.product-card:hover {
  border-color: var(--accent-glow);
  box-shadow: 0 2px 10px var(--accent-dim);
}
.product-thumb {
  width: 100%; aspect-ratio: 1;
  object-fit: cover; display: block;
  background: var(--surface-2);
}
.product-thumb-placeholder {
  width: 100%; aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; background: var(--surface-2); color: var(--text-3);
}
.product-info { padding: 7px 8px; }
.product-name {
  font-size: 11px; font-weight: 600; color: var(--text);
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  line-height: 1.4; margin-bottom: 3px;
}
.product-price { font-size: 11.5px; font-weight: 700; color: var(--accent); }
.product-category { font-size: 10px; color: var(--text-3); margin-top: 2px; }

/* ── Checkout banner ─────────────────────────────────────────────── */
.checkout-banner {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 13px; margin-top: 7px;
  background: rgba(16,185,129,.1);
  border: 1px solid rgba(16,185,129,.3);
  border-left: 3px solid #10b981;
  border-radius: 9px;
  max-width: 380px;
}
.checkout-icon { font-size: 17px; flex-shrink: 0; }
.checkout-title { font-size: 12px; font-weight: 700; color: #10b981; margin-bottom: 1px; }
.checkout-sub   { font-size: 11px; color: var(--text-2); }

/* ── Agent type badge ────────────────────────────────────────────── */
.agent-type-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 700;
  letter-spacing: .04em; text-transform: uppercase; flex-shrink: 0;
}

/* ── Thread loading skeletons ────────────────────────────────────── */
.thread-loading { display: flex; flex-direction: column; gap: 12px; }

/* ── Responsive ──────────────────────────────────────────────────── */
@media (max-width: 860px) {
  .convs-wrap { grid-template-columns: 1fr; height: auto; }
  .cv-left  { height: 300px; }
  .cv-right { height: calc(100vh - 420px); min-height: 260px; }
}
@media (max-width: 648px) {
  .convs-wrap { border-radius: var(--r); }
  .cv-msgs    { padding: 12px 12px; }
  .products-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  .chat-msg { max-width: 92%; }
}
</style>
<script>
;(function(){
  var p = new URLSearchParams(location.search), t = p.get('token');
  if (t) { localStorage.setItem('sg_token', t); history.replaceState({}, '', location.pathname); }
  var dark = localStorage.getItem('sg_theme') === 'dark';
  document.documentElement[dark ? 'setAttribute' : 'removeAttribute']('data-theme', 'dark');
  document.documentElement.style.background = dark ? '#07080D' : '#F2F3F9';
})();
</script>
<script src="i18n.js"></script>
<script src="api.js"></script>
<script src="nav.js"></script>
</head>
<body>

<div id="toast-container"></div>

<div class="mobile-topbar">
  <div class="mob-left">
    <button class="hamburger" onclick="openMobileSidebar()">
      <svg viewBox="0 0 16 16"><line x1="1" y1="4" x2="15" y2="4"/><line x1="1" y1="8" x2="15" y2="8"/><line x1="1" y1="12" x2="15" y2="12"/></svg>
    </button>
    <a class="mob-logo" href="home.html">Support<span>Gent</span></a>
  </div>
  <div class="mob-right"><button class="theme-toggle"></button></div>
</div>

<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeMobileSidebar()"></div>
<div class="sidebar" id="sidebar"></div>

<div id="page-skeleton">
  <div class="skel-topbar">
    <div class="skel" style="height:12px;width:140px;border-radius:4px"></div>
    <div class="skel" style="height:32px;width:160px;border-radius:var(--r-sm)"></div>
  </div>
  <div class="skel-body">
    <div class="skel" style="height:calc(100vh - 109px);border-radius:var(--r-lg)"></div>
  </div>
</div>

<div class="main-wrap">
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="topbar-title" data-i18n="conversations">Conversations</div>
        <div class="topbar-subtitle" id="convs-sub">Loading…</div>
      </div>
    </div>
    <div class="topbar-right">
      <select class="agent-sel" id="agent-sel" onchange="onAgentChange()">
        <option value="">— Select agent —</option>
      </select>
      <button class="theme-toggle"></button>
      <button class="btn btn-danger btn-sm" onclick="clearAllModal()">Clear All</button>
    </div>
  </div>

  <div class="content" id="page-content" style="display:none;padding-top:20px">
    <div class="convs-wrap">

      <!-- LEFT: session list -->
      <div class="cv-left">
        <div class="cv-left-hdr">
          <span class="cv-left-hdr-title">Sessions</span>
          <span class="badge badge-gray" id="sess-count">0</span>
        </div>
        <div class="cv-search">
          <div class="cv-search-wrap">
            <svg class="cv-search-icon" width="13" height="13" fill="none" stroke="currentColor"
              stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input class="cv-search-inp" type="text" id="search-inp"
              placeholder="Search by IP, session, message…" oninput="filterSessions()" autocomplete="off">
          </div>
        </div>
        <div class="session-list" id="session-list">
          <div style="padding:32px 20px;text-align:center;font-size:12.5px;color:var(--text-3)">
            Select an agent above to see sessions.
          </div>
        </div>
      </div>

      <!-- RIGHT: chat thread -->
      <div class="cv-right">
        <div class="cv-empty" id="cv-empty">
          <div class="cv-empty-icon">💬</div>
          <div class="cv-empty-title">Select a session</div>
          <div class="cv-empty-sub">Click any session on the left to view the full conversation</div>
        </div>

        <div class="cv-thread" id="cv-thread">
          <!-- Thread header with session stats bar -->
          <div class="cv-thread-hdr">
            <div class="cv-thread-hdr-top">
              <div class="cv-thread-hdr-info">
                <div class="cv-thread-title" id="thread-title"></div>
              </div>
              <div id="thread-badge"></div>
              <button class="btn btn-secondary btn-sm" id="back-btn"
                style="display:none" onclick="backToList()">← Back</button>
            </div>
            <!-- Session stats bar: IP · msgs · tokens · start time · duration -->
            <div class="sess-stat-bar" id="sess-stat-bar"></div>
          </div>

          <!-- Chat messages -->
          <div class="cv-msgs" id="cv-msgs"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
/* ── Utility fallbacks ──────────────────────────────────────────── */
if (typeof fmtTokens === 'undefined') {
  window.fmtTokens = function(n) {
    n = parseInt(n) || 0
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M'
    if (n >= 1000)    return (n / 1000).toFixed(1) + 'k'
    return n.toString()
  }
}
if (typeof timeAgo === 'undefined') {
  window.timeAgo = function(d) {
    if (!d) return '—'
    var diff = Date.now() - new Date(d).getTime()
    var s = Math.floor(diff / 1000)
    if (s < 60)   return 'just now'
    var m = Math.floor(s / 60)
    if (m < 60)   return m + 'm ago'
    var h = Math.floor(m / 60)
    if (h < 24)   return h + 'h ago'
    var day = Math.floor(h / 24)
    if (day < 30) return day + 'd ago'
    return new Date(d).toLocaleDateString()
  }
}
if (typeof confirmModal === 'undefined') {
  window.confirmModal = function(opts) {
    return Promise.resolve(window.confirm(
      (opts.title ? opts.title + '\n\n' : '') + (opts.message || 'Are you sure?')
    ))
  }
}
if (typeof dismissSkeleton === 'undefined') {
  window.dismissSkeleton = function() {
    var sk = document.getElementById('page-skeleton')
    if (sk) sk.style.display = 'none'
  }
}

/* ── State ──────────────────────────────────────────────────────── */
var allSessions  = []
var sessionsMap  = {}
var curAgentId   = ''
var curAgent     = null
var productsMap  = {}
var activeKey    = null

/* ── Boot ───────────────────────────────────────────────────────── */
;(async function () {
  var nav = await renderNav('conversations')
  if (!nav) return

  try {
    var agents = await apiFetch('/agents')
    var sel    = document.getElementById('agent-sel')
    if (!agents.length) {
      document.getElementById('convs-sub').textContent = 'No agents yet'
    } else {
      agents.forEach(function (a) {
        var o = document.createElement('option')
        o.value = a._id; o.textContent = a.name
        sel.appendChild(o)
      })
      sel.value  = agents[0]._id
      curAgentId = agents[0]._id
      await loadAgentAndSessions()
    }
  } catch (e) {
    toast(e.message, 'error')
    document.getElementById('convs-sub').textContent = 'Error loading agents'
  }

  document.getElementById('page-content').style.display = 'block'
  if (typeof dismissSkeleton === 'function') dismissSkeleton()
}())

/* ── Agent change ───────────────────────────────────────────────── */
function onAgentChange() {
  activeKey   = null
  curAgent    = null
  productsMap = {}
  showEmpty()
  loadAgentAndSessions()
}

/* ── Load agent + sessions + products ───────────────────────────── */
async function loadAgentAndSessions() {
  curAgentId = document.getElementById('agent-sel').value
  var list   = document.getElementById('session-list')

  if (!curAgentId) {
    list.innerHTML = placeholderHtml('Select an agent above to see sessions.')
    document.getElementById('sess-count').textContent = '0'
    document.getElementById('convs-sub').textContent  = 'No agent selected'
    return
  }

  list.innerHTML = skeletonListHtml()

  try {
    var results = await Promise.allSettled([
      apiFetch('/agents/' + curAgentId),
      apiFetch('/agents/' + curAgentId + '/conversations'),
    ])

    if (results[0].status === 'fulfilled') {
      curAgent = results[0].value
      if (curAgent && (curAgent.shopping_enabled || curAgent.agent_type === 'sales')) {
        try {
          var products = await apiFetch('/agents/' + curAgentId + '/products')
          productsMap = {}
          ;(products || []).forEach(function (p) { productsMap[String(p._id)] = p })
        } catch (pe) { console.warn('[products]', pe.message) }
      }
    }

    if (results[1].status !== 'fulfilled') throw results[1].reason
    var data    = results[1].value
    allSessions = data.sessions || []
    sessionsMap = {}
    allSessions.forEach(function (s) { sessionsMap[sessionKey(s)] = s })

    var count = allSessions.length
    document.getElementById('sess-count').textContent = count
    document.getElementById('convs-sub').textContent  =
      count + ' session' + (count !== 1 ? 's' : '') +
      (curAgent ? '  ·  ' + agentTypeLabel(curAgent.agent_type) : '')

    renderSessions(allSessions)
  } catch (e) {
    toast(e.message, 'error')
    list.innerHTML = '<div style="padding:24px;text-align:center;font-size:12.5px;color:var(--red)">Failed to load: ' + esc(e.message) + '</div>'
  }
}

/* ── Session key ────────────────────────────────────────────────── */
function sessionKey(s) {
  var v = s._id != null       ? s._id
        : s.session_id != null ? s.session_id
        : s.visitor_id != null ? s.visitor_id
        : s.visitor_ip != null ? s.visitor_ip
        : ''
  return String(v)
}

/* ── Agent type helpers ─────────────────────────────────────────── */
function agentTypeLabel(type) {
  return { sales: 'Sales', support: 'Support', faq: 'FAQ', general: 'General' }[type] || 'General'
}
function agentTypeBadgeHtml(type) {
  var map = {
    sales:   { cls: 'tag-sales',   icon: '🛍️', label: 'Sales'   },
    support: { cls: 'tag-support', icon: '🛎️', label: 'Support' },
    faq:     { cls: 'tag-faq',     icon: '❓', label: 'FAQ'     },
    general: { cls: 'tag-general', icon: '💬', label: 'General' },
  }
  var cfg = map[type] || map.general
  return '<span class="agent-type-badge ' + cfg.cls + '">' + cfg.icon + ' ' + cfg.label + '</span>'
}

/* ── Render session list ─────────────────────────────────────────── */
function renderSessions(sessions) {
  var list = document.getElementById('session-list')
  if (!sessions.length) {
    list.innerHTML = [
      '<div style="padding:40px 20px;text-align:center">',
      '<div style="font-size:28px;opacity:.22;margin-bottom:12px">💬</div>',
      '<div style="font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:4px">No conversations yet</div>',
      '<div style="font-size:12px;color:var(--text-3)">Conversations will appear once visitors start chatting</div>',
      '</div>',
    ].join('')
    return
  }

  list.innerHTML = sessions.map(function (s) {
    var key    = sessionKey(s)
    var active = key === activeKey ? ' active' : ''
    var msgs   = s.message_count || 1
    var type   = (curAgent && curAgent.agent_type) || 'general'
    var typeCls = 'tag-' + (type || 'general')

    /* IP / session identifier display */
    var identLabel = s.visitor_ip || s.session_id || s.visitor_id || 'unknown'
    /* Show only first 18 chars of session_id to save space */
    if (!s.visitor_ip && (s.session_id || s.visitor_id)) {
      identLabel = String(identLabel).slice(0, 18) + (String(identLabel).length > 18 ? '…' : '')
    }

    /* IP badge — clicking filters by this IP */
    var ipHtml = '<div class="sess-ip-row">' +
      '<span class="sess-ip-badge" onclick="filterByIdent(event,\'' + escAttr(String(s.visitor_ip || s.session_id || s.visitor_id || '')) + '\')" title="Click to filter by this identifier">' +
        '<span class="sess-ip-dot"></span>' + esc(identLabel) +
      '</span>' +
    '</div>'

    /* Tags */
    var tags = '<div class="session-tags">'
    tags += '<span class="session-tag ' + typeCls + '">' + agentTypeLabel(type) + '</span>'
    if (s.has_checkout) tags += '<span class="session-tag tag-checkout">🛒 Checkout</span>'
    if (s.has_products) tags += '<span class="session-tag tag-products">🛍️ Products</span>'
    tags += '</div>'

    return '<div class="session-item' + active + '" id="si-' + safeId(key) + '" data-key="' + escAttr(key) + '">' +
      '<div class="sess-preview">' + esc(s.first_question || '(No message)') + '</div>' +
      ipHtml +
      '<div class="sess-stats">' +
        '<div class="sess-stats-left">' +
          '<span>' + msgs + ' msg' + (msgs !== 1 ? 's' : '') + '</span>' +
          '<span class="sess-dot">·</span>' +
          '<span>🪙 ' + fmtTokens(s.tokens_used || 0) + '</span>' +
        '</div>' +
        '<span>' + timeAgo(s.last_active) + '</span>' +
      '</div>' +
      tags +
    '</div>'
  }).join('')

  list.querySelectorAll('.session-item[data-key]').forEach(function (el) {
    el.addEventListener('click', function (e) {
      /* Don't trigger if clicking the IP badge (it has its own handler) */
      if (e.target.closest('.sess-ip-badge')) return
      openSession(el.dataset.key)
    })
  })
}

/* ── Filter sessions by IP/identifier ──────────────────────────── */
function filterByIdent(e, ident) {
  e.stopPropagation()
  if (!ident) return
  var inp = document.getElementById('search-inp')
  if (inp) {
    inp.value = ident
    filterSessions()
    /* Still open the session that was clicked */
    var item = e.target.closest('.session-item')
    if (item && item.dataset.key) openSession(item.dataset.key)
  }
}

/* ── Filter sessions (search box) ──────────────────────────────── */
function filterSessions() {
  var inp = document.getElementById('search-inp')
  var q   = inp ? inp.value.toLowerCase().trim() : ''
  if (!q) { renderSessions(allSessions); return }
  renderSessions(allSessions.filter(function (s) {
    return (s.first_question || '').toLowerCase().includes(q) ||
           (s.visitor_ip     || '').includes(q) ||
           (s.session_id     || '').toLowerCase().includes(q) ||
           (s.visitor_id     || '').toLowerCase().includes(q)
  }))
}

/* ── Open session ───────────────────────────────────────────────── */
async function openSession(key) {
  var meta = sessionsMap[key]
  if (!meta) return

  activeKey = key

  document.querySelectorAll('.session-item').forEach(function (el) { el.classList.remove('active') })
  var item = document.getElementById('si-' + safeId(key))
  if (item) {
    item.classList.add('active')
    item.scrollIntoView({ block: 'nearest' })
  }

  showThread()
  document.getElementById('back-btn').style.display = window.innerWidth < 860 ? 'flex' : 'none'

  /* Thread title */
  var agentType = (curAgent && curAgent.agent_type) || 'general'
  document.getElementById('thread-title').textContent = (meta.first_question || 'Session').slice(0, 80)
  document.getElementById('thread-badge').innerHTML   = agentTypeBadgeHtml(agentType)

  /* Stats bar */
  renderStatsBar(meta)

  /* Skeleton while loading */
  var msgs = document.getElementById('cv-msgs')
  msgs.innerHTML = '<div class="thread-loading">' +
    '<div class="skel" style="height:38px;border-radius:14px;align-self:flex-end;width:46%"></div>' +
    '<div class="skel" style="height:60px;border-radius:14px;width:64%"></div>' +
    '<div class="skel" style="height:38px;border-radius:14px;align-self:flex-end;width:38%"></div>' +
    '<div class="skel" style="height:72px;border-radius:14px;width:70%"></div>' +
    '</div>'

  try {
    var data     = await apiFetch('/agents/' + curAgentId + '/conversations/' + encodeURIComponent(key))
    var messages = data.messages || []

    if (!messages.length) {
      msgs.innerHTML = '<div style="text-align:center;padding:40px;font-size:12.5px;color:var(--text-3)">No messages in this session.</div>'
      return
    }

    /* Update stats bar with real message count */
    renderStatsBar(meta, messages)

    /* Render chat flow */
    msgs.innerHTML = renderChatFlow(messages)
    requestAnimationFrame(function () { msgs.scrollTop = msgs.scrollHeight })

  } catch (e) {
    msgs.innerHTML = '<div style="padding:24px;font-size:13px;color:var(--red)">Failed to load: ' + esc(e.message) + '</div>'
  }
}

/* ── Stats bar ──────────────────────────────────────────────────── */
function renderStatsBar(meta, messages) {
  var bar    = document.getElementById('sess-stat-bar')
  var ip     = meta.visitor_ip || null
  var sid    = meta.session_id || meta.visitor_id || null
  var msgs   = messages ? messages.length : (meta.message_count || 0)
  /* Total tokens from messages if available */
  var tokens = messages
    ? messages.reduce(function (s, m) { return s + (m.tokens_used || 0) }, 0)
    : (meta.tokens_used || 0)
  var startTime = meta.started_at ? new Date(meta.started_at) : null
  var endTime   = meta.last_active ? new Date(meta.last_active) : null

  /* Duration */
  var durationStr = ''
  if (startTime && endTime) {
    var diff = endTime - startTime
    var dm   = Math.floor(diff / 60000)
    durationStr = dm < 1 ? '< 1 min' : dm + ' min' + (dm !== 1 ? 's' : '')
  }

  var pills = []

  /* IP pill — clickable to filter */
  if (ip) {
    pills.push(
      '<span class="sess-ip-pill" title="Click to filter sessions by this IP" onclick="filterByIpFromBar(\'' + escAttr(ip) + '\')">' +
        '🌐 ' + esc(ip) +
      '</span>'
    )
  }
  if (sid && sid !== ip) {
    pills.push('<div class="sess-stat-pill">🔑 <strong>' + esc(String(sid).slice(0, 16) + (String(sid).length > 16 ? '…' : '')) + '</strong></div>')
  }
  pills.push('<div class="sess-stat-pill">💬 <strong>' + msgs + '</strong> message' + (msgs !== 1 ? 's' : '') + '</div>')
  pills.push('<div class="sess-stat-pill">🪙 <strong>' + fmtTokens(tokens) + '</strong> tokens</div>')
  if (startTime) pills.push('<div class="sess-stat-pill">🕐 <strong>' + fmtTime(startTime) + '</strong></div>')
  if (durationStr) pills.push('<div class="sess-stat-pill">⏱ <strong>' + durationStr + '</strong></div>')

  bar.innerHTML = pills.join('')
}

function filterByIpFromBar(ip) {
  var inp = document.getElementById('search-inp')
  if (inp) { inp.value = ip; filterSessions() }
}

function fmtTime(d) {
  if (!d) return ''
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) +
    ' ' + d.toLocaleDateString([], { month: 'short', day: 'numeric' })
}

/* ── Render chat flow (chronological messages) ──────────────────── */
function renderChatFlow(messages) {
  var html      = ''
  var lastDate  = null
  var prevSender = null

  messages.forEach(function (m, idx) {
    var agentType     = m.agent_type || (curAgent && curAgent.agent_type) || 'general'
    var isSales       = agentType === 'sales'
    var productsShown = m.products_shown || []
    var productNames  = m.product_names  || []
    var action        = m.action         || null
    var isDeflected   = m.deflected      || false
    var hasImage      = m.has_image      || false
    var msgDate       = m.created_at ? new Date(m.created_at) : null

    /* Date separator when day changes */
    if (msgDate) {
      var dateStr = msgDate.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' })
      if (dateStr !== lastDate) {
        html += '<div class="chat-date-sep"><span>' + dateStr + '</span></div>'
        lastDate = dateStr
        prevSender = null  /* reset grouping on new day */
      }
    }

    /* ── USER bubble ── */
    var showUserSender = prevSender !== 'user'
    html += '<div class="chat-msg from-user">'
    if (showUserSender) html += '<div class="chat-sender">Visitor</div>'
    html += '<div class="chat-bubble">'
    if (hasImage) html += '<span style="margin-right:6px;opacity:.6">📎</span>'
    html += esc(m.question || '(image or empty)')
    html += '</div>'
    /* user timestamp */
    html += '<div class="chat-meta">'
    if (msgDate) html += '<span>' + msgDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + '</span>'
    html += '</div>'
    html += '</div>'

    prevSender = 'user'

    /* ── AI bubble ── */
    var answer = m.answer || ''
    html += '<div class="chat-msg from-ai">'
    html += '<div class="chat-sender">AI Agent</div>'

    if (isDeflected) {
      var deflectIcon = agentType === 'support' ? '🛎️' : '🤷'
      html += '<div class="chat-bubble deflect">'
      html += '<span class="deflect-icon">' + deflectIcon + '</span>'
      html += '<span>' + esc(answer || 'Outside my knowledge base.') + '</span>'
      html += '</div>'
    } else if (isSales) {
      html += '<div class="chat-bubble sales-plain">' + esc(answer) + '</div>'
    } else {
      var safeAnswer = answer
        ? sanitizeHtml(answer)
        : '<em style="color:var(--text-3);font-size:12px">(no answer recorded)</em>'
      html += '<div class="chat-bubble">' + safeAnswer + '</div>'
    }

    /* Product cards */
    if (productsShown.length > 0) {
      html += '<div class="products-grid">'
      productsShown.slice(0, 8).forEach(function (pid, i) {
        var product  = productsMap[String(pid)]
        var name     = product ? product.name      : (productNames[i] || 'Product #' + (i + 1))
        var price    = product ? product.price     : null
        var image    = product ? product.image_url : null
        var category = product ? product.category  : null
        var currency = product ? (product.currency === 'USD' ? '$' : '₹') : '₹'
        html += '<div class="product-card">'
        if (image) {
          html += '<img class="product-thumb" src="' + escAttr(image) + '" alt="' + escAttr(name) + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
          html += '<div class="product-thumb-placeholder" style="display:none">🛍️</div>'
        } else {
          html += '<div class="product-thumb-placeholder">🛍️</div>'
        }
        html += '<div class="product-info">'
        html += '<div class="product-name">' + esc(name) + '</div>'
        if (price != null) html += '<div class="product-price">' + currency + price + '</div>'
        if (category)      html += '<div class="product-category">' + esc(category) + '</div>'
        html += '</div></div>'
      })
      html += '</div>'
    }

    /* Checkout banner */
    if (action === 'checkout') {
      var checkedOutNames = productsShown.map(function (pid, i) {
        var p = productsMap[String(pid)]
        return p ? p.name : (productNames[i] || 'Item')
      })
      html += '<div class="checkout-banner">'
      html += '<span class="checkout-icon">🛒</span>'
      html += '<div>'
      html += '<div class="checkout-title">Checkout initiated</div>'
      if (checkedOutNames.length) html += '<div class="checkout-sub">' + esc(checkedOutNames.join(', ')) + '</div>'
      html += '</div></div>'
    }

    /* Meta row */
    html += '<div class="chat-meta">'
    if (msgDate) html += '<span>' + msgDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + '</span>'
    if (m.rag_mode)       html += '<span class="chat-meta-chip">🔍 RAG</span>'
    if (m.kb_confidence && m.kb_confidence !== 'none') {
      var kbColor = m.kb_confidence === 'strong' ? 'var(--green)' : '#f59e0b'
      html += '<span class="chat-meta-chip" style="color:' + kbColor + '">' +
        (m.kb_confidence === 'strong' ? '✅' : '⚠️') + ' ' + m.kb_confidence + '</span>'
    }
    if (productsShown.length) html += '<span class="chat-meta-chip">🛍️ ' + productsShown.length + '</span>'
    html += '<span class="chat-meta-chip">🪙 ' + fmtTokens(m.tokens_used || 0) + '</span>'
    if (m.first_token_ms) html += '<span class="chat-meta-chip">⚡ ' + m.first_token_ms + 'ms</span>'
    html += '</div>'

    html += '</div>' /* end from-ai */

    prevSender = 'ai'
  })

  return html
}

/* ── HTML sanitizer ─────────────────────────────────────────────── */
function sanitizeHtml(html) {
  if (typeof DOMPurify !== 'undefined') {
    return DOMPurify.sanitize(html, {
      ALLOWED_TAGS: ['p','br','b','strong','em','i','u','s','ul','ol','li','h1','h2','h3','h4','code','pre','table','thead','tbody','tr','td','th','a','span','div'],
      ALLOWED_ATTR: ['href','target','rel','class','style'],
      ALLOW_DATA_ATTR: false,
    })
  }
  var tmp = document.createElement('div')
  tmp.innerHTML = html
  tmp.querySelectorAll('script,iframe,object,embed,form,input,link,meta,base,style').forEach(function(el) { el.remove() })
  tmp.querySelectorAll('*').forEach(function(el) {
    Array.from(el.attributes).forEach(function(attr) {
      var name = attr.name.toLowerCase(), val = attr.value
      if (/^on/i.test(name))                     { el.removeAttribute(attr.name); return }
      if (name === 'href' && /^javascript:/i.test(val)) { el.removeAttribute(attr.name); return }
      if (name === 'src'  && /^javascript:/i.test(val)) { el.removeAttribute(attr.name); return }
    })
  })
  return tmp.innerHTML
}

/* ── Panel helpers ──────────────────────────────────────────────── */
function showEmpty() {
  document.getElementById('cv-empty').classList.remove('hidden')
  document.getElementById('cv-thread').classList.remove('visible')
}
function showThread() {
  document.getElementById('cv-empty').classList.add('hidden')
  document.getElementById('cv-thread').classList.add('visible')
}
function backToList() {
  showEmpty()
  document.querySelectorAll('.session-item').forEach(function (el) { el.classList.remove('active') })
  activeKey = null
}

/* ── Clear all conversations ─────────────────────────────────────── */
async function clearAllModal() {
  var sel       = document.getElementById('agent-sel')
  var agentId   = sel.value
  var agentName = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text : 'this agent'
  if (!agentId) { toast('Select an agent first', 'warning'); return }
  var ok = await confirmModal({
    title: 'Clear all conversations?',
    message: 'This will permanently hide all conversations for "' + agentName + '".',
    confirmText: 'Clear All', danger: true,
  })
  if (!ok) return
  try {
    await apiFetch('/agents/' + agentId + '/clear-conversations', { method: 'POST' })
    toast('Conversations cleared', 'success')
    activeKey = null; showEmpty()
    await loadAgentAndSessions()
  } catch (e) { toast(e.message, 'error') }
}

/* ── Escape / utility helpers ───────────────────────────────────── */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>')
}
function escAttr(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}
function safeId(s) { return String(s == null ? '' : s).replace(/[^a-zA-Z0-9]/g,'_') }
function placeholderHtml(msg) {
  return '<div style="padding:32px 20px;text-align:center;font-size:12.5px;color:var(--text-3)">' + esc(msg) + '</div>'
}
function skeletonListHtml() {
  return '<div style="padding:10px;display:flex;flex-direction:column;gap:6px">' +
    '<div class="skel" style="height:78px;border-radius:var(--r-sm)"></div>' +
    '<div class="skel" style="height:78px;border-radius:var(--r-sm);opacity:.7"></div>' +
    '<div class="skel" style="height:78px;border-radius:var(--r-sm);opacity:.45"></div>' +
    '</div>'
}
</script>
