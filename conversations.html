<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Conversations — SupportGent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .convs-layout{display:grid;grid-template-columns:320px 1fr;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface);min-height:calc(100vh - 120px);}
    .convs-left{border-right:1px solid var(--border);display:flex;flex-direction:column;}
    .convs-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .convs-search{padding:0 14px 12px;border-bottom:1px solid var(--border);}
    .session-list{flex:1;overflow-y:auto;}
    .session-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
    .session-item:hover{background:var(--surface2);}
    .session-item.active{background:rgba(var(--accent-rgb),.1);border-left:3px solid var(--accent);}
    .session-item-q{font-size:13.5px;font-weight:500;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .session-item-meta{font-size:11.5px;color:var(--text3);display:flex;align-items:center;justify-content:space-between;}
    .convs-right{display:flex;flex-direction:column;}
    .msg-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .msg-scroll{flex:1;overflow-y:auto;padding:20px;}
    .msg-item{margin-bottom:20px;}
    .msg-q{background:rgba(var(--accent-rgb),.12);border:1px solid var(--accent-b);border-radius:12px 12px 4px 12px;padding:12px 16px;margin-bottom:8px;font-size:14px;color:var(--text);line-height:1.6;align-self:flex-end;max-width:80%;margin-left:auto;}
    .msg-a{background:var(--surface2);border:1px solid var(--border);border-radius:4px 12px 12px 12px;padding:14px 16px;font-size:13.5px;color:var(--text);line-height:1.7;}
    .msg-meta{font-size:11px;color:var(--text3);margin-top:5px;text-align:right;}
    .agent-filter{padding:10px 14px;border-bottom:1px solid var(--border);}
    .empty-msgs{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text3);}
    @media(max-width:900px){.convs-layout{grid-template-columns:1fr;}.convs-right{display:none;}.convs-right.open{display:flex;position:fixed;inset:0;z-index:200;background:var(--surface);flex-direction:column;}}
  </style>
</head>
<body>
<div id="page-skeleton" class="page-skeleton"><div style="display:flex;flex-direction:column;align-items:center;gap:12px;"><div class="skel-spinner"></div><div style="font-size:13px;color:var(--text3);font-family:'Sora',sans-serif;">Loading conversations…</div></div></div>
<div class="mobile-topbar" id="mobile-topbar"><button class="mobile-menu-btn" id="mob-menu-btn"><span></span><span></span><span></span></button><div style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;" id="mobile-topbar-logo"></div></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <div class="topbar">
    <div><div class="page-title">Conversations</div><div class="page-sub" id="convs-sub">All sessions across your agents</div></div>
    <div style="display:flex;gap:8px;">
      <select id="agent-select" class="select" style="width:200px;" onchange="loadSessions()"><option value="">All Agents</option></select>
      <button class="btn-danger" style="padding:9px 16px;font-size:13px;" onclick="clearAll()">Clear All</button>
    </div>
  </div>
  <div class="content page-enter" id="main-content" style="display:none;padding:0;">
    <div class="convs-layout">
      <div class="convs-left">
        <div class="convs-header">
          <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;">Sessions</div>
          <span class="badge badge-gray" id="session-count">0</span>
        </div>
        <div class="convs-search">
          <input type="text" id="search-inp" class="input" style="margin:10px 0 0;" placeholder="🔍  Search conversations…" oninput="filterSessions()"/>
        </div>
        <div class="session-list" id="session-list">
          <div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;">Select an agent to view conversations.</div>
        </div>
      </div>
      <div class="convs-right" id="convs-right">
        <div class="empty-msgs" id="empty-msgs">
          <div style="font-size:30px;">💬</div>
          <div style="font-size:14px;font-weight:600;">Select a session</div>
          <div style="font-size:13px;">Click any session on the left to view messages</div>
        </div>
        <div id="msg-area" style="display:none;flex:1;display:flex;flex-direction:column;overflow:hidden;">
          <div class="msg-header">
            <div>
              <div style="font-size:13.5px;font-weight:600;" id="msg-session-title">Session</div>
              <div style="font-size:11.5px;color:var(--text3);" id="msg-session-meta"></div>
            </div>
            <div style="display:flex;gap:8px;">
              <button class="btn-ghost" style="font-size:12px;" id="mobile-back-btn" onclick="document.getElementById('convs-right').classList.remove('open')">← Back</button>
            </div>
          </div>
          <div class="msg-scroll" id="msg-scroll"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="api.js"></script><script src="nav.js"></script>
<script>
let allSessions = []
let currentAgentId = ''

;(async () => {
  const { user } = await initNav('conversations')
  if (!user) return
  try {
    const agents = await apiFetch('/agents')
    const sel = document.getElementById('agent-select')
    agents.forEach(a => { const o=document.createElement('option'); o.value=a._id; o.textContent=a.name; sel.appendChild(o) })
    if (agents.length) { sel.value = agents[0]._id; currentAgentId = agents[0]._id; await loadSessions() }
  } catch(e) { toast(e.message,'error') }
  document.getElementById('main-content').style.display = 'block'
  dismissSkeleton()
})()

async function loadSessions() {
  currentAgentId = document.getElementById('agent-select').value
  if (!currentAgentId) { document.getElementById('session-list').innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;">Select an agent.</div>'; return }
  try {
    const d = await apiFetch(`/agents/${currentAgentId}/conversations`)
    allSessions = d.sessions || []
    document.getElementById('session-count').textContent = allSessions.length
    document.getElementById('convs-sub').textContent = `${allSessions.length} sessions`
    renderSessions(allSessions)
  } catch(e) { toast(e.message,'error') }
}

function renderSessions(sessions) {
  const list = document.getElementById('session-list')
  if (!sessions.length) { list.innerHTML='<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px;">No conversations yet for this agent.</div>'; return }
  list.innerHTML = sessions.map(s => `
    <div class="session-item" id="sess-${s._id}" onclick="openSession(${JSON.stringify(s._id||s.session_id||s.visitor_ip)},${JSON.stringify(s)})">
      <div class="session-item-q">${s.first_question || '(No question)'}</div>
      <div class="session-item-meta">
        <span>${s.message_count || 1} message${(s.message_count||1)===1?'':'s'} · ${formatTokens(s.tokens_used||0)} tokens</span>
        <span>${timeAgo(s.last_active)}</span>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px;">${s.visitor_ip||s.session_id||'—'}</div>
    </div>
  `).join('')
}

function filterSessions() {
  const q = document.getElementById('search-inp').value.toLowerCase()
  renderSessions(allSessions.filter(s => (s.first_question||'').toLowerCase().includes(q) || (s.visitor_ip||'').includes(q)))
}

async function openSession(key, meta) {
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'))
  document.getElementById(`sess-${key}`)?.classList.add('active')
  document.getElementById('empty-msgs').style.display = 'none'
  const msgArea = document.getElementById('msg-area'); msgArea.style.display = 'flex'
  document.getElementById('msg-session-title').textContent = meta.first_question?.slice(0,60) || 'Session'
  document.getElementById('msg-session-meta').textContent  = `${meta.message_count||1} messages · ${timeAgo(meta.started_at)} · ${meta.visitor_ip||''}`
  document.getElementById('msg-scroll').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px;">Loading…</div>'
  document.getElementById('convs-right').classList.add('open')
  try {
    const d = await apiFetch(`/agents/${currentAgentId}/conversations/${encodeURIComponent(key)}`)
    const msgs = d.messages || []
    if (!msgs.length) { document.getElementById('msg-scroll').innerHTML='<div style="text-align:center;padding:20px;color:var(--text3);">No messages.</div>'; return }
    document.getElementById('msg-scroll').innerHTML = msgs.map(m => `
      <div class="msg-item">
        <div class="msg-q">${escHtml(m.question)}</div>
        <div class="msg-a">${m.answer || ''}</div>
        <div class="msg-meta">${formatTokens(m.tokens_used||0)} tokens · ${timeAgo(m.created_at)}</div>
      </div>
    `).join('')
    document.getElementById('msg-scroll').scrollTop = 999999
  } catch(e) { document.getElementById('msg-scroll').innerHTML='<div style="padding:20px;color:var(--red);">Failed to load messages.</div>' }
}

async function clearAll() {
  if (!confirm('Clear ALL conversations across all agents?')) return
  try { await apiFetch('/conversations/clear-all', { method:'POST' }); toast('All conversations cleared'); loadSessions() }
  catch(e) { toast(e.message,'error') }
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
</script>
</body>
</html>
