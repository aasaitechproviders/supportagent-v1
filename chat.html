<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════════════════ */
:root {
  --brand: #6C5FF5;
  --brand-2: #8B7FF8;
  --brand-dark: #4B40D9;
  --brand-dim: rgba(108,95,245,.08);
  --brand-glow: rgba(108,95,245,.18);
  --brand-glow-lg: rgba(108,95,245,.28);

  --bg: #F2F3FA;
  --bg-pattern: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%236C5FF5' fill-opacity='0.028'%3E%3Ccircle cx='20' cy='20' r='1.5'/%3E%3C/g%3E%3C/svg%3E");
  --surface: rgba(255,255,255,0.92);
  --surface-solid: #FFFFFF;
  --surface2: rgba(242,243,250,0.7);
  --surface3: #E8EAFF;
  --glass: rgba(255,255,255,0.72);
  --glass-border: rgba(255,255,255,0.9);

  --text: #0B0D1A;
  --text2: #4A4F6E;
  --text3: #9096B8;
  --text4: #B8BDDA;

  --border: rgba(108,95,245,.10);
  --border2: rgba(108,95,245,.15);
  --border3: rgba(0,0,0,.06);

  --r: 18px;
  --r-sm: 12px;
  --r-xs: 8px;

  --font: 'Sora', sans-serif;
  --mono: 'Fira Code', monospace;

  --green: #059669;
  --green-dim: rgba(5,150,105,.09);
  --green-border: rgba(5,150,105,.22);
  --red: #DC2626;
  --amber: #D97706;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.10), 0 4px 12px rgba(0,0,0,.06);
  --shadow-brand: 0 4px 20px var(--brand-glow), 0 1px 4px rgba(0,0,0,.06);
  --shadow-brand-lg: 0 8px 32px var(--brand-glow-lg), 0 2px 8px rgba(0,0,0,.08);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: var(--font);
  background: var(--bg) var(--bg-pattern);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════════════════
   HEADER — frosted glass with gradient accent line
═══════════════════════════════════════════════════════════════ */
.chat-header {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(1.8);
  -webkit-backdrop-filter: blur(20px) saturate(1.8);
  border-bottom: 1px solid var(--glass-border);
  padding: 14px 18px 13px;
  display: flex;
  align-items: center;
  gap: 13px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  box-shadow: var(--shadow-sm);
}

/* Accent gradient line at very top */
.chat-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--brand), var(--brand-2), #A78BFA, var(--brand));
  background-size: 200% 100%;
  animation: shimmer-line 4s linear infinite;
}
@keyframes shimmer-line {
  0% { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}

.agent-avatar {
  width: 42px;
  height: 42px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
  overflow: hidden;
  box-shadow: var(--shadow-brand);
  position: relative;
}
.agent-avatar::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  border: 1.5px solid rgba(255,255,255,0.25);
  pointer-events: none;
}
.agent-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.agent-info { flex: 1; min-width: 0; }
.agent-name {
  font-size: 14.5px;
  font-weight: 700;
  letter-spacing: -.025em;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.agent-status {
  font-size: 11px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
  font-weight: 500;
  letter-spacing: .01em;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 2px var(--green-dim);
  animation: pulse-dot 2.4s ease infinite;
}
@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 0 2px var(--green-dim); }
  50% { box-shadow: 0 0 0 4px var(--green-dim); }
}

.powered-by {
  margin-left: auto;
  font-size: 10px;
  color: var(--text4);
  text-align: right;
  flex-shrink: 0;
  line-height: 1.5;
  letter-spacing: .01em;
}
.powered-by a {
  color: var(--brand);
  font-weight: 600;
  text-decoration: none;
  transition: opacity .15s;
}
.powered-by a:hover { opacity: .75; }

/* ═══════════════════════════════════════════════════════════════
   MESSAGE FEED
═══════════════════════════════════════════════════════════════ */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 22px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
}

/* Thin elegant scrollbar */
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb {
  background: var(--border2);
  border-radius: 3px;
}
.chat-messages::-webkit-scrollbar-thumb:hover { background: var(--brand); }

/* Message group */
.msg-group {
  display: flex;
  flex-direction: column;
  gap: 3px;
  animation: msg-in .32s cubic-bezier(.22,1,.36,1) both;
}
.msg-group.user { align-items: flex-end; }
.msg-group.agent { align-items: flex-start; }

@keyframes msg-in {
  from { opacity: 0; transform: translateY(12px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── USER BUBBLE ── */
.msg-bubble-user {
  max-width: 78%;
  padding: 11px 16px;
  border-radius: 20px 20px 5px 20px;
  font-size: 13.5px;
  line-height: 1.65;
  word-break: break-word;
  background: linear-gradient(135deg, var(--brand), var(--brand-dark));
  color: #fff;
  box-shadow: var(--shadow-brand);
  letter-spacing: -.005em;
  position: relative;
}
.msg-bubble-user::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 60%);
  pointer-events: none;
}

/* ── AGENT BUBBLE ── */
.msg-bubble-agent {
  max-width: 90%;
  padding: 13px 16px;
  border-radius: 5px 20px 20px 20px;
  background: var(--surface-solid);
  border: 1px solid var(--border3);
  color: var(--text);
  box-shadow: var(--shadow-md);
  word-break: break-word;
  overflow-x: auto;
  font-size: 13.5px;
  line-height: 1.7;
  letter-spacing: -.005em;
}

/* Rich content inside agent bubbles */
.msg-bubble-agent p { margin: 0 0 .7em; }
.msg-bubble-agent p:last-child { margin-bottom: 0; }
.msg-bubble-agent strong { font-weight: 700; color: var(--text); }
.msg-bubble-agent em { font-style: italic; color: var(--text2); }
.msg-bubble-agent a { color: var(--brand); text-decoration: none; font-weight: 500; border-bottom: 1px solid var(--brand-dim); transition: border-color .15s; }
.msg-bubble-agent a:hover { border-color: var(--brand); }
.msg-bubble-agent ul, .msg-bubble-agent ol { padding-left: 1.4em; margin: .5em 0; }
.msg-bubble-agent li { margin-bottom: .3em; }
.msg-bubble-agent code {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--surface3);
  color: var(--brand-dark);
  padding: 1px 6px;
  border-radius: 5px;
  font-weight: 500;
}
.msg-bubble-agent pre {
  background: var(--text);
  color: #E0E6F0;
  border-radius: var(--r-sm);
  padding: 14px;
  overflow-x: auto;
  margin: .6em 0;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
}
.msg-bubble-agent pre code {
  background: none;
  color: inherit;
  padding: 0;
}
.msg-bubble-agent h1, .msg-bubble-agent h2, .msg-bubble-agent h3 {
  font-weight: 700;
  margin: .6em 0 .3em;
  letter-spacing: -.02em;
}
.msg-bubble-agent h1 { font-size: 17px; }
.msg-bubble-agent h2 { font-size: 15px; }
.msg-bubble-agent h3 { font-size: 13.5px; }

/* ── WELCOME BUBBLE ── */
.msg-bubble-welcome {
  max-width: 100%;
  padding: 16px 18px;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--brand-dim) 0%, rgba(108,95,245,.04) 100%);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 13.5px;
  line-height: 1.75;
  letter-spacing: -.005em;
  position: relative;
  overflow: hidden;
}
.msg-bubble-welcome::before {
  content: '';
  position: absolute;
  top: -20px; left: -20px;
  width: 80px; height: 80px;
  background: radial-gradient(circle, var(--brand-glow) 0%, transparent 70%);
  pointer-events: none;
}

/* ── DATE SEPARATOR ── */
.date-sep {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 8px 0 4px;
  color: var(--text3);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.date-sep::before, .date-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── TIME LABEL ── */
.msg-time {
  font-size: 10px;
  color: var(--text4);
  padding: 0 5px;
  letter-spacing: .02em;
  font-weight: 500;
}

/* ═══════════════════════════════════════════════════════════════
   STREAMING CURSOR
═══════════════════════════════════════════════════════════════ */
.stream-cursor {
  display: inline-block;
  width: 2px;
  height: .9em;
  background: var(--brand);
  border-radius: 2px;
  vertical-align: text-bottom;
  margin-left: 2px;
  animation: blink-cursor .55s step-start infinite;
}
@keyframes blink-cursor { 50% { opacity: 0; } }

.msg-bubble-streaming {
  border-color: var(--brand) !important;
  box-shadow: 0 0 0 1px var(--brand-glow), var(--shadow-md) !important;
}

/* ═══════════════════════════════════════════════════════════════
   TYPING INDICATOR
═══════════════════════════════════════════════════════════════ */
.typing-wrap { display: flex; align-items: flex-start; }
.typing-indicator {
  display: none;
  align-items: center;
  gap: 5px;
  padding: 14px 16px;
  background: var(--surface-solid);
  border: 1px solid var(--border3);
  border-radius: 5px 18px 18px 18px;
  box-shadow: var(--shadow-sm);
}
.typing-indicator.show { display: flex; }
.typing-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text4);
  animation: tdot .9s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: .18s; }
.typing-dot:nth-child(3) { animation-delay: .36s; }
@keyframes tdot {
  0%, 100% { transform: translateY(0); opacity: .4; }
  50% { transform: translateY(-5px); opacity: 1; background: var(--brand); }
}

/* ═══════════════════════════════════════════════════════════════
   TOPIC CHIPS — Horizontal pill strip
═══════════════════════════════════════════════════════════════ */
.topics-wrap {
  display: flex;
  gap: 7px;
  padding: 10px 16px 4px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.topics-wrap::-webkit-scrollbar { display: none; }

.topic-chip {
  padding: 8px 14px;
  border: 1.5px solid var(--border2);
  border-radius: 30px;
  background: var(--surface-solid);
  color: var(--brand);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all .18s cubic-bezier(.22,1,.36,1);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  letter-spacing: -.01em;
}
.topic-chip:hover {
  background: var(--brand);
  color: #fff;
  border-color: var(--brand);
  box-shadow: var(--shadow-brand);
  transform: translateY(-1px);
}
.topic-chip:active { transform: translateY(0) scale(.97); }
.chip-icon { font-size: 13px; }

/* ═══════════════════════════════════════════════════════════════
   PRODUCT CARDS
═══════════════════════════════════════════════════════════════ */
.products-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 4px;
  max-width: 100%;
  scrollbar-width: none;
}
.products-row::-webkit-scrollbar { display: none; }

.product-card {
  min-width: 148px;
  max-width: 148px;
  background: var(--surface-solid);
  border: 1px solid var(--border3);
  border-radius: var(--r);
  overflow: hidden;
  flex-shrink: 0;
  transition: all .22s cubic-bezier(.22,1,.36,1);
  box-shadow: var(--shadow-sm);
}
.product-card:hover {
  border-color: var(--brand);
  transform: translateY(-3px);
  box-shadow: var(--shadow-brand-lg);
}
.product-img {
  width: 100%;
  height: 100px;
  object-fit: cover;
  background: var(--surface3);
  display: block;
  transition: transform .3s ease;
}
.product-card:hover .product-img { transform: scale(1.04); }
.product-img-placeholder {
  width: 100%;
  height: 100px;
  background: linear-gradient(135deg, var(--surface3) 0%, var(--brand-dim) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.product-info { padding: 10px 11px 8px; }
.product-name {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -.01em;
  color: var(--text);
}
.product-price {
  font-size: 14px;
  font-weight: 700;
  color: var(--brand);
  font-family: var(--mono);
  letter-spacing: -.02em;
}
.product-btn {
  display: block;
  text-align: center;
  background: linear-gradient(135deg, var(--brand), var(--brand-dark));
  color: #fff;
  padding: 9px;
  font-size: 11.5px;
  font-weight: 700;
  font-family: var(--font);
  border: none;
  cursor: pointer;
  width: 100%;
  transition: opacity .15s;
  letter-spacing: .01em;
}
.product-btn:hover { opacity: .85; }

/* ═══════════════════════════════════════════════════════════════
   INPUT AREA — floating pill
═══════════════════════════════════════════════════════════════ */
.chat-input-wrap {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(1.8);
  -webkit-backdrop-filter: blur(20px) saturate(1.8);
  border-top: 1px solid var(--glass-border);
  padding: 12px 14px 16px;
  flex-shrink: 0;
}

.chat-input-row {
  display: flex;
  gap: 9px;
  align-items: flex-end;
  background: var(--surface-solid);
  border: 1.5px solid var(--border2);
  border-radius: 18px;
  padding: 8px 8px 8px 14px;
  transition: border-color .2s, box-shadow .2s;
  box-shadow: var(--shadow-sm);
}
.chat-input-row:focus-within {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px var(--brand-dim), var(--shadow-brand);
}

.chat-input {
  flex: 1;
  min-height: 28px;
  max-height: 120px;
  padding: 3px 0;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 13.5px;
  font-family: var(--font);
  resize: none;
  outline: none;
  line-height: 1.55;
  letter-spacing: -.008em;
}
.chat-input::placeholder { color: var(--text4); }

.send-btn {
  width: 36px;
  height: 36px;
  border-radius: 11px;
  background: linear-gradient(135deg, var(--brand), var(--brand-dark));
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .18s cubic-bezier(.22,1,.36,1);
  box-shadow: 0 2px 10px var(--brand-glow);
}
.send-btn:hover {
  transform: scale(1.08);
  box-shadow: var(--shadow-brand);
}
.send-btn:active { transform: scale(.95); }
.send-btn:disabled {
  opacity: .45;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.send-btn svg { color: #fff; }

/* ═══════════════════════════════════════════════════════════════
   CART BAR
═══════════════════════════════════════════════════════════════ */
.cart-bar {
  background: linear-gradient(135deg, var(--brand), var(--brand-dark));
  color: #fff;
  padding: 12px 20px;
  display: none;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
  cursor: pointer;
  transition: opacity .15s;
  letter-spacing: -.01em;
  box-shadow: 0 -4px 20px var(--brand-glow);
  animation: cart-bar-in .3s cubic-bezier(.22,1,.36,1);
}
@keyframes cart-bar-in {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.cart-bar.show { display: flex; }
.cart-bar:hover { opacity: .92; }
.cart-count {
  background: rgba(255,255,255,.22);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 20px;
  padding: 1px 10px;
  font-size: 11.5px;
  font-weight: 700;
  margin-left: 7px;
  font-family: var(--mono);
}

/* ═══════════════════════════════════════════════════════════════
   MODAL / CART SHEET
═══════════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(11,13,26,.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  visibility: hidden;
  opacity: 0;
  transition: opacity .25s, visibility .25s;
}
.modal-overlay.open { visibility: visible; opacity: 1; }

.cart-sheet {
  background: var(--surface-solid);
  border-radius: 28px 28px 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 82vh;
  overflow-y: auto;
  padding: 8px 20px 30px;
  box-shadow: 0 -20px 60px rgba(0,0,0,.15);
  transform: translateY(40px);
  transition: transform .3s cubic-bezier(.22,1,.36,1);
}
.modal-overlay.open .cart-sheet { transform: translateY(0); }
.cart-sheet::-webkit-scrollbar { width: 3px; }
.cart-sheet::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.cart-handle {
  width: 36px;
  height: 4px;
  background: var(--border2);
  border-radius: 4px;
  margin: 6px auto 18px;
}
.cart-sheet-title {
  font-size: 17px;
  font-weight: 800;
  margin-bottom: 16px;
  letter-spacing: -.025em;
  color: var(--text);
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 13px 0;
  border-bottom: 1px solid var(--border);
  animation: msg-in .22s cubic-bezier(.22,1,.36,1) both;
}
.cart-item:last-child { border-bottom: none; }

.cart-item-thumb {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--surface3) 0%, var(--brand-dim) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  overflow: hidden;
  border: 1px solid var(--border);
}
.cart-item-thumb img { width: 100%; height: 100%; object-fit: cover; }

.cart-item-name {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -.015em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cart-item-unit {
  font-size: 11.5px;
  color: var(--text3);
  margin-top: 2px;
  font-family: var(--mono);
  font-weight: 500;
}

.cart-qty {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-top: 7px;
}
.qty-btn {
  width: 27px;
  height: 27px;
  border-radius: 8px;
  border: 1.5px solid var(--border2);
  background: var(--surface2);
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;

<script>
// ══════════════════════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════════════════════
const API      = 'https://fypouhme3gqldqk6sk75b75udy0ltonb.lambda-url.ap-southeast-2.on.aws'
const params   = new URLSearchParams(location.search)
const AGENT_ID = params.get('agent') || ''

// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
let agent      = null
let allProds   = []
let cart       = []
let msgHistory = []
let sessionId  = null
let isTyping   = false

// ══════════════════════════════════════════════════════════════════════════════
// STREAM RENDERER
// ══════════════════════════════════════════════════════════════════════════════
class StreamRenderer {
  constructor(bubble) {
    this.bubble = bubble
    this.raw    = ''
    this.cursor = null
    this._rafId = null
    this._pendingRaw = ''
    this._dirty = false

    this.cursor = document.createElement('span')
    this.cursor.className = 'stream-cursor'
    this.cursor.setAttribute('aria-hidden', 'true')
  }

  push(token) {
    this._pendingRaw += token
    if (!this._dirty) {
      this._dirty = true
      this._rafId = requestAnimationFrame(() => this._flush())
    }
  }

  _flush() {
    this._dirty = false
    if (!this._pendingRaw) return
    this.raw += this._pendingRaw
    this._pendingRaw = ''
    this.bubble.innerHTML = this.raw
    this.bubble.appendChild(this.cursor)
    const msgs = document.getElementById('chat-messages')
    const dist = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight
    if (dist < 120) msgs.scrollTop = msgs.scrollHeight
  }

  finalize(finalHtml) {
    if (this._rafId) cancelAnimationFrame(this._rafId)
    this._dirty = false
    const html = finalHtml || this.raw
    this.bubble.innerHTML = html
    this.bubble.classList.remove('msg-bubble-streaming')
    wireProductCards(this.bubble)
    document.getElementById('chat-messages').scrollTop = 999999
  }

  error(msg) {
    if (this._rafId) cancelAnimationFrame(this._rafId)
    this.bubble.innerHTML = `<p style="color:var(--red);margin:0;font-size:13.5px;">⚠️ ${msg || 'Failed to get response.'}</p>`
    this.bubble.classList.remove('msg-bubble-streaming')
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
async function init() {
  if (!AGENT_ID) { showError('No agent specified in URL.'); return }
  try {
    const res = await fetch(`${API}/chat/${AGENT_ID}/config`)
    if (!res.ok) throw new Error(`Agent not found (${res.status})`)
    agent = await res.json()

    setupColors(agent)
    setupHeader(agent)

    document.getElementById('loading-screen').style.display  = 'none'
    document.getElementById('chat-messages').style.display   = 'flex'
    document.getElementById('chat-input-wrap').style.display = 'block'
    document.getElementById('chat-header').style.display     = 'flex'
    document.title = (agent.name || 'Chat') + ' — SupportGent'

    // Date separator
    addDateSeparator()
    addWelcomeMsg(agent.welcome_message || `Hi! I'm ${agent.name || 'your assistant'}. How can I help you today?`)

    if (agent.cached_topics?.length) renderTopics(agent.cached_topics)
    if (agent.shopping_enabled) loadProducts()

  } catch(e) {
    console.error('init error', e)
    showError('Failed to load agent. ' + (e.message || 'Please try again.'))
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// HEADER & COLORS
// ══════════════════════════════════════════════════════════════════════════════
function setupHeader(d) {
  document.getElementById('hdr-name').textContent = d.name || 'Agent'
  const av = document.getElementById('hdr-avatar')
  if (d.logo_base64) {
    av.innerHTML = `<img src="${d.logo_base64}" alt="${d.name}"/>`
  } else {
    av.textContent = (d.name?.[0]?.toUpperCase()) || '✦'
    if (d.brand_color) av.style.background = `linear-gradient(135deg, ${d.brand_color}, ${dimColor(d.brand_color)})`
  }
}

function setupColors(d) {
  if (!d.brand_color) return
  const c = d.brand_color
  const rgb = hexToRgb(c)
  const dark = dimColor(c)
  document.documentElement.style.setProperty('--brand', c)
  document.documentElement.style.setProperty('--brand-2', lightenColor(c, 20))
  document.documentElement.style.setProperty('--brand-dark', dark)
  if (rgb) {
    document.documentElement.style.setProperty('--brand-dim',     `rgba(${rgb},.08)`)
    document.documentElement.style.setProperty('--brand-glow',    `rgba(${rgb},.18)`)
    document.documentElement.style.setProperty('--brand-glow-lg', `rgba(${rgb},.28)`)
    document.documentElement.style.setProperty('--border',  `rgba(${rgb},.10)`)
    document.documentElement.style.setProperty('--border2', `rgba(${rgb},.15)`)
  }
  if (d.theme === 'dark') document.body.classList.add('theme-dark')
}

function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex)
  return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : null
}

function dimColor(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex)
  if (!r) return hex
  const darken = v => Math.max(0, Math.round(parseInt(v, 16) * .75))
  return `#${darken(r[1]).toString(16).padStart(2,'0')}${darken(r[2]).toString(16).padStart(2,'0')}${darken(r[3]).toString(16).padStart(2,'0')}`
}

function lightenColor(hex, amount) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex)
  if (!r) return hex
  const lighten = v => Math.min(255, Math.round(parseInt(v, 16) + amount))
  return `#${lighten(r[1]).toString(16).padStart(2,'0')}${lighten(r[2]).toString(16).padStart(2,'0')}${lighten(r[3]).toString(16).padStart(2,'0')}`
}

// ══════════════════════════════════════════════════════════════════════════════
// MESSAGE RENDERING
// ══════════════════════════════════════════════════════════════════════════════
function getTime() {
  return new Date().toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'})
}

function addDateSeparator() {
  const msgs = document.getElementById('chat-messages')
  const sep  = document.createElement('div')
  sep.className = 'date-sep'
  sep.textContent = new Date().toLocaleDateString('en', {weekday:'short', month:'short', day:'numeric'})
  msgs.appendChild(sep)
}

function addWelcomeMsg(text) {
  const msgs  = document.getElementById('chat-messages')
  const group = document.createElement('div')
  group.className = 'msg-group agent'
  const bubble = document.createElement('div')
  bubble.className = 'msg-bubble-welcome'
  bubble.textContent = text
  group.appendChild(bubble)
  const timeEl = document.createElement('div')
  timeEl.className = 'msg-time'
  timeEl.textContent = getTime()
  group.appendChild(timeEl)
  msgs.appendChild(group)
  msgs.scrollTop = msgs.scrollHeight
}

function addUserMsg(text) {
  const msgs  = document.getElementById('chat-messages')
  const group = document.createElement('div')
  group.className = 'msg-group user'
  const bubble = document.createElement('div')
  bubble.className = 'msg-bubble-user'
  bubble.textContent = text
  group.appendChild(bubble)
  const timeEl = document.createElement('div')
  timeEl.className = 'msg-time'
  timeEl.textContent = getTime()
  group.appendChild(timeEl)
  msgs.appendChild(group)
  msgs.scrollTop = msgs.scrollHeight
}

function createAgentBubble() {
  const msgs  = document.getElementById('chat-messages')
  const group = document.createElement('div')
  group.className = 'msg-group agent'
  const bubble = document.createElement('div')
  bubble.className = 'msg-bubble-agent msg-bubble-streaming'
  group.appendChild(bubble)
  const timeEl = document.createElement('div')
  timeEl.className = 'msg-time'
  timeEl.textContent = getTime()
  group.appendChild(timeEl)
  msgs.appendChild(group)
  return { group, bubble, timeEl }
}

// ══════════════════════════════════════════════════════════════════════════════
// TYPING INDICATOR
// ══════════════════════════════════════════════════════════════════════════════
function showTyping() {
  const msgs = document.getElementById('chat-messages')
  const wrap = document.createElement('div')
  wrap.className = 'msg-group agent typing-wrap'
  const ind = document.createElement('div')
  ind.className = 'typing-indicator show'
  ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>'
  wrap.appendChild(ind)
  msgs.appendChild(wrap)
  msgs.scrollTop = msgs.scrollHeight
  return wrap
}

// ══════════════════════════════════════════════════════════════════════════════
// TOPIC CHIPS
// ══════════════════════════════════════════════════════════════════════════════
function renderTopics(topics) {
  const wrap = document.getElementById('topics-wrap')
  wrap.innerHTML = ''
  topics.forEach((t, i) => {
    const btn = document.createElement('button')
    btn.className = 'topic-chip'
    btn.dataset.topicIdx = i
    btn.innerHTML = `<span class="chip-icon">${t.icon || '💬'}</span>${esc(t.title || t.question || '')}`
    btn.addEventListener('click', () => sendTopicChip(t))
    wrap.appendChild(btn)
  })
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function sendTopicChip(topic) {
  document.getElementById('topics-wrap').innerHTML = ''
  const question = topic.question || topic.title || ''
  sendMessageText(question, topic.suggested_prompt || '')
}

// ══════════════════════════════════════════════════════════════════════════════
// SEND
// ══════════════════════════════════════════════════════════════════════════════
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
}
function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 120) + 'px'
}

async function sendMessage() {
  const inp  = document.getElementById('chat-input')
  const text = inp.value.trim()
  if (!text || isTyping) return
  inp.value = ''; inp.style.height = 'auto'
  await sendMessageText(text, '')
}

async function sendMessageText(question, suggestedPrompt) {
  document.getElementById('topics-wrap').innerHTML = ''
  addUserMsg(question)
  msgHistory.push({ role:'user', content:question })

  isTyping = true
  document.getElementById('send-btn').disabled = true

  let streamOk = false
  try {
    streamOk = await streamResponse(question, suggestedPrompt)
  } catch(e) {
    console.warn('[stream failed]', e.message, '— falling back')
  }

  if (!streamOk) await nonStreamResponse(question, suggestedPrompt)

  isTyping = false
  document.getElementById('send-btn').disabled = false
  document.getElementById('chat-input').focus()
}

// ══════════════════════════════════════════════════════════════════════════════
// SSE STREAMING
// ══════════════════════════════════════════════════════════════════════════════
async function streamResponse(question, suggestedPrompt) {
  const { bubble } = createAgentBubble()
  const renderer = new StreamRenderer(bubble)

  const body = JSON.stringify({
    question,
    history:          msgHistory.slice(-20, -1),
    session_id:       sessionId || undefined,
    suggested_prompt: suggestedPrompt || undefined
  })

  let res
  try {
    res = await fetch(`${API}/chat/${AGENT_ID}/stream`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
      body
    })
  } catch(e) {
    renderer.error('Network error. Please check your connection.')
    throw e
  }

  if (!res.ok || !res.body) {
    renderer.error(`Server error (${res.status}). Please try again.`)
    throw new Error(`HTTP ${res.status}`)
  }

  const reader  = res.body.getReader()
  const decoder = new TextDecoder()
  let lineBuffer = ''
  let finalAnswer = ''
  let gotDone = false

  try {
    while (true) {
      const { value, done } = await reader.read()
      if (done) break
      lineBuffer += decoder.decode(value, { stream: true })
      let sepIdx
      while ((sepIdx = lineBuffer.indexOf('\n\n')) !== -1) {
        const eventBlock = lineBuffer.slice(0, sepIdx)
        lineBuffer = lineBuffer.slice(sepIdx + 2)
        if (eventBlock.startsWith(':')) continue
        for (const line of eventBlock.split('\n')) {
          if (!line.startsWith('data: ')) continue
          let evt
          try { evt = JSON.parse(line.slice(6)) } catch { continue }
          if (evt.type === 'chunk' && evt.html) renderer.push(evt.html)
          if (evt.type === 'done') {
            if (evt.session_id) sessionId = evt.session_id
            finalAnswer = evt.answer || ''
            gotDone = true
          }
          if (evt.type === 'error') { renderer.error(evt.message); return true }
        }
      }
    }
  } finally {
    reader.releaseLock()
  }

  if (gotDone) {
    renderer.finalize(finalAnswer)
    const plain = (finalAnswer || renderer.raw).replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim()
    msgHistory.push({ role:'assistant', content:plain })
  } else {
    renderer.finalize(renderer.raw)
    const plain = renderer.raw.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim()
    msgHistory.push({ role:'assistant', content:plain })
  }
  return true
}

// ══════════════════════════════════════════════════════════════════════════════
// NON-STREAMING FALLBACK
// ══════════════════════════════════════════════════════════════════════════════
async function nonStreamResponse(question, suggestedPrompt) {
  const typEl = showTyping()
  try {
    const res = await fetch(`${API}/chat/${AGENT_ID}`, {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({
        question,
        history:          msgHistory.slice(-20, -1),
        session_id:       sessionId || undefined,
        suggested_prompt: suggestedPrompt || undefined
      })
    })
    const d = await res.json()
    typEl.remove()
    const { bubble } = createAgentBubble()
    const answerHtml = d.answer || d.message || '<p style="color:var(--text2);">No response received.</p>'
    bubble.innerHTML = answerHtml
    bubble.classList.remove('msg-bubble-streaming')
    wireProductCards(bubble)
    document.getElementById('chat-messages').scrollTop = 999999
    msgHistory.push({ role:'assistant', content:answerHtml.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim() })
  } catch(e) {
    typEl.remove()
    const { bubble } = createAgentBubble()
    bubble.innerHTML = `<p style="color:var(--red);margin:0;">Sorry, I encountered an error. Please try again.</p>`
    bubble.classList.remove('msg-bubble-streaming')
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// PRODUCT CARD WIRING
// ══════════════════════════════════════════════════════════════════════════════
function wireProductCards(container) {
  container.querySelectorAll('.sg-product-card').forEach(card => {
    if (card.dataset.wired) return
    card.dataset.wired = '1'
    const id    = card.dataset.id
    const name  = card.dataset.name  || ''
    const price = parseFloat(card.dataset.price) || 0
    const image = card.dataset.image || ''
    const cur   = card.dataset.currency || currSym()
    if (!id) return
    const btn = document.createElement('button')
    btn.className = 'product-btn'
    btn.textContent = 'Add to Cart'
    btn.onclick = () => addToCart({ _id:id, name, price, image_url:image, currency:cur })
    card.appendChild(btn)
  })
}

// ══════════════════════════════════════════════════════════════════════════════
// PRODUCTS
// ══════════════════════════════════════════════════════════════════════════════
function currSym() {
  return (agent?.payment_currency || 'INR') === 'USD' ? '$' : '₹'
}

async function loadProducts() {
  try {
    const res = await fetch(`${API}/chat/${AGENT_ID}/products`)
    if (!res.ok) return
    allProds = await res.json()
  } catch(e) {
    console.warn('[products]', e.message)
  }
}

function renderProductsInChat(products) {
  if (!products?.length) return
  const msgs = document.getElementById('chat-messages')
  const wrap = document.createElement('div')
  wrap.className = 'msg-group agent'
  const row  = document.createElement('div')
  row.className = 'products-row'
  products.slice(0,6).forEach(p => {
    const card = document.createElement('div')
    card.className = 'product-card'
    card.innerHTML = `
      ${p.image_url
        ? `<img src="${p.image_url}" class="product-img" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''
      }
      <div class="product-img-placeholder" style="${p.image_url?'display:none':''}">📦</div>
      <div class="product-info">
        <div class="product-name" title="${p.name}">${p.name}</div>
        <div class="product-price">${currSym()}${p.price}</div>
      </div>
      <button class="product-btn" onclick='addToCart(${JSON.stringify({_id:p._id?.toString(),name:p.name,price:p.price,image_url:p.image_url||""})})'>Add to Cart</button>`
    row.appendChild(card)
  })
  wrap.appendChild(row)
  msgs.appendChild(wrap)
  msgs.scrollTop = msgs.scrollHeight
}

// ══════════════════════════════════════════════════════════════════════════════
// CART
// ══════════════════════════════════════════════════════════════════════════════
function addToCart(product) {
  const existing = cart.find(i => i._id === product._id)
  if (existing) { existing.qty++ }
  else { cart.push({ ...product, qty:1 }) }
  updateCartBar()
  showChatMsg(`✅ <strong>${product.name}</strong> added to cart. ${cart.reduce((a,i)=>a+i.qty,0)} item(s) total.`)
}

function updateCartBar() {
  const total = cart.reduce((a,i) => a + i.qty, 0)
  document.getElementById('cart-count').textContent = total
  document.getElementById('cart-bar').classList.toggle('show', total > 0)
}

function openCart() {
  const cur = currSym()
  document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
    <div class="cart-item">
      <div class="cart-item-thumb">
        ${item.image_url ? `<img src="${item.image_url}" alt="">` : '📦'}
      </div>
      <div style="flex:1;min-width:0;">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-unit">${cur}${item.price} each</div>
        <div class="cart-qty">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty-label">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
      <div class="cart-item-total">${cur}${(item.price * item.qty).toFixed(2)}</div>
    </div>`).join('')

  const total = cart.reduce((a,i) => a + (i.price * i.qty), 0)
  document.getElementById('cart-total').textContent = currSym() + total.toFixed(2)
  document.getElementById('cart-overlay').classList.add('open')
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open')
}

function changeQty(idx, delta) {
  cart[idx].qty += delta
  if (cart[idx].qty <= 0) cart.splice(idx, 1)
  updateCartBar()
  if (cart.length) openCart(); else closeCart()
}

// ══════════════════════════════════════════════════════════════════════════════
// CHECKOUT
// ══════════════════════════════════════════════════════════════════════════════
async function checkout() {
  if (!cart.length) return
  closeCart()

  const msgs = document.getElementById('chat-messages')
  const prep = document.createElement('div')
  prep.className = 'msg-group agent'
  const prepBub = document.createElement('div')
  prepBub.className = 'msg-bubble-agent'
  prepBub.innerHTML = '<p style="margin:0;color:var(--text2);">⏳ Preparing your order…</p>'
  prep.appendChild(prepBub)
  msgs.appendChild(prep)
  msgs.scrollTop = msgs.scrollHeight

  try {
    const res = await fetch(`${API}/chat/${AGENT_ID}/checkout`, {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({
        items: cart.map(i => ({ product_id:i._id, qty:i.qty })),
        customer: {}
      })
    })
    const d = await res.json()
    prep.remove()

    if (!res.ok || d.error) { showChatMsg(`❌ ${d.error || 'Unable to create order.'}`); return }

    if (d.order_id && d.key_id) {
      const rz = new Razorpay({
        key:      d.key_id,
        amount:   d.amount,
        currency: d.currency || 'INR',
        name:     agent?.name || 'Store',
        order_id: d.order_id,
        theme:    { color: agent?.brand_color || '#6C5FF5' },
        handler:  async (resp) => {
          try {
            const vres = await fetch(`${API}/chat/${AGENT_ID}/verify-payment`, {
              method:  'POST',
              headers: {'Content-Type':'application/json'},
              body:    JSON.stringify({
                razorpay_order_id:   resp.razorpay_order_id,
                razorpay_payment_id: resp.razorpay_payment_id,
                razorpay_signature:  resp.razorpay_signature,
                order_db_id:         d.order_db_id
              })
            })
            const vd = await vres.json()
            if (vres.ok && !vd.error) {
              cart = []; updateCartBar()
              showChatMsg('✅ Payment successful! Your order has been placed. Thank you for shopping with us! 🎉')
            } else {
              showChatMsg(`❌ Payment verification failed: ${vd.error || 'Unknown error'}`)
            }
          } catch(e) {
            showChatMsg('❌ Payment verification failed. Please contact support.')
          }
        },
        modal: { ondismiss: () => showChatMsg('Payment was cancelled. Your cart is still saved — tap Cart to try again.') }
      })
      rz.open()
    } else {
      showChatMsg(d.message || '❌ Unable to process payment. Please try again.')
    }
  } catch(e) {
    prep.remove()
    showChatMsg('❌ Checkout failed. Please try again.')
    console.error('[checkout]', e)
  }
}

function showChatMsg(text) {
  const msgs  = document.getElementById('chat-messages')
  const group = document.createElement('div')
  group.className = 'msg-group agent'
  const bub = document.createElement('div')
  bub.className = 'msg-bubble-agent'
  bub.innerHTML = `<p style="margin:0;font-size:13.5px;">${text}</p>`
  group.appendChild(bub)
  msgs.appendChild(group)
  msgs.scrollTop = msgs.scrollHeight
}

// ══════════════════════════════════════════════════════════════════════════════
// ERROR SCREEN
// ══════════════════════════════════════════════════════════════════════════════
function showError(msg) {
  document.getElementById('loading-screen').innerHTML = `
    <div style="text-align:center;padding:40px 24px;">
      <div style="font-size:44px;margin-bottom:16px;">⚠️</div>
      <div style="font-size:14.5px;font-weight:700;margin-bottom:8px;letter-spacing:-.02em;">Something went wrong</div>
      <div style="font-size:12.5px;color:var(--text3);line-height:1.65;">${msg}</div>
    </div>`
}

// BOOT
init()
</script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
