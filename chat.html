<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand:#6C5FF5;--brand-2:#8B7FF8;--brand-dark:#4B40D9;
      --brand-dim:rgba(108,95,245,.08);--brand-glow:rgba(108,95,245,.20);--brand-glow-lg:rgba(108,95,245,.32);
      --bg:#F0F1FA;--surface:rgba(255,255,255,0.90);--surface-solid:#FFFFFF;
      --surface2:rgba(244,245,252,0.75);--surface3:#EAEBff;
      --glass:rgba(255,255,255,0.76);--glass-border:rgba(255,255,255,0.92);
      --text:#0B0D1A;--text2:#484E70;--text3:#9097BC;--text4:#B8BDDA;
      --border:rgba(108,95,245,.10);--border2:rgba(108,95,245,.16);--border3:rgba(0,0,0,.055);
      --green:#059669;--green-dim:rgba(5,150,105,.09);--red:#DC2626;--red-dim:rgba(220,38,38,.09);
      --r:20px;--r-sm:13px;--r-xs:8px;
      --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
      --sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
      --sh-md:0 4px 18px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);
      --sh-lg:0 14px 44px rgba(0,0,0,.11),0 4px 14px rgba(0,0,0,.06);
      --sh-brand:0 4px 22px var(--brand-glow),0 1px 4px rgba(0,0,0,.06);
      --sh-brand-lg:0 8px 36px var(--brand-glow-lg),0 2px 8px rgba(0,0,0,.08);
    }
    .theme-dark {
      --bg:#07080E;--surface:rgba(14,16,26,0.92);--surface-solid:#0D1020;
      --surface2:rgba(18,21,34,0.85);--surface3:#181B30;
      --glass:rgba(12,14,24,0.82);--glass-border:rgba(255,255,255,0.055);
      --text:#ECEEF9;--text2:#7B82AA;--text3:#474D72;--text4:#2E3458;
      --border:rgba(255,255,255,.05);--border2:rgba(255,255,255,.09);--border3:rgba(255,255,255,.065);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden;}

    /* HEADER */
    .chat-header{background:var(--glass);backdrop-filter:blur(24px) saturate(1.9);-webkit-backdrop-filter:blur(24px) saturate(1.9);border-bottom:1px solid var(--glass-border);padding:13px 16px 12px;display:flex;align-items:center;gap:11px;flex-shrink:0;position:relative;z-index:20;box-shadow:var(--sh-sm);}
    .chat-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,var(--brand),var(--brand-2),#A78BFA,#7EC8F8,var(--brand));background-size:250% 100%;animation:hdr-shimmer 5s linear infinite;}
    @keyframes hdr-shimmer{0%{background-position:0% 0%}100%{background-position:250% 0%}}
    .agent-avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;box-shadow:var(--sh-brand);position:relative;transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
    .agent-avatar:hover{transform:scale(1.06);}
    .agent-avatar::after{content:'';position:absolute;inset:0;border-radius:inherit;border:1.5px solid rgba(255,255,255,.22);pointer-events:none;}
    .agent-avatar img{width:100%;height:100%;object-fit:cover;}
    .agent-info{flex:1;min-width:0;}
    .agent-name{font-size:14px;font-weight:700;letter-spacing:-.025em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .agent-status{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--green);margin-top:2px;font-weight:600;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2.5px var(--green-dim);animation:sdot 2.6s ease infinite;}
    @keyframes sdot{0%,100%{box-shadow:0 0 0 2.5px var(--green-dim)}50%{box-shadow:0 0 0 5px var(--green-dim)}}
    .hdr-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .powered-by{font-size:9.5px;color:var(--text4);text-align:right;line-height:1.55;letter-spacing:.01em;}
    .powered-by a{color:var(--brand);font-weight:700;text-decoration:none;transition:opacity .15s;}
    .powered-by a:hover{opacity:.7;}

    /* TIMING BADGE */
    .msg-timing{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.02em;margin-top:4px;padding:3px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;opacity:0;transform:translateY(4px);transition:opacity .3s ease,transform .3s ease;cursor:default;user-select:none;}
    .msg-timing.visible{opacity:1;transform:translateY(0);}
    .msg-timing .timing-sep{width:3px;height:3px;border-radius:50%;background:var(--text4);flex-shrink:0;}
    .msg-timing .timing-fast{color:var(--green);}
    .msg-timing .timing-slow{color:var(--red);}
    .msg-timing .timing-mid{color:var(--brand);}

    /* MESSAGES */
    .chat-messages{flex:1;overflow-y:auto;padding:20px 14px 10px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth;}
    .chat-messages::-webkit-scrollbar{width:3px;}
    .chat-messages::-webkit-scrollbar-track{background:transparent;}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
    .chat-messages::-webkit-scrollbar-thumb:hover{background:var(--brand);}
    .msg-group{display:flex;flex-direction:column;gap:2px;animation:msgIn .3s cubic-bezier(.22,1,.36,1) both;}
    .msg-group.user{align-items:flex-end;}
    .msg-group.agent{align-items:flex-start;}
    @keyframes msgIn{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* BUBBLES */
    .msg-bubble-user{max-width:80%;padding:11px 16px;border-radius:20px 20px 4px 20px;font-size:13.5px;line-height:1.65;word-break:break-word;background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;box-shadow:var(--sh-brand);letter-spacing:-.005em;position:relative;}
    .msg-bubble-user::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.13) 0%,transparent 65%);pointer-events:none;}
    .msg-bubble-agent{max-width:92%;padding:13px 16px;border-radius:4px 20px 20px 20px;background:var(--surface-solid);border:1px solid var(--border3);color:var(--text);box-shadow:var(--sh-md);word-break:break-word;overflow-x:auto;font-size:13.5px;line-height:1.72;letter-spacing:-.005em;transition:border-color .2s,box-shadow .2s;}
    .msg-bubble-agent p{margin:0 0 .65em;}
    .msg-bubble-agent p:last-child{margin-bottom:0;}
    .msg-bubble-agent strong{font-weight:700;color:var(--text);}
    .msg-bubble-agent a{color:var(--brand);text-decoration:none;font-weight:500;border-bottom:1px solid var(--brand-dim);transition:border-color .15s;}
    .msg-bubble-agent a:hover{border-color:var(--brand);}
    .msg-bubble-welcome{max-width:100%;padding:16px 18px;border-radius:18px;background:linear-gradient(135deg,var(--brand-dim) 0%,rgba(108,95,245,.03) 100%);border:1px solid var(--border2);color:var(--text);font-size:13.5px;line-height:1.78;letter-spacing:-.005em;position:relative;overflow:hidden;}
    .msg-bubble-welcome::before{content:'';position:absolute;top:-24px;left:-24px;width:90px;height:90px;background:radial-gradient(circle,var(--brand-glow) 0%,transparent 70%);pointer-events:none;}

    /* SALES MESSAGE BUBBLE - plain text */
    .msg-bubble-sales{max-width:92%;padding:13px 16px;border-radius:4px 20px 20px 20px;background:var(--surface-solid);border:1px solid var(--border3);color:var(--text);box-shadow:var(--sh-md);font-size:13.5px;line-height:1.72;letter-spacing:-.005em;}

    /* DATE SEP */
    .date-sep{display:flex;align-items:center;gap:10px;margin:8px 0 4px;color:var(--text3);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
    .date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border);}
    .msg-time{font-size:9.5px;color:var(--text4);padding:0 4px;letter-spacing:.02em;font-weight:500;}

    /* STREAMING */
    .stream-cursor{display:inline-block;width:2px;height:.9em;background:var(--brand);border-radius:2px;vertical-align:text-bottom;margin-left:2px;animation:blink-cur .5s step-start infinite;}
    @keyframes blink-cur{50%{opacity:0}}
    .msg-bubble-streaming{border-color:var(--brand)!important;box-shadow:0 0 0 1px var(--brand-glow),var(--sh-md)!important;}

    /* TYPING */
    .typing-indicator{display:none;align-items:center;gap:5px;padding:13px 16px;background:var(--surface-solid);border:1px solid var(--border3);border-radius:4px 18px 18px 18px;box-shadow:var(--sh-sm);}
    .typing-indicator.show{display:flex;}
    .typing-dot{width:5.5px;height:5.5px;border-radius:50%;background:var(--text4);animation:tdot .9s infinite ease-in-out;}
    .typing-dot:nth-child(2){animation-delay:.18s;}
    .typing-dot:nth-child(3){animation-delay:.36s;}
    @keyframes tdot{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1;background:var(--brand)}}

    /* TOPICS */
    .topics-wrap{display:flex;gap:7px;padding:10px 14px 4px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
    .topics-wrap::-webkit-scrollbar{display:none;}
    .topic-chip{padding:8px 14px;border:1.5px solid var(--border2);border-radius:30px;background:var(--surface-solid);color:var(--brand);font-size:11.5px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .18s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0;box-shadow:var(--sh-sm);letter-spacing:-.01em;}
    .topic-chip:hover{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:var(--sh-brand);transform:translateY(-2px);}
    .topic-chip:active{transform:translateY(0) scale(.97);}

    /* ═══════════════════════════════════════════════════════════════
       PRODUCT CARDS — v3.0 native rendering
    ═══════════════════════════════════════════════════════════════ */
    .products-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 8px 0 4px;
      scrollbar-width: none;
      max-width: 92%;
    }
    .products-row::-webkit-scrollbar { display: none; }

    .product-card {
      min-width: 148px; max-width: 148px;
      background: var(--surface-solid);
      border: 1px solid var(--border3);
      border-radius: var(--r);
      overflow: hidden;
      flex-shrink: 0;
      transition: all .22s cubic-bezier(.22,1,.36,1);
      box-shadow: var(--sh-sm);
      display: flex;
      flex-direction: column;
      animation: cardIn .35s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(12px) scale(.95); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .product-card:nth-child(1) { animation-delay: 0ms; }
    .product-card:nth-child(2) { animation-delay: 60ms; }
    .product-card:nth-child(3) { animation-delay: 120ms; }
    .product-card:nth-child(4) { animation-delay: 180ms; }
    .product-card:hover {
      border-color: var(--brand);
      transform: translateY(-4px);
      box-shadow: var(--sh-brand-lg);
    }
    .product-img-wrap {
      width: 100%; height: 100px;
      overflow: hidden; position: relative;
      background: linear-gradient(135deg,var(--surface3),var(--brand-dim));
    }
    .product-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform .35s cubic-bezier(.22,1,.36,1);
    }
    .product-card:hover .product-img { transform: scale(1.07); }
    .product-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      background: linear-gradient(135deg,var(--surface3),var(--brand-dim));
    }

    /* category badge on image */
    .product-cat-badge {
      position: absolute; top: 7px; left: 7px;
      background: rgba(0,0,0,.52);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #fff;
      font-size: 9px; font-weight: 700; letter-spacing: .04em;
      padding: 2px 7px; border-radius: 20px;
      text-transform: uppercase;
      pointer-events: none;
    }

    .product-info { padding: 10px 11px 0; flex: 1; }
    .product-name {
      font-size: 11.5px; font-weight: 700;
      margin-bottom: 3px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      letter-spacing: -.01em;
      color: var(--text);
    }
    .product-desc {
      font-size: 10px; color: var(--text3); line-height: 1.45;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-price {
      font-size: 15px; font-weight: 800;
      color: var(--brand);
      font-family: var(--mono);
      letter-spacing: -.02em;
      margin-bottom: 8px;
    }
    .product-btn {
      display: block; width: 100%;
      text-align: center;
      background: linear-gradient(135deg,var(--brand),var(--brand-dark));
      color: #fff; padding: 9px;
      font-size: 11px; font-weight: 700;
      font-family: var(--font);
      border: none; cursor: pointer;
      transition: opacity .15s, transform .1s;
      letter-spacing: .01em;
      margin-top: auto;
    }
    .product-btn:hover { opacity:.88; }
    .product-btn:active { transform: scale(.97); }
    .product-btn.in-cart {
      background: var(--green);
    }

    /* Checkout action card — shown when AI says action:'checkout' */
    .checkout-action-card {
      max-width: 92%;
      background: linear-gradient(135deg,var(--brand-dim),rgba(108,95,245,.04));
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-top: 6px;
      animation: msgIn .3s cubic-bezier(.22,1,.36,1) both;
    }
    .checkout-action-card-title {
      font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px;
      display: flex; align-items: center; gap: 7px;
    }
    .checkout-action-card p {
      font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 12px;
    }
    .checkout-action-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg,var(--brand),var(--brand-dark));
      color: #fff; border: none; border-radius: 10px;
      padding: 10px 18px;
      font-size: 12.5px; font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: all .18s cubic-bezier(.22,1,.36,1);
      box-shadow: var(--sh-brand);
    }
    .checkout-action-btn:hover { transform: translateY(-1px); box-shadow: var(--sh-brand-lg); }
    .checkout-action-btn:active { transform: scale(.97); }

    /* INPUT */
    .chat-input-wrap{background:var(--glass);backdrop-filter:blur(24px) saturate(1.9);-webkit-backdrop-filter:blur(24px) saturate(1.9);border-top:1px solid var(--glass-border);padding:10px 12px 14px;flex-shrink:0;}
    .chat-input-row{display:flex;gap:8px;align-items:center;background:var(--surface-solid);border:1.5px solid var(--border2);border-radius:18px;padding:6px 6px 6px 13px;min-height:50px;transition:border-color .2s,box-shadow .2s;box-shadow:var(--sh-sm);}
    .chat-input-row:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-dim),var(--sh-brand);}
    .chat-input-row.listening{border-color:#ef4444!important;box-shadow:0 0 0 3px rgba(239,68,68,.1)!important;align-items:center;}
    .chat-input{flex:1;min-height:26px;max-height:120px;padding:2px 0;border:none;background:transparent;color:var(--text);font-size:13.5px;font-family:var(--font);resize:none;outline:none;line-height:1.55;letter-spacing:-.008em;align-self:center;}
    .chat-input::placeholder{color:var(--text4);}
    .input-tools{display:flex;align-items:center;gap:5px;flex-shrink:0;}

    /* Language */
    .lang-wrap{position:relative;flex-shrink:0;}
    .lang-btn{height:36px;min-width:64px;padding:0 10px;border-radius:10px;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-size:11.5px;font-weight:700;color:var(--text2);font-family:var(--font);transition:all .15s cubic-bezier(.22,1,.36,1);white-space:nowrap;user-select:none;}
    .lang-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-dim);}
    .lang-btn.open{border-color:var(--brand);color:var(--brand);background:var(--brand-dim);}
    .lang-btn.recording{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.07);color:#ef4444;}
    .lb-flag{font-size:14px;line-height:1;}
    .lb-code{font-size:11px;font-weight:800;letter-spacing:.03em;}
    .lb-arrow{font-size:8px;opacity:.5;margin-left:1px;transition:transform .15s;}
    .lang-btn.open .lb-arrow{transform:rotate(180deg);}
    .rec-pulse{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:recP 1s ease-in-out infinite;flex-shrink:0;display:none;}
    .lang-btn.recording .rec-pulse{display:block;}
    @keyframes recP{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
    .lang-dropdown{position:absolute;bottom:calc(100% + 8px);right:0;background:var(--surface-solid);border:1px solid var(--border2);border-radius:16px;padding:8px 5px;min-width:200px;max-height:300px;overflow-y:auto;box-shadow:var(--sh-lg);z-index:9999;display:none;}
    .lang-dropdown::-webkit-scrollbar{width:3px;}
    .lang-dropdown::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
    .lang-dropdown.open{display:block;animation:ddUp .15s ease;}
    @keyframes ddUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .lang-dd-head{padding:3px 10px 7px;font-size:9.5px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
    .lang-dd-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:9px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--text2);transition:background .1s;}
    .lang-dd-item:hover{background:var(--surface2);color:var(--text);}
    .lang-dd-item.active{background:var(--brand-dim);color:var(--brand);}
    .lang-dd-item .dd-flag{font-size:16px;flex-shrink:0;}
    .lang-dd-item .dd-name{flex:1;}
    .lang-dd-item .dd-check{font-size:12px;color:var(--brand);opacity:0;}
    .lang-dd-item.active .dd-check{opacity:1;}
    .lang-dd-sep{height:1px;background:var(--border);margin:4px 6px;}

    /* Mic */
    .mic-btn{width:36px;height:36px;border-radius:10px;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:all .18s cubic-bezier(.22,1,.36,1);}
    .mic-btn:hover{border-color:var(--brand);background:var(--brand-dim);}
    .mic-btn.recording{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.55);animation:micGlow 1.2s ease-in-out infinite;}
    @keyframes micGlow{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.45)}50%{box-shadow:0 0 0 7px rgba(239,68,68,0)}}
    .mic-btn:disabled{opacity:.3;cursor:not-allowed;}

    /* Send */
    .send-btn{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s cubic-bezier(.22,1,.36,1);box-shadow:0 2px 12px var(--brand-glow);}
    .send-btn:hover{transform:scale(1.08);box-shadow:var(--sh-brand);}
    .send-btn:active{transform:scale(.94);}
    .send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
    .send-btn svg{color:#fff;}

    /* Voice wave */
    .voice-wave{display:none;align-items:center;gap:3px;flex:1;padding:0 4px 0 0;overflow:hidden;}
    .chat-input-row.listening .voice-wave{display:flex;}
    .chat-input-row.listening .chat-input{display:none;}
    .wave-bar{width:3px;min-width:3px;border-radius:3px;background:var(--brand);flex-shrink:0;animation:waveBar .8s ease-in-out infinite;}
    .wave-bar:nth-child(1){height:8px;animation-delay:0s;}
    .wave-bar:nth-child(2){height:14px;animation-delay:.1s;}
    .wave-bar:nth-child(3){height:20px;animation-delay:.2s;}
    .wave-bar:nth-child(4){height:14px;animation-delay:.3s;}
    .wave-bar:nth-child(5){height:8px;animation-delay:.4s;}
    .voice-wave .voice-label{font-size:12px;font-weight:600;color:#ef4444;margin-left:6px;white-space:nowrap;animation:voicePulse 1.2s ease infinite;}
    @keyframes waveBar{0%,100%{transform:scaleY(.45);opacity:.45}50%{transform:scaleY(1);opacity:1}}
    @keyframes voicePulse{0%,100%{opacity:1}50%{opacity:.35}}

    /* Voice interim */
    .voice-interim{display:none;position:absolute;bottom:calc(100% + 10px);left:14px;right:14px;background:var(--surface-solid);border:1px solid var(--border2);border-radius:14px;padding:10px 14px;font-size:13px;font-weight:500;color:var(--text2);box-shadow:var(--sh-md);z-index:10;animation:fadeSlideUp .18s ease;pointer-events:none;line-height:1.5;max-height:80px;overflow:hidden;}
    .voice-interim.show{display:block;}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .voice-interim-live{color:var(--text3);}
    .voice-interim-final{color:var(--text);font-weight:600;}
    .input-inner{position:relative;}

    /* CART BAR */
    .cart-bar{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;padding:11px 20px;display:none;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;flex-shrink:0;cursor:pointer;transition:opacity .15s;letter-spacing:-.01em;box-shadow:0 -4px 22px var(--brand-glow);animation:cartIn .3s cubic-bezier(.22,1,.36,1);}
    @keyframes cartIn{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    .cart-bar.show{display:flex;}
    .cart-bar:hover{opacity:.9;}
    .cart-count{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:1px 9px;font-size:11px;font-weight:800;margin-left:6px;font-family:var(--mono);}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(11,13,26,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:100;display:flex;align-items:flex-end;justify-content:center;visibility:hidden;opacity:0;transition:opacity .25s,visibility .25s;}
    .modal-overlay.open{visibility:visible;opacity:1;}
    .cart-sheet{background:var(--surface-solid);border-radius:26px 26px 0 0;width:100%;max-width:480px;max-height:84vh;overflow-y:auto;padding:6px 20px 32px;box-shadow:0 -20px 60px rgba(0,0,0,.14);transform:translateY(40px);transition:transform .32s cubic-bezier(.22,1,.36,1);}
    .modal-overlay.open .cart-sheet{transform:translateY(0);}
    .cart-sheet::-webkit-scrollbar{width:3px;}
    .cart-sheet::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
    .cart-handle{width:34px;height:4px;background:var(--border2);border-radius:4px;margin:6px auto 16px;}
    .cart-sheet-title{font-size:16.5px;font-weight:800;margin-bottom:14px;letter-spacing:-.025em;}
    .cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);animation:msgIn .22s cubic-bezier(.22,1,.36,1) both;}
    .cart-item:last-child{border-bottom:none;}
    .cart-item-thumb{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,var(--surface3),var(--brand-dim));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;border:1px solid var(--border);}
    .cart-item-thumb img{width:100%;height:100%;object-fit:cover;}
    .cart-item-name{font-size:13px;font-weight:700;letter-spacing:-.015em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cart-item-unit{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono);font-weight:500;}
    .cart-qty{display:flex;align-items:center;gap:8px;margin-top:6px;}
    .qty-btn{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .14s;color:var(--text2);font-family:var(--font);}
    .qty-btn:hover{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 2px 8px var(--brand-glow);}
    .qty-label{font-size:13px;font-weight:700;min-width:20px;text-align:center;font-family:var(--mono);}
    .cart-item-total{font-size:14px;font-weight:800;font-family:var(--mono);white-space:nowrap;letter-spacing:-.02em;}
    .cart-footer{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
    .cart-total-label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.02em;text-transform:uppercase;margin-bottom:3px;}
    .cart-total-amount{font-size:24px;font-weight:800;font-family:var(--mono);letter-spacing:-.03em;}
    .checkout-btn{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;border:none;border-radius:14px;padding:12px 24px;font-size:13.5px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .18s cubic-bezier(.22,1,.36,1);box-shadow:var(--sh-brand);letter-spacing:-.01em;}
    .checkout-btn:hover{transform:translateY(-1px);box-shadow:var(--sh-brand-lg);}
    .checkout-btn:active{transform:scale(.97);}

    /* EMPTY CART STATE */
    .cart-empty{text-align:center;padding:32px 20px;color:var(--text3);}
    .cart-empty-icon{font-size:42px;margin-bottom:12px;}
    .cart-empty-text{font-size:13px;font-weight:600;color:var(--text3);}

    /* LOADING */
    .loading-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
    .spin-ring{width:36px;height:36px;border:2.5px solid var(--surface3);border-top-color:var(--brand);border-radius:50%;animation:spin .75s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-label{font-size:12px;color:var(--text3);font-weight:500;letter-spacing:.01em;}

    /* TOAST NOTIFICATION */
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;padding:9px 16px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;pointer-events:none;opacity:0;z-index:999;transition:all .25s cubic-bezier(.22,1,.36,1);}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="chat-header" id="chat-header" style="display:none;">
    <div class="agent-avatar" id="hdr-avatar">✦</div>
    <div class="agent-info">
      <div class="agent-name" id="hdr-name">Agent</div>
      <div class="agent-status"><span class="status-dot"></span>Online</div>
    </div>
    <div class="hdr-actions">
      <div class="powered-by">Powered by<br><a href="https://supportagent.aasaitech.in" target="_blank" rel="noopener">SupportGent</a></div>
    </div>
  </div>

  <!-- LOADING -->
  <div class="loading-screen" id="loading-screen">
    <div class="spin-ring"></div>
    <div class="loading-label">Loading agent…</div>
  </div>

  <!-- MESSAGES -->
  <div class="chat-messages" id="chat-messages" style="display:none;"></div>

  <!-- TOPIC CHIPS -->
  <div class="topics-wrap" id="topics-wrap"></div>

  <!-- CART BAR -->
  <div class="cart-bar" id="cart-bar" onclick="openCart()">
    <span style="display:flex;align-items:center;gap:2px;">🛒 Cart <span class="cart-count" id="cart-count">0</span></span>
    <span style="font-size:11.5px;opacity:.85;letter-spacing:.01em;">View &amp; Checkout →</span>
  </div>

  <!-- INPUT AREA -->
  <div class="chat-input-wrap" id="chat-input-wrap" style="display:none;">
    <div class="input-inner">
      <div class="voice-interim" id="voice-interim">
        <span class="voice-interim-final" id="voice-final-text"></span><span class="voice-interim-live" id="voice-interim-text"></span>
      </div>
      <div class="chat-input-row" id="input-row">
        <div class="voice-wave" id="voice-wave">
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div>
          <span class="voice-label">Listening…</span>
        </div>
        <textarea class="chat-input" id="chat-input" placeholder="Ask anything…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="input-tools">
          <div class="lang-wrap" id="langWrap">
            <button class="lang-btn" id="langBtn" onclick="toggleLangDD()" title="Voice language">
              <span class="rec-pulse"></span>
              <span class="lb-flag" id="lbFlag">🇮🇳</span>
              <span class="lb-code" id="lbCode">EN</span>
              <span class="lb-arrow">▼</span>
            </button>
            <div class="lang-dropdown" id="langDropdown"></div>
          </div>
          <button class="mic-btn" id="mic-btn" onclick="toggleVoice()" title="Voice input">
            <span id="mic-icon">🎙</span>
          </button>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- CART SHEET -->
  <div class="modal-overlay" id="cart-overlay" onclick="if(event.target===this)closeCart()">
    <div class="cart-sheet">
      <div class="cart-handle"></div>
      <div class="cart-sheet-title">🛒 Your Cart</div>
      <div id="cart-items"></div>
      <div class="cart-footer">
        <div>
          <div class="cart-total-label">Total</div>
          <div class="cart-total-amount" id="cart-total">₹0</div>
        </div>
        <button class="checkout-btn" onclick="checkout()">Checkout →</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ══════════════════════════════════════════════════════════════════
    // CONFIG
    // ══════════════════════════════════════════════════════════════════
    const API      = 'https://fypouhme3gqldqk6sk75b75udy0ltonb.lambda-url.ap-southeast-2.on.aws'
    const params   = new URLSearchParams(location.search)
    const AGENT_ID = params.get('agent') || ''

    // ══════════════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════════════
    let agent     = null
    let allProds  = []          // full product objects from /products
    let prodMap   = {}          // id → product object for O(1) lookup
    let cart      = []
    let msgHistory = []         // { role, content, products? }
    let sessionId = null
    let isTyping  = false
    let agentType = 'general'

    // ══════════════════════════════════════════════════════════════════
    // STREAM RENDERER — HTML streaming (non-sales agents)
    // ══════════════════════════════════════════════════════════════════
    class StreamRenderer {
      constructor(bubble) {
        this.bubble = bubble
        this.raw = ''
        this.cursor = null
        this._rafId = null
        this._pendingRaw = ''
        this._dirty = false
        this.cursor = document.createElement('span')
        this.cursor.className = 'stream-cursor'
        this.cursor.setAttribute('aria-hidden','true')
      }
      push(token) {
        this._pendingRaw += token
        if (!this._dirty) { this._dirty = true; this._rafId = requestAnimationFrame(() => this._flush()) }
      }
      _flush() {
        this._dirty = false
        if (!this._pendingRaw) return
        this.raw += this._pendingRaw
        this._pendingRaw = ''
        this.bubble.innerHTML = this.raw
        this.bubble.appendChild(this.cursor)
        const msgs = document.getElementById('chat-messages')
        const dist = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight
        if (dist < 140) msgs.scrollTop = msgs.scrollHeight
      }
      finalize(finalHtml) {
        if (this._rafId) cancelAnimationFrame(this._rafId)
        this._dirty = false
        this.bubble.innerHTML = finalHtml || this.raw
        this.bubble.classList.remove('msg-bubble-streaming')
        document.getElementById('chat-messages').scrollTop = 999999
      }
      error(msg) {
        if (this._rafId) cancelAnimationFrame(this._rafId)
        this.bubble.innerHTML = `<p style="color:var(--red);margin:0;font-size:13.5px;">⚠️ ${msg||'Failed to get response.'}</p>`
        this.bubble.classList.remove('msg-bubble-streaming')
      }
    }

    // ══════════════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════════════
    async function init() {
      if (!AGENT_ID) { showError('No agent specified in URL.'); return }
      try {
        const res = await fetch(`${API}/chat/${AGENT_ID}/config`)
        if (!res.ok) throw new Error(`Agent not found (${res.status})`)
        agent = await res.json()
        agentType = agent.agent_type || 'general'

        setupColors(agent)
        setupHeader(agent)

        document.getElementById('loading-screen').style.display = 'none'
        document.getElementById('chat-messages').style.display = 'flex'
        document.getElementById('chat-input-wrap').style.display = 'block'
        document.getElementById('chat-header').style.display = 'flex'
        document.title = (agent.name || 'Chat') + ' — SupportGent'

        addDateSeparator()
        addWelcomeMsg(agent.welcome_message || `Hi! I'm ${agent.name || 'your assistant'}. How can I help you today?`)

        if (agent.cached_topics?.length) renderTopics(agent.cached_topics)

        // Always load products for sales agents (needed for card rendering)
        if (agent.shopping_enabled || agentType === 'sales') loadProducts()

        initVoice()
      } catch(e) {
        console.error('init error',e)
        showError('Failed to load agent. ' + (e.message||'Please try again.'))
      }
    }

    // ══════════════════════════════════════════════════════════════════
    // HEADER & COLORS
    // ══════════════════════════════════════════════════════════════════
    function setupHeader(d) {
      document.getElementById('hdr-name').textContent = d.name || 'Agent'
      const av = document.getElementById('hdr-avatar')
      if (d.logo_base64) {
        av.innerHTML = `<img src="${d.logo_base64}" alt="${d.name}"/>`
      } else {
        av.textContent = (d.name?.[0]?.toUpperCase()) || '✦'
        if (d.brand_color) av.style.background = `linear-gradient(135deg,${d.brand_color},${dimColor(d.brand_color)})`
      }
    }
    function setupColors(d) {
      if (!d.brand_color) return
      const c = d.brand_color, rgb = hexToRgb(c), dark = dimColor(c)
      document.documentElement.style.setProperty('--brand',c)
      document.documentElement.style.setProperty('--brand-2',lightenColor(c,20))
      document.documentElement.style.setProperty('--brand-dark',dark)
      if (rgb) {
        document.documentElement.style.setProperty('--brand-dim',`rgba(${rgb},.08)`)
        document.documentElement.style.setProperty('--brand-glow',`rgba(${rgb},.20)`)
        document.documentElement.style.setProperty('--brand-glow-lg',`rgba(${rgb},.32)`)
        document.documentElement.style.setProperty('--border',`rgba(${rgb},.10)`)
        document.documentElement.style.setProperty('--border2',`rgba(${rgb},.16)`)
      }
      if (d.theme === 'dark') document.body.classList.add('theme-dark')
    }
    function hexToRgb(hex) { const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:null }
    function dimColor(hex) { const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); if(!r)return hex; const d=v=>Math.max(0,Math.round(parseInt(v,16)*.75)); return `#${d(r[1]).toString(16).padStart(2,'0')}${d(r[2]).toString(16).padStart(2,'0')}${d(r[3]).toString(16).padStart(2,'0')}` }
    function lightenColor(hex,amt) { const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); if(!r)return hex; const l=v=>Math.min(255,Math.round(parseInt(v,16)+amt)); return `#${l(r[1]).toString(16).padStart(2,'0')}${l(r[2]).toString(16).padStart(2,'0')}${l(r[3]).toString(16).padStart(2,'0')}` }

    // ══════════════════════════════════════════════════════════════════
    // MESSAGES
    // ══════════════════════════════════════════════════════════════════
    function getTime() { return new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}) }

    function addDateSeparator() {
      const msgs = document.getElementById('chat-messages')
      const sep = document.createElement('div')
      sep.className = 'date-sep'
      sep.textContent = new Date().toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'})
      msgs.appendChild(sep)
    }
    function addWelcomeMsg(text) {
      const msgs = document.getElementById('chat-messages')
      const group = document.createElement('div'); group.className = 'msg-group agent'
      const bubble = document.createElement('div'); bubble.className = 'msg-bubble-welcome'; bubble.textContent = text
      group.appendChild(bubble)
      const timeEl = document.createElement('div'); timeEl.className = 'msg-time'; timeEl.textContent = getTime()
      group.appendChild(timeEl)
      msgs.appendChild(group); msgs.scrollTop = msgs.scrollHeight
    }
    function addUserMsg(text) {
      const msgs = document.getElementById('chat-messages')
      const group = document.createElement('div'); group.className = 'msg-group user'
      const bubble = document.createElement('div'); bubble.className = 'msg-bubble-user'; bubble.textContent = text
      group.appendChild(bubble)
      const timeEl = document.createElement('div'); timeEl.className = 'msg-time'; timeEl.textContent = getTime()
      group.appendChild(timeEl)
      msgs.appendChild(group); msgs.scrollTop = msgs.scrollHeight
    }
    function createAgentBubble() {
      const msgs = document.getElementById('chat-messages')
      const group = document.createElement('div'); group.className = 'msg-group agent'
      const bubble = document.createElement('div'); bubble.className = 'msg-bubble-agent msg-bubble-streaming'
      group.appendChild(bubble)
      const timeEl = document.createElement('div'); timeEl.className = 'msg-time'; timeEl.textContent = getTime()
      group.appendChild(timeEl)
      msgs.appendChild(group)
      return { group, bubble, timeEl }
    }
    function addTimingBadge(group, timing) {
      if (!timing) return
      const { firstToken, totalTime, tokens } = timing
      const badge = document.createElement('div'); badge.className = 'msg-timing'
      const ftClass = firstToken < 1500 ? 'timing-fast' : firstToken < 3500 ? 'timing-mid' : 'timing-slow'
      const ttClass = totalTime  < 4000 ? 'timing-fast' : totalTime  < 9000 ? 'timing-mid' : 'timing-slow'
      const parts = [
        `⚡ <span class="${ftClass}">First: ${(firstToken/1000).toFixed(2)}s</span>`,
        `<span class="timing-sep"></span>`,
        `⏱ <span class="${ttClass}">Total: ${(totalTime/1000).toFixed(2)}s</span>`,
      ]
      if (tokens) { parts.push(`<span class="timing-sep"></span>`); parts.push(`🔢 ${tokens.toLocaleString()} tokens`) }
      badge.innerHTML = parts.join('')
      const timeEl = group.querySelector('.msg-time')
      if (timeEl) group.insertBefore(badge, timeEl); else group.appendChild(badge)
      requestAnimationFrame(() => requestAnimationFrame(() => badge.classList.add('visible')))
    }

    // ══════════════════════════════════════════════════════════════════
    // SALES RESPONSE RENDERING — v3.0
    // Message text + native product cards + optional checkout action
    // ══════════════════════════════════════════════════════════════════
    function renderSalesResponse(message, productIds, action, group) {
      const msgs = document.getElementById('chat-messages')

      // 1. Text message bubble
      if (message && message.trim()) {
        const bubble = document.createElement('div')
        bubble.className = 'msg-bubble-sales'
        bubble.textContent = message
        group.appendChild(bubble)
      }

      // 2. Product cards row
      if (productIds && productIds.length > 0) {
        const resolved = productIds.map(id => prodMap[id]).filter(Boolean)
        if (resolved.length > 0) {
          const row = renderProductCards(resolved)
          group.appendChild(row)
        }
      }

      // 3. Checkout action card
      if (action === 'checkout') {
        const checkoutCard = document.createElement('div')
        checkoutCard.className = 'checkout-action-card'

        // Gather cart-ready products
        const toCheckout = (productIds || []).map(id => prodMap[id]).filter(Boolean)

        checkoutCard.innerHTML = `
          <div class="checkout-action-card-title">🛒 Ready to checkout?</div>
          <p>I've added your selected item${toCheckout.length > 1 ? 's' : ''} to cart. Proceed to secure payment when you're ready.</p>
          <button class="checkout-action-btn" onclick="triggerCheckout(${JSON.stringify(toCheckout.map(p=>p._id))})">
            Pay Securely →
          </button>`
        group.appendChild(checkoutCard)

        // Auto-add to cart
        toCheckout.forEach(p => {
          if (!cart.find(i => i._id === String(p._id))) {
            cart.push({ _id: String(p._id), name: p.name, price: p.price, image_url: p.image_url || '', currency: p.currency, qty: 1 })
          }
        })
        updateCartBar()
      }

      // 4. Time + scroll
      const timeEl = document.createElement('div'); timeEl.className = 'msg-time'; timeEl.textContent = getTime()
      group.appendChild(timeEl)
      msgs.appendChild(group)
      msgs.scrollTop = msgs.scrollHeight
    }

    function renderProductCards(products) {
      const row = document.createElement('div')
      row.className = 'products-row'

      products.forEach((p, idx) => {
        const card = document.createElement('div')
        card.className = 'product-card'
        card.style.animationDelay = `${idx * 60}ms`

        const sym = p.currency === 'USD' ? '$' : '₹'
        const inCart = cart.find(i => i._id === String(p._id))

        const imgWrap = document.createElement('div')
        imgWrap.className = 'product-img-wrap'

        if (p.image_url) {
          const img = document.createElement('img')
          img.className = 'product-img'
          img.src = p.image_url
          img.alt = p.name
          img.onerror = () => { imgWrap.innerHTML = `<div class="product-img-placeholder">📦</div>` }
          imgWrap.appendChild(img)
        } else {
          imgWrap.innerHTML = `<div class="product-img-placeholder">📦</div>`
        }

        if (p.category) {
          const badge = document.createElement('div')
          badge.className = 'product-cat-badge'
          badge.textContent = p.category
          imgWrap.appendChild(badge)
        }

        const info = document.createElement('div')
        info.className = 'product-info'
        info.innerHTML = `
          <div class="product-name">${esc(p.name)}</div>
          ${p.description ? `<div class="product-desc">${esc(p.description)}</div>` : ''}
          <div class="product-price">${sym}${Number(p.price).toLocaleString()}</div>`

        const btn = document.createElement('button')
        btn.className = 'product-btn' + (inCart ? ' in-cart' : '')
        btn.textContent = inCart ? '✓ In Cart' : 'Add to Cart'
        btn.onclick = () => {
          addToCart({ _id: String(p._id), name: p.name, price: p.price, image_url: p.image_url || '', currency: p.currency })
          btn.textContent = '✓ In Cart'
          btn.classList.add('in-cart')
        }

        card.appendChild(imgWrap)
        card.appendChild(info)
        card.appendChild(btn)
        row.appendChild(card)
      })

      return row
    }

    // ══════════════════════════════════════════════════════════════════
    // TYPING INDICATOR
    // ══════════════════════════════════════════════════════════════════
    function showTyping() {
      const msgs = document.getElementById('chat-messages')
      const wrap = document.createElement('div'); wrap.className = 'msg-group agent'
      const ind = document.createElement('div'); ind.className = 'typing-indicator show'
      ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>'
      wrap.appendChild(ind); msgs.appendChild(wrap); msgs.scrollTop = msgs.scrollHeight

    }

    // ══════════════════════════════════════════════════════════════════
    // TOPICS
    // ══════════════════════════════════════════════════════════════════
    function renderTopics(topics) {
      const wrap = document.getElementById('topics-wrap'); wrap.innerHTML = ''
      topics.forEach(t => {
        const btn = document.createElement('button'); btn.className = 'topic-chip'
        btn.innerHTML = `<span>${t.icon||'💬'}</span>${esc(t.title||t.question||'')}`
        btn.addEventListener('click',()=>sendTopicChip(t))
        wrap.appendChild(btn)
      })
    }
    function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
    function sendTopicChip(topic) { document.getElementById('topics-wrap').innerHTML=''; sendMessageText(topic.question||topic.title||'',topic.suggested_prompt||'') }

    // ══════════════════════════════════════════════════════════════════
    // SEND
    // ══════════════════════════════════════════════════════════════════
    function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()} }
    function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px' }

    async function sendMessage() {
      if (_recActive) _stopVoice(false)
      const inp = document.getElementById('chat-input')
      const text = inp.value.trim()
      if (!text||isTyping) return
      inp.value=''; inp.style.height='auto'
      await sendMessageText(text,'')
    }

    async function sendMessageText(question, suggestedPrompt) {
      document.getElementById('topics-wrap').innerHTML=''
      addUserMsg(question)
      msgHistory.push({ role:'user', content:question })
      isTyping = true
      document.getElementById('send-btn').disabled = true

      try {
        const streamOk = await streamResponse(question, suggestedPrompt)
        if (!streamOk) await nonStreamResponse(question, suggestedPrompt)
      } catch(e) {
        console.warn('[send] error',e)
        await nonStreamResponse(question, suggestedPrompt)
      }

      isTyping = false
      document.getElementById('send-btn').disabled = false
      document.getElementById('chat-input').focus()
    }

    // ══════════════════════════════════════════════════════════════════
    // SSE STREAMING — handles both HTML (non-sales) and sales_response
    // ══════════════════════════════════════════════════════════════════
    async function streamResponse(question, suggestedPrompt) {
      // For sales agents: don't create streaming bubble yet — wait for JSON
      let group = null, renderer = null
      if (agentType !== 'sales') {
        const created = createAgentBubble()
        group = created.group; 
        renderer = new StreamRenderer(created.bubble)
      } else {
        // Sales: show typing indicator while waiting
        group = showTyping()
      }

      const body = JSON.stringify({
        question,
        history: buildHistoryForServer(),
        session_id: sessionId || undefined,
        suggested_prompt: suggestedPrompt || undefined,
      })

      const clientSendTime = Date.now()
      let clientFirstChunkTime = null

      let res
      try {
        res = await fetch(`${API}/chat/${AGENT_ID}/stream`, {
          method:'POST',
          headers:{'Content-Type':'application/json','Accept':'text/event-stream'},
          body,
        })
      } catch(e) {
        if (renderer) renderer.error('Network error.')
        else { group.remove(); showChatMsg('⚠️ Network error. Please check your connection.') }
        throw e
      }

      if (!res.ok||!res.body) {
        if (renderer) renderer.error(`Server error (${res.status}).`)
        else { group.remove(); showChatMsg(`⚠️ Server error (${res.status}).`) }
        throw new Error(`HTTP ${res.status}`)
      }

      const reader = res.body.getReader()
      const decoder = new TextDecoder()
      let lineBuffer = ''
      let finalAnswer = ''
      let gotDone = false
      let salesData = null
      let serverTiming = null
      let tokenCount = null

      try {
        while (true) {
          const { value, done } = await reader.read()
          if (done) break
          lineBuffer += decoder.decode(value,{stream:true})
          let sepIdx
          while ((sepIdx = lineBuffer.indexOf('\n\n')) !== -1) {
            const block = lineBuffer.slice(0,sepIdx)
            lineBuffer = lineBuffer.slice(sepIdx+2)
            if (block.startsWith(':')) continue
            for (const line of block.split('\n')) {
              if (!line.startsWith('data: ')) continue
              let evt; try { evt = JSON.parse(line.slice(6)) } catch { continue }

              // HTML chunk (non-sales)
              if (evt.type==='chunk'&&evt.html&&renderer) {
                if (clientFirstChunkTime===null) clientFirstChunkTime = Date.now()
                renderer.push(evt.html)
              }

              // Standard done event (non-sales)
              if (evt.type==='done') {
                if (evt.session_id) sessionId = evt.session_id
                finalAnswer = evt.answer || ''
                gotDone = true
                serverTiming = evt.timing || null
                tokenCount = evt.tokens || null
              }

              // Sales response event (v3.0)
              if (evt.type==='sales_response') {
                salesData = evt
                gotDone = true
                serverTiming = evt.timing || null
                tokenCount = evt.tokens || null
                if (clientFirstChunkTime===null) clientFirstChunkTime = Date.now()
              }

              if (evt.type==='error') {
                if (renderer) renderer.error(evt.message)
                else { group.remove(); showChatMsg(`⚠️ ${evt.message}`) }
                return true
              }
            }
          }
        }
      } finally { reader.releaseLock() }

      const clientTotal = Date.now() - clientSendTime
      const clientFirst = clientFirstChunkTime ? clientFirstChunkTime - clientSendTime : clientTotal

      // Handle sales response
      if (salesData) {
        group.remove() // remove typing indicator
        const salesGroup = document.createElement('div'); salesGroup.className = 'msg-group agent'
        renderSalesResponse(salesData.message, salesData.products, salesData.action, salesGroup)

        // Push to history with product names for context
        const productNames = (salesData.products||[]).map(id => prodMap[id]?.name).filter(Boolean)
        msgHistory.push({ role:'assistant', content: salesData.message || '', products: productNames })

        addTimingBadge(salesGroup, {
          firstToken: serverTiming?.first_token_ms ?? clientFirst,
          totalTime:  serverTiming?.total_stream_ms ?? clientTotal,
          tokens:     tokenCount,
        })

        // Auto-trigger checkout if action says so
        if (salesData.action === 'checkout' && salesData.products?.length) {
          const toCheckout = salesData.products.map(id => prodMap[id]).filter(Boolean)
          toCheckout.forEach(p => {
            if (!cart.find(i => i._id === String(p._id))) {
              cart.push({ _id:String(p._id), name:p.name, price:p.price, image_url:p.image_url||'', currency:p.currency, qty:1 })
            }
          })
          updateCartBar()
        }
        return true
      }

      // Handle HTML response (non-sales)
      if (gotDone && renderer) {
        renderer.finalize(finalAnswer)
        msgHistory.push({ role:'assistant', content: (finalAnswer||renderer.raw).replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().slice(0,600) })
      } else if (renderer) {
        renderer.finalize(renderer.raw)
        msgHistory.push({ role:'assistant', content: renderer.raw.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().slice(0,600) })
      }

      if (group) {
        addTimingBadge(group, {
          firstToken: serverTiming?.first_token_ms ?? clientFirst,
          totalTime:  serverTiming?.total_stream_ms ?? clientTotal,
          tokens:     tokenCount,
        })
      }
      return true
    }

    // ══════════════════════════════════════════════════════════════════
    // NON-STREAMING FALLBACK
    // ══════════════════════════════════════════════════════════════════
    async function nonStreamResponse(question, suggestedPrompt) {
      const typEl = showTyping()
      try {
        const res = await fetch(`${API}/chat/${AGENT_ID}`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ question, history:buildHistoryForServer(), session_id:sessionId||undefined, suggested_prompt:suggestedPrompt||undefined })
        })
        const d = await res.json()
        typEl.remove()

        // Sales JSON response
        if (d.type === 'sales_response') {
          const salesGroup = document.createElement('div'); salesGroup.className = 'msg-group agent'
          renderSalesResponse(d.message, d.products, d.action, salesGroup)
          const productNames = (d.products||[]).map(id => prodMap[id]?.name).filter(Boolean)
          msgHistory.push({ role:'assistant', content:d.message||'', products:productNames })
          return
        }

        // HTML response
        const { group, bubble } = createAgentBubble()
        bubble.innerHTML = d.answer || d.message || '<p style="color:var(--text2);">No response received.</p>'
        bubble.classList.remove('msg-bubble-streaming')
        document.getElementById('chat-messages').scrollTop = 999999
        msgHistory.push({ role:'assistant', content:(d.answer||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().slice(0,600) })
      } catch(e) {
        typEl.remove()
        const { bubble } = createAgentBubble()
        bubble.innerHTML = `<p style="color:var(--red);margin:0;">Sorry, I encountered an error. Please try again.</p>`
        bubble.classList.remove('msg-bubble-streaming')
      }
    }

    // Build history array to send to backend
    // Sales: include products array for context
    // Others: strip products, keep content only
    function buildHistoryForServer() {
      const MAX = agentType === 'sales' ? 20 : 12
      return msgHistory.slice(-MAX, -1).map(m => {
        if (agentType === 'sales') {
          return { role: m.role, content: m.content, products: m.products || [] }
        }
        return { role: m.role, content: m.content }
      })
    }

    // ══════════════════════════════════════════════════════════════════
    // PRODUCTS
    // ══════════════════════════════════════════════════════════════════
    function currSym(currency) { return (currency || agent?.payment_currency || 'INR') === 'USD' ? '$' : '₹' }

    async function loadProducts() {
      try {
        const res = await fetch(`${API}/chat/${AGENT_ID}/products`)
        if (!res.ok) return
        allProds = await res.json()
        // Build id → product map for O(1) lookup during card rendering
        prodMap = {}
        allProds.forEach(p => { prodMap[String(p._id)] = p })
      } catch(e) { console.warn('[products]',e.message) }
    }

    // ══════════════════════════════════════════════════════════════════
    // CART
    // ══════════════════════════════════════════════════════════════════
    function addToCart(product) {
      const existing = cart.find(i => i._id === product._id)
      if (existing) existing.qty++
      else cart.push({ ...product, qty:1 })
      updateCartBar()
      showToast(`${product.name} added to cart 🛒`)
    }
    function updateCartBar() {
      const total = cart.reduce((a,i)=>a+i.qty,0)
      document.getElementById('cart-count').textContent = total
      document.getElementById('cart-bar').classList.toggle('show', total > 0)
    }
    function openCart() {
      const itemsEl = document.getElementById('cart-items')
      if (!cart.length) {
        itemsEl.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div class="cart-empty-text">Your cart is empty</div></div>`
      } else {
        itemsEl.innerHTML = cart.map((item,i) => {
          const sym = currSym(item.currency)
          return `
          <div class="cart-item">
            <div class="cart-item-thumb">${item.image_url?`<img src="${item.image_url}" alt="">`:'📦'}</div>
            <div style="flex:1;min-width:0;">
              <div class="cart-item-name">${esc(item.name)}</div>
              <div class="cart-item-unit">${sym}${item.price} each</div>
              <div class="cart-qty">
                <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
                <span class="qty-label">${item.qty}</span>
                <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
              </div>
            </div>
            <div class="cart-item-total">${sym}${(item.price*item.qty).toFixed(2)}</div>
          </div>`
        }).join('')
      }
      const total = cart.reduce((a,i)=>a+(i.price*i.qty),0)
      document.getElementById('cart-total').textContent = currSym() + total.toFixed(2)
      document.getElementById('cart-overlay').classList.add('open')
    }
    function closeCart() { document.getElementById('cart-overlay').classList.remove('open') }
    function changeQty(idx,delta) {
      cart[idx].qty += delta
      if (cart[idx].qty <= 0) cart.splice(idx,1)
      updateCartBar()
      if (cart.length) openCart(); else closeCart()
    }

    // ══════════════════════════════════════════════════════════════════
    // CHECKOUT
    // ══════════════════════════════════════════════════════════════════
    async function triggerCheckout(productIds) {
      // Add these products to cart if not already there
      productIds.forEach(id => {
        const p = prodMap[id]
        if (!p) return
        if (!cart.find(i => i._id === String(id))) {
          cart.push({ _id:String(p._id), name:p.name, price:p.price, image_url:p.image_url||'', currency:p.currency, qty:1 })
        }
      })
      updateCartBar()
      await checkout()
    }

    async function checkout() {
      if (!cart.length) return
      closeCart()
      const msgs = document.getElementById('chat-messages')
      const prep = document.createElement('div'); prep.className='msg-group agent'
      const prepBub = document.createElement('div'); prepBub.className='msg-bubble-agent'
      prepBub.innerHTML='<p style="margin:0;color:var(--text2);">⏳ Preparing your order…</p>'
      prep.appendChild(prepBub); msgs.appendChild(prep); msgs.scrollTop=msgs.scrollHeight

      try {
        const res = await fetch(`${API}/chat/${AGENT_ID}/checkout`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ items:cart.map(i=>({product_id:i._id,qty:i.qty})), customer:{} })
        })
        const d = await res.json(); prep.remove()
        if (!res.ok||d.error) { showChatMsg(`❌ ${d.error||'Unable to create order.'}`); return }
        if (d.order_id&&d.key_id) {
          const rz = new Razorpay({
            key:d.key_id, amount:d.amount, currency:d.currency||'INR',
            name:agent?.name||'Store', order_id:d.order_id,
            theme:{color:agent?.brand_color||'#6C5FF5'},
            handler: async (resp) => {
              try {
                const vres = await fetch(`${API}/chat/${AGENT_ID}/verify-payment`,{
                  method:'POST',headers:{'Content-Type':'application/json'},
                  body:JSON.stringify({razorpay_order_id:resp.razorpay_order_id,razorpay_payment_id:resp.razorpay_payment_id,razorpay_signature:resp.razorpay_signature,order_db_id:d.order_db_id})
                })
                const vd = await vres.json()
                if (vres.ok&&!vd.error) {
                  cart=[]; updateCartBar()
                  showChatMsg('✅ Payment successful! Your order has been placed. Thank you! 🎉')
                } else showChatMsg(`❌ Verification failed: ${vd.error||'Unknown error'}`)
              } catch { showChatMsg('❌ Payment verification failed. Please contact support.') }
            },
            modal:{ondismiss:()=>showChatMsg('Payment was cancelled. Your cart is saved — tap Cart to try again.')}
          })
          rz.open()
        } else { showChatMsg(d.message||'❌ Unable to process payment. Please try again.') }
      } catch(e) { prep.remove(); showChatMsg('❌ Checkout failed. Please try again.'); console.error('[checkout]',e) }
    }

    // ══════════════════════════════════════════════════════════════════
    // NOTIFICATIONS
    // ══════════════════════════════════════════════════════════════════
    function showChatMsg(text) {
      const msgs = document.getElementById('chat-messages')
      const group = document.createElement('div'); group.className='msg-group agent'
      const bub = document.createElement('div'); bub.className='msg-bubble-agent'
      bub.innerHTML=`<p style="margin:0;font-size:13.5px;">${text}</p>`
      group.appendChild(bub); msgs.appendChild(group); msgs.scrollTop=msgs.scrollHeight
    }
    function showToast(msg) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.classList.add('show')
      clearTimeout(t._timer)
      t._timer = setTimeout(()=>t.classList.remove('show'), 2200)
    }
    function showError(msg) {
      document.getElementById('loading-screen').innerHTML=`
      <div style="text-align:center;padding:40px 24px;">
        <div style="font-size:44px;margin-bottom:16px;">⚠️</div>
        <div style="font-size:14.5px;font-weight:700;margin-bottom:8px;letter-spacing:-.02em;">Something went wrong</div>
        <div style="font-size:12.5px;color:var(--text3);line-height:1.65;">${msg}</div>
      </div>`
    }

    // ══════════════════════════════════════════════════════════════════
    // VOICE ENGINE
    // ══════════════════════════════════════════════════════════════════
    const VOICE_LANGS = [
      {code:'en-IN',flag:'🇮🇳',label:'English (India)'},
      {code:'ta-IN',flag:'🇮🇳',label:'Tamil'},
      {code:'hi-IN',flag:'🇮🇳',label:'Hindi'},
      {code:'te-IN',flag:'🇮🇳',label:'Telugu'},
      {code:'kn-IN',flag:'🇮🇳',label:'Kannada'},
      {code:'ml-IN',flag:'🇮🇳',label:'Malayalam'},
      {code:'mr-IN',flag:'🇮🇳',label:'Marathi'},
      {code:'bn-IN',flag:'🇮🇳',label:'Bengali'},
      {code:'gu-IN',flag:'🇮🇳',label:'Gujarati'},
      {code:'pa-IN',flag:'🇮🇳',label:'Punjabi'},
      {sep:true},
      {code:'en-US',flag:'🇺🇸',label:'English (US)'},
      {code:'en-GB',flag:'🇬🇧',label:'English (UK)'},
      {code:'ar-SA',flag:'🇸🇦',label:'Arabic'},
      {code:'zh-CN',flag:'🇨🇳',label:'Chinese'},
      {code:'fr-FR',flag:'🇫🇷',label:'French'},
      {code:'de-DE',flag:'🇩🇪',label:'German'},
      {code:'ja-JP',flag:'🇯🇵',label:'Japanese'},
      {code:'ko-KR',flag:'🇰🇷',label:'Korean'},
      {code:'pt-BR',flag:'🇧🇷',label:'Portuguese'},
      {code:'es-ES',flag:'🇪🇸',label:'Spanish'},
    ]
    let _rec=null,_recActive=false,_finalText='',_interimText='',_idleTimer=null,_silTimer=null,_ddOpen=false
    let _voiceLang=localStorage.getItem('sg_voice_lang')||'en-IN'

    function initVoice() {
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition
      const mic=document.getElementById('mic-btn')
      if (!mic) return
      if (!SR) {
        mic.disabled=true; mic.title='Voice input needs Chrome or Edge'; mic.style.opacity='.3'
        const lw=document.getElementById('langWrap'); if(lw)lw.style.display='none'
        return
      }
      const dd=document.getElementById('langDropdown')
      if (dd) {
        dd.innerHTML=`<div class="lang-dd-head">Voice Language</div>`+
          VOICE_LANGS.map(l=>l.sep
            ?`<div class="lang-dd-sep"></div>`
            :`<div class="lang-dd-item ${l.code===_voiceLang?'active':''}" onclick="selectVoiceLang('${l.code}',this)"><span class="dd-flag">${l.flag}</span><span class="dd-name">${l.label}</span><span class="dd-check">✓</span></div>`
          ).join('')
      }
      _syncLangBtn()
      document.addEventListener('click',e=>{if(_ddOpen&&!e.target.closest('#langWrap'))_closeLangDD()})
    }
    function toggleLangDD(){_ddOpen?_closeLangDD():_openLangDD()}
    function _openLangDD(){document.getElementById('langDropdown')?.classList.add('open');document.getElementById('langBtn')?.classList.add('open');_ddOpen=true}
    function _closeLangDD(){document.getElementById('langDropdown')?.classList.remove('open');document.getElementById('langBtn')?.classList.remove('open');_ddOpen=false}
    function selectVoiceLang(code,el){
      _voiceLang=code;localStorage.setItem('sg_voice_lang',code)
      document.querySelectorAll('.lang-dd-item').forEach(x=>x.classList.remove('active'))
      if(el)el.classList.add('active')
      _syncLangBtn();_closeLangDD()
      if(_recActive){_stopRecognition();setTimeout(_spawnRec,150)}
    }
    function _syncLangBtn(){
      const found=VOICE_LANGS.find(l=>l.code===_voiceLang)
      const flag=document.getElementById('lbFlag');const code=document.getElementById('lbCode')
      if(flag&&found)flag.textContent=found.flag
      if(code&&found)code.textContent=found.code.split('-')[0].toUpperCase()
    }
    function toggleVoice(){
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition
      if(!SR){showChatMsg('🎙 Voice input needs Chrome or Edge browser.');return}
      _recActive?_stopVoice(true):_startVoice()
    }
    function _startVoice(){
      if(_recActive)return
      _recActive=true;_finalText='';_interimText=''
      const row=document.getElementById('input-row')
      if(row)row.classList.add('listening')
      _updateVoiceInterim();_setMicUI(true)
      _idleTimer=setTimeout(()=>{
        if(_recActive&&!_finalText.trim()){
          _stopVoice(false)
          const i=document.getElementById('chat-input')
          if(i){i.placeholder='💬 No speech detected — try again';setTimeout(()=>{i.placeholder='Ask anything…'},3000)}
        }
      },11000)
      _spawnRec()
    }
    function _spawnRec(){
      if(!_recActive)return
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition
      _rec=new SR();_rec.continuous=false;_rec.interimResults=true;_rec.maxAlternatives=1;_rec.lang=_voiceLang;_interimText=''
      _rec.onresult=e=>{
        _clearSil();_clearIdle();let interim=''
        for(let i=e.resultIndex;i<e.results.length;i++){
          const t=e.results[i][0].transcript
          if(e.results[i].isFinal){_finalText+=t+' ';_interimText=''}else interim+=t
        }
        _interimText=interim;_updateVoiceInterim()
        _silTimer=setTimeout(()=>{if(_recActive&&_finalText.trim())_stopVoice(true)},9000)
      }
      _rec.onerror=e=>{
        if(e.error==='not-allowed'||e.error==='service-not-allowed'){showChatMsg('🔴 Mic access denied.');_stopVoice(false);return}
        if(e.error==='aborted')return
        if(e.error==='no-speech'){if(_recActive)setTimeout(_spawnRec,100);return}
        console.warn('[Voice]',e.error)
      }
      _rec.onend=()=>{_interimText='';if(_recActive)setTimeout(_spawnRec,80)}
      try{_rec.start()}catch(err){console.warn('[Voice] start:',err.message)}
    }
    function _updateVoiceInterim(){
      const box=document.getElementById('voice-interim')
      const finEl=document.getElementById('voice-final-text');const intEl=document.getElementById('voice-interim-text')
      const inp=document.getElementById('chat-input');const hasText=_finalText.trim()||_interimText
      if(finEl)finEl.textContent=_finalText;if(intEl)intEl.textContent=_interimText
      if(box)box.classList.toggle('show',!!hasText)
      if(inp)inp.value=(_finalText+_interimText).trimStart()
    }
    function _stopRecognition(){try{_rec?.stop()}catch(_){};_rec=null}
    function _stopVoice(andSend){
      _recActive=false;_clearSil();_clearIdle();_stopRecognition()
      const row=document.getElementById('input-row');const inp=document.getElementById('chat-input');const box=document.getElementById('voice-interim')
      _interimText=''
      if(row)row.classList.remove('listening');if(box)box.classList.remove('show')
      if(inp){inp.placeholder='Ask anything…';inp.value=_finalText.trim();autoResize(inp)}
      _setMicUI(false)
      if(andSend&&_finalText.trim())setTimeout(sendMessage,100)
    }
    function _clearSil(){if(_silTimer){clearTimeout(_silTimer);_silTimer=null}}
    function _clearIdle(){if(_idleTimer){clearTimeout(_idleTimer);_idleTimer=null}}
    function _setMicUI(on){
      const btn=document.getElementById('mic-btn');const ico=document.getElementById('mic-icon');const langBtn=document.getElementById('langBtn')
      if(!btn)return
      btn.classList.toggle('recording',on)
      if(ico)ico.textContent=on?'⏹':'🎙'
      btn.title=on?'Recording — tap to stop & send':'Voice input'
      if(langBtn)langBtn.classList.toggle('recording',on)
    }

    // BOOT
    init()
  </script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</body>
