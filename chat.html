<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── CSS variables — all values can be overridden at runtime by brand colour ── */
:root {
  --brand:#6C5FF5; --brand-dim:rgba(108,95,245,.1); --brand-glow:rgba(108,95,245,.22);
  --accent-l:rgba(108,95,245,.06); --accent-b:rgba(108,95,245,.18);
  --bg:#F4F5FB; --surface:#FFF; --surface2:#F8F9FD; --surface3:#EEF0F8;
  --text:#0D1021; --text2:#53587A; --text3:#9CA3BF;
  --border:rgba(0,0,0,.07); --border2:rgba(0,0,0,.11);
  --r:14px; --r-sm:10px;
  --font:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
  --green:#0FA36D; --green-dim:rgba(15,163,109,.09); --green-border:rgba(15,163,109,.22);
  --red:#DC3545; --amber:#D97706;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--font); background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; overflow:hidden; }

/* ── Header ────────────────────────────────────────────── */
.chat-header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 18px; display:flex; align-items:center; gap:12px; flex-shrink:0; box-shadow:0 1px 4px rgba(0,0,0,.04); }
.agent-avatar { width:40px; height:40px; border-radius:12px; background:var(--brand); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:800; color:#fff; flex-shrink:0; overflow:hidden; box-shadow:0 2px 8px var(--brand-glow); }
.agent-avatar img { width:100%; height:100%; object-fit:cover; }
.agent-name { font-size:15px; font-weight:800; letter-spacing:-.02em; }
.agent-status { font-size:12px; color:var(--green); display:flex; align-items:center; gap:4px; margin-top:2px; }
.status-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.powered-by { margin-left:auto; font-size:10px; color:var(--text3); text-align:right; flex-shrink:0; }
.powered-by a { color:var(--brand); font-weight:600; text-decoration:none; }

/* ── Messages ──────────────────────────────────────────── */
.chat-messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
.chat-messages::-webkit-scrollbar { width:4px; }
.chat-messages::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:4px; }

.msg-group { display:flex; flex-direction:column; gap:4px; }
.msg-group.user { align-items:flex-end; }
.msg-group.agent { align-items:flex-start; }

/* User bubble — plain text, white on brand */
.msg-bubble-user {
  max-width:80%; padding:11px 14px; border-radius:18px 18px 4px 18px;
  font-size:14px; line-height:1.65; word-break:break-word;
  background:var(--brand); color:#fff;
}
/* Agent bubble — raw HTML from backend, inherits CSS vars */
.msg-bubble-agent {
  max-width:88%; padding:12px 15px; border-radius:4px 18px 18px 18px;
  background:var(--surface); border:1px solid var(--border2);
  color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,.04);
  word-break:break-word; overflow-x:auto;
}
/* Welcome message — wider, accent tint */
.msg-bubble-welcome {
  max-width:100%; padding:14px 16px; border-radius:18px;
  background:var(--brand-dim); border:1px solid var(--accent-b);
  color:var(--text); font-size:14px; line-height:1.7;
}
/* Streaming — live build */
.msg-bubble-streaming { border-color:var(--brand) !important; }
.msg-bubble-streaming::after { content:'▊'; display:inline-block; animation:blink .7s step-start infinite; color:var(--brand); }
@keyframes blink { 50%{opacity:0} }

.msg-time { font-size:10px; color:var(--text3); padding:0 4px; }

/* Typing indicator */
.typing-wrap { display:flex; align-items:flex-start; gap:0; }
.typing-indicator { display:none; align-items:center; gap:6px; padding:12px 14px; background:var(--surface); border:1px solid var(--border2); border-radius:4px 18px 18px 18px; max-width:80px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
.typing-indicator.show { display:flex; }
.typing-dot { width:7px; height:7px; border-radius:50%; background:var(--text3); animation:tdot .8s infinite ease-in-out; }
.typing-dot:nth-child(2){animation-delay:.15s;} .typing-dot:nth-child(3){animation-delay:.3s;}
@keyframes tdot { 0%,100%{transform:translateY(0);opacity:.5} 50%{transform:translateY(-5px);opacity:1} }

/* ── Topic chips (from cached_topics) ──────────────────── */
.topics-wrap { display:flex; flex-wrap:wrap; gap:8px; padding:10px 16px 0; }
.topic-chip {
  padding:8px 14px; border:1px solid var(--brand-dim); border-radius:20px;
  background:var(--surface); color:var(--brand); font-size:12.5px; font-weight:600;
  cursor:pointer; transition:all .16s; display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.topic-chip:hover { background:var(--brand); color:#fff; border-color:var(--brand); }
.topic-chip .chip-icon { font-size:14px; }

/* ── Product cards (shopping) ──────────────────────────── */
.products-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; max-width:100%; }
.products-row::-webkit-scrollbar { height:0; }
.product-card {
  min-width:155px; max-width:155px; background:var(--surface); border:1px solid var(--border2);
  border-radius:14px; overflow:hidden; flex-shrink:0; transition:all .16s;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.product-card:hover { border-color:var(--brand); transform:translateY(-2px); box-shadow:0 4px 12px var(--brand-glow); }
.product-img { width:100%; height:96px; object-fit:cover; background:var(--surface2); display:block; }
.product-img-placeholder { width:100%; height:96px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:30px; }
.product-info { padding:10px 10px 6px; }
.product-name { font-size:12.5px; font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.product-price { font-size:14px; font-weight:800; color:var(--brand); font-family:var(--mono); }
.product-btn { display:block; text-align:center; background:var(--brand); color:#fff; padding:8px; font-size:12px; font-weight:700; border:none; cursor:pointer; width:100%; transition:background .16s; }
.product-btn:hover { background:#5b4de0; }

/* ── Input area ────────────────────────────────────────── */
.chat-input-wrap { background:var(--surface); border-top:1px solid var(--border); padding:12px 14px; flex-shrink:0; }
.chat-input-row { display:flex; gap:8px; align-items:flex-end; }
.chat-input {
  flex:1; min-height:44px; max-height:120px; padding:10px 14px;
  border-radius:12px; border:1px solid var(--border2); background:var(--surface2);
  color:var(--text); font-size:14px; font-family:var(--font);
  resize:none; outline:none; line-height:1.5; transition:border-color .16s;
}
.chat-input:focus { border-color:var(--brand); background:var(--surface); }
.chat-input::placeholder { color:var(--text3); }
.send-btn {
  width:44px; height:44px; border-radius:12px; background:var(--brand); border:none;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .16s; box-shadow:0 2px 8px var(--brand-glow);
}
.send-btn:hover { background:#5b4de0; transform:scale(1.05); }
.send-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.send-btn svg { color:#fff; }

/* ── Cart bar ──────────────────────────────────────────── */
.cart-bar { background:var(--brand); color:#fff; padding:10px 16px; display:none; align-items:center; justify-content:space-between; font-size:13px; font-weight:600; flex-shrink:0; cursor:pointer; }
.cart-bar.show { display:flex; }
.cart-bar:hover { background:#5b4de0; }
.cart-count { background:rgba(255,255,255,.25); border-radius:20px; padding:2px 10px; font-size:12px; font-weight:700; }

/* ── Cart sheet ────────────────────────────────────────── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(6px); z-index:100; display:flex; align-items:flex-end; justify-content:center; visibility:hidden; opacity:0; transition:.2s; }
.modal-overlay.open { visibility:visible; opacity:1; }
.cart-sheet { background:var(--surface); border-radius:24px 24px 0 0; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; padding:20px; }
.cart-handle { width:40px; height:4px; background:var(--surface3); border-radius:4px; margin:0 auto 16px; }
.cart-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.cart-item:last-child { border-bottom:none; }
.cart-item-thumb { width:44px; height:44px; border-radius:10px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; overflow:hidden; }
.cart-item-thumb img { width:100%; height:100%; object-fit:cover; }
.cart-qty { display:flex; align-items:center; gap:8px; margin-top:6px; }
.qty-btn { width:26px; height:26px; border-radius:8px; border:1px solid var(--border2); background:var(--surface2); cursor:pointer; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; line-height:1; }
.qty-btn:hover { background:var(--brand); color:#fff; border-color:var(--brand); }

/* ── Loading / error ───────────────────────────────────── */
.loading-screen { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
.spin { width:32px; height:32px; border:3px solid var(--surface3); border-top-color:var(--brand); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- Header (hidden until loaded) -->
<div class="chat-header" id="chat-header" style="display:none;">
  <div class="agent-avatar" id="hdr-avatar">🤖</div>
  <div>
    <div class="agent-name" id="hdr-name">Agent</div>
    <div class="agent-status"><span class="status-dot"></span>Online</div>
  </div>
  <div class="powered-by">Powered by<br><a href="https://supportagent.aasaitech.in" target="_blank">SupportGent</a></div>
</div>

<!-- Loading -->
<div class="loading-screen" id="loading-screen">
  <div class="spin"></div>
  <div style="font-size:13px;color:var(--text3);">Loading agent…</div>
</div>

<!-- Message feed -->
<div class="chat-messages" id="chat-messages" style="display:none;"></div>

<!-- Topic chips / quick replies -->
<div class="topics-wrap" id="topics-wrap"></div>

<!-- Cart bar -->
<div class="cart-bar" id="cart-bar" onclick="openCart()">
  <span>🛒 Cart <span class="cart-count" id="cart-count">0</span></span>
  <span>View & Checkout →</span>
</div>

<!-- Input -->
<div class="chat-input-wrap" id="chat-input-wrap" style="display:none;">
  <div class="chat-input-row">
    <textarea class="chat-input" id="chat-input" placeholder="Type your message…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- Cart sheet -->
<div class="modal-overlay" id="cart-overlay" onclick="if(event.target===this)closeCart()">
  <div class="cart-sheet">
    <div class="cart-handle"></div>
    <div style="font-size:18px;font-weight:800;margin-bottom:16px;">🛒 Your Cart</div>
    <div id="cart-items"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
      <div>
        <div style="font-size:12px;color:var(--text3);">Total</div>
        <div style="font-size:22px;font-weight:800;font-family:var(--mono);" id="cart-total">₹0</div>
      </div>
      <button class="send-btn" style="width:auto;padding:0 24px;border-radius:12px;font-size:14px;font-weight:700;"
        onclick="checkout()">Checkout →</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
// API base URL — update if your Lambda URL changes
const API      = 'https://fypouhme3gqldqk6sk75b75udy0ltonb.lambda-url.ap-southeast-2.on.aws'
const params   = new URLSearchParams(location.search)
const AGENT_ID = params.get('agent') || ''

// ── State ───────────────────────────────────────────────────────────────────
let agent      = null   // config from GET /chat/:id/config
let allProds   = []     // loaded once from GET /chat/:id/products
let cart       = []     // [{_id, name, price, image_url, qty}]
let msgHistory = []     // [{role:'user'|'assistant', content:string}] for backend context
let sessionId  = null   // visitor session (from first stream response)
let isTyping   = false

// ── Currency helper ─────────────────────────────────────────────────────────
function currSym() {
  return (agent?.payment_currency || 'INR') === 'USD' ? '$' : '₹'
}

// ── Init ────────────────────────────────────────────────────────────────────
async function init() {
  if (!AGENT_ID) { showError('No agent specified in URL.'); return }
  try {
    // ✅ Correct endpoint: GET /chat/:agentId/config
    const res = await fetch(`${API}/chat/${AGENT_ID}/config`)
    if (!res.ok) throw new Error(`Agent not found (${res.status})`)
    agent = await res.json()

    setupColors(agent)
    setupHeader(agent)

    document.getElementById('loading-screen').style.display   = 'none'
    document.getElementById('chat-messages').style.display    = 'flex'
    document.getElementById('chat-input-wrap').style.display  = 'block'
    document.getElementById('chat-header').style.display      = 'flex'
    document.title = (agent.name || 'Chat') + ' — SupportGent'

    // Welcome message (plain text, not HTML)
    addWelcomeMsg(agent.welcome_message || `Hi! I'm ${agent.name || 'your assistant'}. How can I help you today?`)

    // Show topic chips from cached_topics (these are generated at publish time)
    if (agent.cached_topics?.length) {
      renderTopics(agent.cached_topics)
    }

    // Pre-load products if shopping is enabled
    if (agent.shopping_enabled) {
      loadProducts()
    }

  } catch(e) {
    console.error('init error', e)
    showError('Failed to load agent. ' + (e.message || 'Please try again.'))
  }
}

// ── Header & Colors ──────────────────────────────────────────────────────────
function setupHeader(d) {
  document.getElementById('hdr-name').textContent = d.name || 'Agent'
  const av = document.getElementById('hdr-avatar')
  av.style.background = d.brand_color || '#6C5FF5'
  if (d.logo_base64) av.innerHTML = `<img src="${d.logo_base64}" alt="${d.name}"/>`
  else av.textContent = (d.name?.[0]?.toUpperCase()) || '🤖'
}

function setupColors(d) {
  if (!d.brand_color) return
  const c = d.brand_color
  const rgb = hexToRgb(c)
  document.documentElement.style.setProperty('--brand', c)
  if (rgb) {
    document.documentElement.style.setProperty('--brand-dim',  `rgba(${rgb},.10)`)
    document.documentElement.style.setProperty('--brand-glow', `rgba(${rgb},.22)`)
    document.documentElement.style.setProperty('--accent-l',   `rgba(${rgb},.06)`)
    document.documentElement.style.setProperty('--accent-b',   `rgba(${rgb},.18)`)
  }
  if (d.theme === 'dark') applyDarkTheme()
}

function applyDarkTheme() {
  const s = document.documentElement.style
  s.setProperty('--bg',      '#09090F')
  s.setProperty('--surface', '#0F111A')
  s.setProperty('--surface2','#141720')
  s.setProperty('--surface3','#1A1E2E')
  s.setProperty('--text',    '#ECEEF8')
  s.setProperty('--text2',   '#8084A8')
  s.setProperty('--text3',   '#454A6A')
  s.setProperty('--border',  'rgba(255,255,255,.055)')
  s.setProperty('--border2', 'rgba(255,255,255,.09)')
}

function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex)
  return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : null
}

// ── Message rendering ────────────────────────────────────────────────────────
function getTime() {
  return new Date().toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'})
}

function addWelcomeMsg(text) {
  const msgs = document.getElementById('chat-messages')
  const group = document.createElement('div')
  group.className = 'msg-group agent'
  const bubble = document.createElement('div')
  bubble.className = 'msg-bubble-welcome'
  // Welcome message is plain text from config — escape it
  bubble.textContent = text
  group.appendChild(bubble)
  const timeEl = document.createElement('div')
  timeEl.className = 'msg-time'
  timeEl.textContent = getTime()
  group.appendChild(timeEl)
  msgs.appendChild(group)
  msgs.scrollTop = msgs.scrollHeight
}

function addUserMsg(text) {
  const msgs = document.getElementById('chat-messages')
  const group = document.createElement('div')
  group.className = 'msg-group user'
  const bubble = document.createElement('div')
  bubble.className = 'msg-bubble-user'
  bubble.textContent = text   // user input is always plain text — escape
  group.appendChild(bubble)
  const timeEl = document.createElement('div')
  timeEl.className = 'msg-time'
  timeEl.textContent = getTime()
  group.appendChild(timeEl)
  msgs.appendChild(group)
  msgs.scrollTop = msgs.scrollHeight
}

// Creates an agent bubble that can be updated incrementally (streaming)
function createAgentBubble() {
  const msgs = document.getElementById('chat-messages')
  const group = document.createElement('div')
  group.className = 'msg-group agent'
  const bubble = document.createElement('div')
  bubble.className = 'msg-bubble-agent msg-bubble-streaming'
  group.appendChild(bubble)
  const timeEl = document.createElement('div')
  timeEl.className = 'msg-time'
  timeEl.textContent = getTime()
  group.appendChild(timeEl)
  msgs.appendChild(group)
  return { group, bubble, timeEl }
}

// ── Typing indicator ─────────────────────────────────────────────────────────
function showTyping() {
  const msgs = document.getElementById('chat-messages')
  const wrap = document.createElement('div')
  wrap.className = 'msg-group agent typing-wrap'
  const ind = document.createElement('div')
  ind.className = 'typing-indicator show'
  ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>'
  wrap.appendChild(ind)
  msgs.appendChild(wrap)
  msgs.scrollTop = msgs.scrollHeight
  return wrap
}

// ── Topic chips ──────────────────────────────────────────────────────────────
// cached_topics from backend: [{icon, title, desc, question, suggested_prompt}]
function renderTopics(topics) {
  const wrap = document.getElementById('topics-wrap')
  wrap.innerHTML = topics.map(t =>
    `<button class="topic-chip" onclick="sendTopicChip(${JSON.stringify(t)})">
      <span class="chip-icon">${t.icon || '💬'}</span>${t.title || t.question || ''}
    </button>`
  ).join('')
}

function sendTopicChip(topic) {
  // Clear chips after one is selected
  document.getElementById('topics-wrap').innerHTML = ''
  // Send the question field but include suggested_prompt as context
  const question = topic.question || topic.title || ''
  sendMessageText(question, topic.suggested_prompt || '')
}

// ── MAIN SEND (SSE streaming) ─────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
}
function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 120) + 'px'
}

async function sendMessage() {
  const inp  = document.getElementById('chat-input')
  const text = inp.value.trim()
  if (!text || isTyping) return
  inp.value = ''; inp.style.height = 'auto'
  await sendMessageText(text, '')
}

async function sendMessageText(question, suggestedPrompt) {
  // Hide topic chips once user starts chatting
  document.getElementById('topics-wrap').innerHTML = ''

  addUserMsg(question)
  msgHistory.push({ role:'user', content:question })

  isTyping = true
  document.getElementById('send-btn').disabled = true

  // Try SSE streaming first; fall back to plain POST if it fails
  let streamOk = false
  try {
    streamOk = await streamResponse(question, suggestedPrompt)
  } catch(e) {
    console.warn('[stream failed]', e.message, '— falling back to non-stream')
  }

  if (!streamOk) {
    await nonStreamResponse(question, suggestedPrompt)
  }

  isTyping = false
  document.getElementById('send-btn').disabled = false
  document.getElementById('chat-input').focus()
}

// ── SSE Streaming handler ────────────────────────────────────────────────────
// Backend: POST /chat/:agentId/stream → text/event-stream
// Events: {type:'chunk',html:'...'} | {type:'done',tokens:N,answer:'...'} | {type:'error',message:'...'}
async function streamResponse(question, suggestedPrompt) {
  const { group, bubble } = createAgentBubble()
  let accumulated = ''

  const body = JSON.stringify({
    question,                                 // ✅ backend field is 'question', not 'message'
    history:   msgHistory.slice(-20, -1),     // ✅ send history array (exclude last user msg)
    session_id: sessionId || undefined,
    suggested_prompt: suggestedPrompt || undefined
  })

  const res = await fetch(`${API}/chat/${AGENT_ID}/stream`, {
    method:  'POST',
    headers: {'Content-Type':'application/json', 'Accept':'text/event-stream'},
    body
  })

  if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`)

  const reader  = res.body.getReader()
  const decoder = new TextDecoder()
  let buffer    = ''
  let done      = false

  while (!done) {
    const { value, done: rdDone } = await reader.read()
    done = rdDone
    if (value) buffer += decoder.decode(value, { stream:true })

    // Parse SSE lines
    const lines = buffer.split('\n')
    buffer = lines.pop() // keep incomplete line

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue
      let evt
      try { evt = JSON.parse(line.slice(6)) } catch { continue }

      if (evt.type === 'chunk' && evt.html) {
        accumulated += evt.html
        // Render accumulated HTML — backend returns styled HTML directly
        bubble.innerHTML = accumulated
        bubble.scrollIntoView({ block:'nearest' })
      }
      if (evt.type === 'done') {
        if (evt.session_id) sessionId = evt.session_id
        const finalHtml = evt.answer || accumulated
        bubble.innerHTML = finalHtml
        bubble.classList.remove('msg-bubble-streaming')
        // After DOM is settled, wire up any sg-product-card add-to-cart buttons
        wireProductCards(bubble)
        // Add to history (strip HTML for text context)
        msgHistory.push({ role:'assistant', content:finalHtml.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim() })
        done = true
      }
      if (evt.type === 'error') {
        bubble.innerHTML = `<p style="color:var(--red);margin:0;">${evt.message || 'Failed to get response.'}</p>`
        bubble.classList.remove('msg-bubble-streaming')
        done = true
      }
    }
  }

  return true // success
}

// ── Non-streaming fallback ───────────────────────────────────────────────────
// Backend: POST /chat/:agentId → {answer:'<html>...'}
async function nonStreamResponse(question, suggestedPrompt) {
  const typEl = showTyping()
  try {
    const res = await fetch(`${API}/chat/${AGENT_ID}`, {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({
        question,
        history:         msgHistory.slice(-20, -1),
        session_id:      sessionId || undefined,
        suggested_prompt: suggestedPrompt || undefined
      })
    })
    const d = await res.json()
    typEl.remove()

    const { group, bubble } = createAgentBubble()
    const answerHtml = d.answer || d.message || '<p style="color:var(--text2);">No response received.</p>'
    bubble.innerHTML = answerHtml
    bubble.classList.remove('msg-bubble-streaming')
    wireProductCards(bubble)
    document.getElementById('chat-messages').scrollTop = 999999

    msgHistory.push({ role:'assistant', content:answerHtml.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim() })
  } catch(e) {
    typEl.remove()
    const { bubble } = createAgentBubble()
    bubble.innerHTML = `<p style="color:var(--red);margin:0;">Sorry, I encountered an error. Please try again.</p>`
    bubble.classList.remove('msg-bubble-streaming')
  }
}

// ── Wire sg-product-card add-to-cart buttons ─────────────────────────────────
// Backend embeds <div class="sg-product-card" data-id="..." data-price="..." ...>
// We add an "Add to Cart" button after the card renders
function wireProductCards(container) {
  container.querySelectorAll('.sg-product-card').forEach(card => {
    // Avoid double-wiring
    if (card.dataset.wired) return
    card.dataset.wired = '1'
    const id    = card.dataset.id
    const name  = card.dataset.name  || ''
    const price = parseFloat(card.dataset.price) || 0
    const image = card.dataset.image || ''
    const cur   = card.dataset.currency || currSym()
    if (!id) return
    const btn = document.createElement('button')
    btn.className = 'product-btn'
    btn.textContent = 'Add to Cart'
    btn.onclick = () => addToCart({ _id:id, name, price, image_url:image, currency:cur })
    card.appendChild(btn)
  })
}

// ── Products (shopping tab) ──────────────────────────────────────────────────
// ✅ Correct endpoint: GET /chat/:agentId/products
async function loadProducts() {
  try {
    const res = await fetch(`${API}/chat/${AGENT_ID}/products`)
    if (!res.ok) return
    allProds = await res.json()
  } catch(e) {
    console.warn('[products]', e.message)
  }
}

function renderProductsInChat(products) {
  if (!products?.length) return
  const msgs = document.getElementById('chat-messages')
  const wrap = document.createElement('div')
  wrap.className = 'msg-group agent'
  const row = document.createElement('div')
  row.className = 'products-row'
  products.slice(0, 6).forEach(p => {
    const card = document.createElement('div')
    card.className = 'product-card'
    card.innerHTML = `
      ${p.image_url
        ? `<img src="${p.image_url}" class="product-img" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''
      }
      <div class="product-img-placeholder" style="${p.image_url?'display:none':''}">📦</div>
      <div class="product-info">
        <div class="product-name" title="${p.name}">${p.name}</div>
        <div class="product-price">${currSym()}${p.price}</div>
      </div>
      <button class="product-btn" onclick='addToCart(${JSON.stringify({_id:p._id?.toString(),name:p.name,price:p.price,image_url:p.image_url||""})})'>Add to Cart</button>`
    row.appendChild(card)
  })
  wrap.appendChild(row)
  msgs.appendChild(wrap)
  msgs.scrollTop = msgs.scrollHeight
}

// ── Cart ─────────────────────────────────────────────────────────────────────
function addToCart(product) {
  const existing = cart.find(i => i._id === product._id)
  if (existing) {
    existing.qty++
  } else {
    cart.push({ ...product, qty:1 })
  }
  updateCartBar()
  // Brief confirmation inside chat
  const msgs = document.getElementById('chat-messages')
  const group = document.createElement('div')
  group.className = 'msg-group agent'
  const bub = document.createElement('div')
  bub.className = 'msg-bubble-agent'
  bub.innerHTML = `<p style="margin:0;font-size:14px;">✅ <strong>${product.name}</strong> added to cart. ${cart.reduce((a,i)=>a+i.qty,0)} item(s) total.</p>`
  group.appendChild(bub)
  msgs.appendChild(group)
  msgs.scrollTop = msgs.scrollHeight
}

function updateCartBar() {
  const total = cart.reduce((a,i) => a + i.qty, 0)
  document.getElementById('cart-count').textContent = total
  document.getElementById('cart-bar').classList.toggle('show', total > 0)
}

function openCart() {
  const cur = currSym()
  document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
    <div class="cart-item">
      <div class="cart-item-thumb">
        ${item.image_url ? `<img src="${item.image_url}" alt="">` : '📦'}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.name}</div>
        <div style="font-size:12px;color:var(--text3);">${cur}${item.price} each</div>
        <div class="cart-qty">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span style="font-size:13px;font-weight:700;min-width:20px;text-align:center;">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
      <div style="font-size:14px;font-weight:800;font-family:var(--mono);white-space:nowrap;">
        ${cur}${(item.price * item.qty).toFixed(2)}
      </div>
    </div>`).join('')

  const total = cart.reduce((a,i) => a + (i.price * i.qty), 0)
  document.getElementById('cart-total').textContent = currSym() + total.toFixed(2)
  document.getElementById('cart-overlay').classList.add('open')
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open')
}

function changeQty(idx, delta) {
  cart[idx].qty += delta
  if (cart[idx].qty <= 0) cart.splice(idx, 1)
  updateCartBar()
  if (cart.length) openCart(); else closeCart()
}

// ── Checkout ─────────────────────────────────────────────────────────────────
// ✅ Correct endpoint: POST /chat/:agentId/checkout
// ✅ Body: {items:[{product_id, qty}], customer:{}}
// ✅ Response: {order_id (razorpay), order_db_id, key_id, amount, currency}
async function checkout() {
  if (!cart.length) return
  closeCart()

  // Show "preparing order" message
  const msgs = document.getElementById('chat-messages')
  const prep = document.createElement('div')
  prep.className = 'msg-group agent'
  const prepBub = document.createElement('div')
  prepBub.className = 'msg-bubble-agent'
  prepBub.innerHTML = '<p style="margin:0;color:var(--text2);">⏳ Preparing your order…</p>'
  prep.appendChild(prepBub)
  msgs.appendChild(prep)
  msgs.scrollTop = msgs.scrollHeight

  try {
    const res = await fetch(`${API}/chat/${AGENT_ID}/checkout`, {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({
        items: cart.map(i => ({ product_id: i._id, qty: i.qty })),  // ✅ correct format
        customer: {}
      })
    })
    const d = await res.json()
    prep.remove()

    if (!res.ok || d.error) {
      showChatMsg(`❌ ${d.error || 'Unable to create order.'}`)
      return
    }

    // d.order_id = Razorpay order ID, d.key_id = public Razorpay key
    if (d.order_id && d.key_id) {
      const rz = new Razorpay({
        key:      d.key_id,
        amount:   d.amount,
        currency: d.currency || 'INR',
        name:     agent?.name || 'Store',
        order_id: d.order_id,           // ✅ Razorpay order_id
        theme:    { color: agent?.brand_color || '#6C5FF5' },
        handler:  async (resp) => {
          // ✅ Correct verify endpoint: POST /chat/:agentId/verify-payment
          // ✅ Correct body: razorpay_order_id, razorpay_payment_id, razorpay_signature, order_db_id
          try {
            const vres = await fetch(`${API}/chat/${AGENT_ID}/verify-payment`, {
              method:  'POST',
              headers: {'Content-Type':'application/json'},
              body:    JSON.stringify({
                razorpay_order_id:   resp.razorpay_order_id,
                razorpay_payment_id: resp.razorpay_payment_id,
                razorpay_signature:  resp.razorpay_signature,
                order_db_id:         d.order_db_id   // ✅ include the MongoDB _id
              })
            })
            const vd = await vres.json()
            if (vres.ok && !vd.error) {
              cart = []; updateCartBar()
              showChatMsg('✅ Payment successful! Your order has been placed. Thank you for shopping with us! 🎉')
            } else {
              showChatMsg(`❌ Payment verification failed: ${vd.error || 'Unknown error'}`)
            }
          } catch(e) {
            showChatMsg('❌ Payment verification failed. Please contact support.')
          }
        },
        modal: {
          ondismiss: () => showChatMsg('Payment was cancelled. Your cart is still saved — tap Cart to try again.')
        }
      })
      rz.open()
    } else {
      showChatMsg(d.message || '❌ Unable to process payment. Please try again.')
    }
  } catch(e) {
    prep.remove()
    showChatMsg('❌ Checkout failed. Please try again.')
    console.error('[checkout]', e)
  }
}

// Helper — add a simple plain-text agent message
function showChatMsg(text) {
  const msgs = document.getElementById('chat-messages')
  const group = document.createElement('div')
  group.className = 'msg-group agent'
  const bub = document.createElement('div')
  bub.className = 'msg-bubble-agent'
  bub.innerHTML = `<p style="margin:0;font-size:14px;">${text}</p>`
  group.appendChild(bub)
  msgs.appendChild(group)
  msgs.scrollTop = msgs.scrollHeight
}

// ── Error screen ─────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('loading-screen').innerHTML = `
    <div style="text-align:center;padding:40px 24px;">
      <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:8px;">Something went wrong</div>
      <div style="font-size:13px;color:var(--text3);line-height:1.6;">${msg}</div>
    </div>`
}

// ── Boot ─────────────────────────────────────────────────────────────────────
init()
</script>
