<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    :root {
      --bg:#0d0d12;--bg2:#13131a;--surface:#1a1a24;--surface2:#20202c;--surface3:#272736;
      --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
      --text:#eeedf8;--text2:#9997b8;--text3:#56547a;
      --accent:#7c6aff;--accent-rgb:124,106,255;--accent-l:rgba(124,106,255,0.10);--accent-b:rgba(124,106,255,0.25);
      --green:#22c55e;--red:#f87171;--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
      --pad-x:18px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);--radius:18px;
    }
    body.theme-light{--bg:#f4f3ef;--bg2:#ebe9e4;--surface:#ffffff;--surface2:#f0eeeb;--surface3:#e5e3de;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#18171a;--text2:#555360;--text3:#a09ea8;}
    body.theme-midnight{--bg:#05050e;--bg2:#0a0a18;--surface:#0e0e1c;--surface2:#141428;--surface3:#1b1b34;--border:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.09);}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;}
    /* Header */
    .hdr{position:relative;z-index:20;background:rgba(13,13,18,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 var(--pad-x);padding-top:var(--safe-t);}
    body.theme-light .hdr{background:rgba(255,255,255,0.92);}
    .hdr-inner{display:flex;align-items:center;gap:12px;height:58px;}
    .agent-logo{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:white;overflow:hidden;}
    .agent-logo img{width:100%;height:100%;object-fit:contain;}
    .agent-name{font-size:15px;font-weight:700;letter-spacing:-0.01em;}
    .agent-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .hdr-actions{display:flex;gap:6px;align-items:center;margin-left:auto;}
    .hdr-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:7px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .hdr-btn:hover{background:var(--border);color:var(--text);}
    .cart-btn{position:relative;}
    .cart-count{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--accent);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;display:none;}
    /* Messages */
    .msgs{flex:1;overflow-y:auto;padding:18px var(--pad-x);display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;}
    .msgs::-webkit-scrollbar{width:4px;}
    .msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
    /* Bubbles */
    .bubble-wrap{display:flex;align-items:flex-end;gap:8px;}
    .bubble-wrap.user{flex-direction:row-reverse;}
    .bubble-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;overflow:hidden;}
    .bubble{padding:12px 15px;border-radius:18px 18px 4px 18px;max-width:82%;font-size:14px;line-height:1.7;position:relative;}
    .bubble.user{background:var(--accent);color:white;border-radius:18px 18px 4px 18px;padding:11px 15px;}
    .bubble.bot{background:var(--surface);border:1px solid var(--border2);border-radius:4px 18px 18px 18px;}
    body.theme-light .bubble.bot{background:#fff;}
    /* Typing */
    .typing{display:flex;align-items:center;gap:4px;padding:14px 16px;}
    .typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:blink 1.2s infinite;}
    .typing span:nth-child(2){animation-delay:.2s;}
    .typing span:nth-child(3){animation-delay:.4s;}
    @keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
    /* Topics grid */
    .topics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:4px 0 16px;}
    .topic-card{padding:13px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:14px;cursor:pointer;transition:all .15s;text-align:left;}
    .topic-card:hover{border-color:var(--accent);background:var(--accent-l);}
    .topic-icon{font-size:18px;margin-bottom:6px;}
    .topic-title{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:2px;}
    .topic-desc{font-size:11.5px;color:var(--text2);line-height:1.4;}
    /* Cart panel */
    .cart-panel{position:fixed;right:0;top:0;bottom:0;width:320px;background:var(--surface);border-left:1px solid var(--border2);z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);}
    .cart-panel.open{transform:translateX(0);}
    .cart-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .cart-items{flex:1;overflow-y:auto;padding:14px 18px;}
    .cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
    .cart-item:last-child{border-bottom:none;}
    .cart-item-img{width:40px;height:40px;border-radius:8px;object-fit:cover;background:var(--surface2);flex-shrink:0;}
    .cart-item-name{font-size:13px;font-weight:600;color:var(--text);}
    .cart-item-price{font-size:12px;color:var(--text2);}
    .cart-qty{display:flex;align-items:center;gap:6px;margin-top:4px;}
    .qty-btn{width:22px;height:22px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
    .qty-btn:hover{background:var(--surface2);}
    .cart-footer{padding:14px 18px;border-top:1px solid var(--border);}
    .cart-total{display:flex;justify-content:space-between;font-size:14px;font-weight:700;margin-bottom:12px;}
    /* Input area */
    .input-area{padding:10px var(--pad-x);padding-bottom:calc(10px + var(--safe-b));background:var(--bg);border-top:1px solid var(--border);}
    body.theme-light .input-area{background:var(--bg2);}
    .input-row{display:flex;align-items:flex-end;gap:8px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 8px 8px 14px;transition:border-color .2s;}
    .input-row:focus-within{border-color:var(--accent);}
    #chat-input{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:14px;color:var(--text);resize:none;max-height:120px;min-height:22px;line-height:1.5;padding-top:2px;}
    #chat-input::placeholder{color:var(--text3);}
    .input-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
    .input-btn{width:34px;height:34px;border-radius:10px;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .input-btn:hover{background:var(--border);color:var(--text);}
    .send-btn{background:var(--accent);color:white;width:36px;height:36px;border-radius:11px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
    .send-btn:hover:not(:disabled){background:rgba(var(--accent-rgb),.8);transform:scale(1.05);}
    .send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .img-preview-wrap{padding:6px 14px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);}
    .img-preview{width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid var(--border2);}
    .img-remove{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;line-height:1;}
    /* Overlay */
    .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none;}
    .cart-overlay.open{display:block;}
    /* Product card rendered in chat */
    .sg-product-card .add-to-cart-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;background:var(--accent);color:white;border:none;border-radius:10px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;width:100%;transition:all .15s;}
    .sg-product-card .add-to-cart-btn:hover{background:rgba(var(--accent-rgb),.8);}
    @media(max-width:640px){.topics-grid{grid-template-columns:1fr;}.cart-panel{width:100%;}.bubble{max-width:90%;}}
  </style>
</head>
<body>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>

<!-- Header -->
<header class="hdr">
  <div class="hdr-inner">
    <div class="agent-logo" id="agent-logo"></div>
    <div>
      <div class="agent-name" id="agent-name">Loading…</div>
      <div class="agent-status"><span class="status-dot"></span>Online</div>
    </div>
    <div class="hdr-actions">
      <button class="hdr-btn cart-btn" id="cart-btn" onclick="toggleCart()" style="display:none;" title="Cart">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" id="cart-count">0</span>
      </button>
      <button class="hdr-btn" onclick="clearChat()" title="New chat">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- Messages -->
<div class="msgs" id="msgs"></div>

<!-- Cart Panel -->
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <div style="font-family:'Sora',sans-serif;font-size:15px;font-weight:700;">🛒 Cart (<span id="cart-item-count">0</span>)</div>
    <button class="hdr-btn" onclick="closeCart()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total</span><span id="cart-total-price">₹0</span></div>
    <button style="width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:12px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;" onclick="checkout()">Checkout →</button>
    <button style="width:100%;padding:8px;background:none;border:none;color:var(--text2);font-family:var(--font);font-size:13px;cursor:pointer;margin-top:6px;" onclick="clearCart()">Clear Cart</button>
  </div>
</div>

<!-- Input Area -->
<div class="input-area">
  <div id="img-preview-row" class="img-preview-wrap" style="display:none;">
    <img id="img-preview-el" class="img-preview" alt=""/>
    <span style="font-size:12px;color:var(--text2);flex:1;" id="img-preview-name"></span>
    <button class="img-remove" onclick="removeImage()">✕</button>
  </div>
  <div class="input-row">
    <textarea id="chat-input" rows="1" placeholder="Ask a question…" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <div class="input-actions">
      <label class="input-btn" title="Attach image">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <input type="file" id="img-inp" accept="image/*" style="display:none;" onchange="handleImage(this)"/>
      </label>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const API      = 'https://fypouhme3gqldqk6sk75b75udy0ltonb.lambda-url.ap-southeast-2.on.aws'
const AGENT_ID = new URLSearchParams(location.search).get('agent')
if (!AGENT_ID) document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Sora,sans-serif;color:#9997b8;">No agent specified.</div>'

let agentConfig     = null
let chatHistory     = []
let imageData       = null
let isStreaming     = false
let cart            = []
const SESSION_ID    = 'sg_' + Math.random().toString(36).slice(2)
const VISITOR_ID    = localStorage.getItem('sg_vid') || (() => { const v='v_'+Date.now().toString(36); localStorage.setItem('sg_vid',v); return v })()

// ── Init ──────────────────────────────────────────────────────────
;(async () => {
  try {
    agentConfig = await fetch(`${API}/chat/${AGENT_ID}/config`).then(r=>r.json())
    if (agentConfig.error) { showError(agentConfig.error); return }
    applyBranding(agentConfig)
    showWelcome(agentConfig)
  } catch(e) { showError('Failed to load agent. Please try again.') }
})()

function applyBranding(cfg) {
  const accent  = cfg.brand_color || '#7c6aff'
  document.documentElement.style.setProperty('--accent', accent)
  document.documentElement.style.setProperty('--accent-rgb', hexToRgb(accent))
  document.documentElement.style.setProperty('--accent-l', hexToRgba(accent, 0.1))
  document.documentElement.style.setProperty('--accent-b', hexToRgba(accent, 0.25))
  if (cfg.theme==='light') document.body.classList.add('theme-light')
  if (cfg.theme==='midnight') document.body.classList.add('theme-midnight')
  document.title = cfg.name + ' · Chat'
  // Logo
  const logo = document.getElementById('agent-logo')
  logo.style.background = accent
  if (cfg.logo_base64) logo.innerHTML = `<img src="${cfg.logo_base64}" alt=""/>`
  else logo.textContent = cfg.name?.[0]?.toUpperCase() || 'A'
  document.getElementById('agent-name').textContent = cfg.name
  // Shopping
  if (cfg.shopping_enabled && cfg.payment_enabled) {
    document.getElementById('cart-btn').style.display = 'flex'
  }
}

function showWelcome(cfg) {
  const msgs = document.getElementById('msgs')
  msgs.innerHTML = ''
  appendBotBubble(cfg.welcome_message || 'Hi! How can I help you today?')
  // Topics
  const topics = cfg.cached_topics || []
  if (topics.length) {
    const wrap = document.createElement('div')
    wrap.className = 'topics-grid'
    wrap.id = 'topics-grid'
    topics.slice(0,6).forEach(t => {
      const card = document.createElement('div')
      card.className = 'topic-card'
      card.innerHTML = `<div class="topic-icon">${t.icon||'💬'}</div><div class="topic-title">${t.title}</div><div class="topic-desc">${t.desc}</div>`
      card.onclick = () => { hideTopics(); sendWithContent(t.question, t.suggested_prompt) }
      wrap.appendChild(card)
    })
    msgs.appendChild(wrap)
  }
  scrollBottom()
}

function hideTopics() { document.getElementById('topics-grid')?.remove() }

// ── Messaging ─────────────────────────────────────────────────────
function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px' }

async function sendMessage() {
  const inp  = document.getElementById('chat-input')
  const text = inp.value.trim()
  if (!text && !imageData) return
  if (isStreaming) return
  hideTopics()
  sendWithContent(text, null, imageData)
  inp.value = ''; inp.style.height = 'auto'
  removeImage()
}

async function sendWithContent(question, suggestedPrompt, image) {
  if (isStreaming) return
  isStreaming = true
  document.getElementById('send-btn').disabled = true
  appendUserBubble(question || '📷 Image')
  chatHistory.push({ role:'user', content:question||'[image]' })

  // Typing indicator
  const typingEl = appendTyping()
  let fullAnswer = ''

  try {
    const body = { question, history:chatHistory.slice(-12), session_id:SESSION_ID, visitor_id:VISITOR_ID, suggested_prompt:suggestedPrompt||null }
    if (image) body.image = image

    const res = await fetch(`${API}/chat/${AGENT_ID}/stream`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })

    if (!res.ok || !res.body) throw new Error('Stream failed')

    typingEl.remove()
    const botEl = appendBotBubble('', true)
    const reader = res.body.getReader()
    const decoder = new TextDecoder()
    let buf = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buf += decoder.decode(value, { stream:true })
      const lines = buf.split('\n'); buf = lines.pop()
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue
        try {
          const ev = JSON.parse(line.slice(6))
          if (ev.type==='chunk') { fullAnswer += ev.html; botEl.innerHTML = fullAnswer; scrollBottom(); attachCartListeners(botEl) }
          else if (ev.type==='done') { fullAnswer = ev.answer || fullAnswer; botEl.innerHTML = fullAnswer; attachCartListeners(botEl); scrollBottom() }
          else if (ev.type==='error') { botEl.innerHTML = `<p style="color:var(--red);font-size:13.5px;">${ev.message}</p>` }
        } catch {}
      }
    }
  } catch(e) {
    typingEl?.remove()
    appendBotBubble(`<p style="color:var(--red);font-size:13.5px;">Connection error. Please try again.</p>`, true)
  }

  chatHistory.push({ role:'assistant', content:fullAnswer })
  isStreaming = false
  document.getElementById('send-btn').disabled = false
  scrollBottom()
}

function appendUserBubble(text) {
  const msgs = document.getElementById('msgs')
  const wrap = document.createElement('div')
  wrap.className = 'bubble-wrap user'
  wrap.innerHTML = `<div class="bubble user">${escHtml(text)}</div>`
  msgs.appendChild(wrap)
  scrollBottom()
}

function appendBotBubble(html, editable=false) {
  const msgs = document.getElementById('msgs')
  const wrap = document.createElement('div')
  wrap.className = 'bubble-wrap'
  const bubbleDiv = document.createElement('div')
  bubbleDiv.className = 'bubble bot'
  if (editable) { bubbleDiv.innerHTML = html; wrap.appendChild(bubbleDiv); msgs.appendChild(wrap); scrollBottom(); return bubbleDiv }
  bubbleDiv.innerHTML = html
  wrap.appendChild(bubbleDiv)
  msgs.appendChild(wrap)
  attachCartListeners(bubbleDiv)
  scrollBottom()
  return bubbleDiv
}

function appendTyping() {
  const msgs = document.getElementById('msgs')
  const wrap = document.createElement('div')
  wrap.className = 'bubble-wrap'
  wrap.innerHTML = `<div class="bubble bot" style="padding:12px 16px;"><div class="typing"><span></span><span></span><span></span></div></div>`
  msgs.appendChild(wrap)
  scrollBottom()
  return wrap
}

// ── Product cards — attach Add to Cart buttons ────────────────────
function attachCartListeners(el) {
  el.querySelectorAll('.sg-product-card').forEach(card => {
    if (card.dataset.cartAttached) return
    card.dataset.cartAttached = '1'
    const btn = document.createElement('button')
    btn.className = 'add-to-cart-btn'
    btn.innerHTML = '🛒 Add to Cart'
    btn.onclick = () => addToCart({ id:card.dataset.id, name:card.dataset.name, price:parseFloat(card.dataset.price)||0, image:card.dataset.image||'', currency:card.dataset.currency||'₹' })
    card.querySelector('div')?.appendChild(btn)
  })
}

// ── Cart ──────────────────────────────────────────────────────────
function addToCart(product) {
  const existing = cart.find(i => i.id===product.id)
  if (existing) existing.qty = (existing.qty||1) + 1
  else cart.push({ ...product, qty:1 })
  updateCartUI()
  toggleCart()
  toast('Added to cart!')
}
function removeFromCart(id) { cart = cart.filter(i=>i.id!==id); updateCartUI() }
function changeQty(id, delta) {
  const item = cart.find(i=>i.id===id)
  if (!item) return
  item.qty = Math.max(1, (item.qty||1)+delta)
  if (item.qty <= 0) removeFromCart(id)
  else updateCartUI()
}
function clearCart() { cart = []; updateCartUI(); closeCart() }
function toggleCart() {
  document.getElementById('cart-panel').classList.toggle('open')
  document.getElementById('cart-overlay').classList.toggle('open')
}
function closeCart() {
  document.getElementById('cart-panel').classList.remove('open')
  document.getElementById('cart-overlay').classList.remove('open')
}
function updateCartUI() {
  const total = cart.reduce((a,i)=>a+(i.price||0)*(i.qty||1),0)
  const count = cart.reduce((a,i)=>a+(i.qty||1),0)
  const countEl = document.getElementById('cart-count')
  countEl.style.display = count>0?'flex':'none'
  countEl.textContent = count
  document.getElementById('cart-item-count').textContent = count
  const cur = cart[0]?.currency || '₹'
  document.getElementById('cart-total-price').textContent = cur + total.toLocaleString('en-IN',{maximumFractionDigits:2})
  const list = document.getElementById('cart-items-list')
  if (!cart.length) { list.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px;">Your cart is empty.</div>'; return }
  list.innerHTML = cart.map(item => `
    <div class="cart-item">
      ${item.image ? `<img src="${item.image}" class="cart-item-img" alt="" onerror="this.style.display='none'"/>` : `<div class="cart-item-img" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;">📦</div>`}
      <div style="flex:1;min-width:0;">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${item.currency||'₹'}${item.price?.toLocaleString()}</div>
        <div class="cart-qty">
          <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
          <span style="font-size:13px;font-weight:600;min-width:20px;text-align:center;">${item.qty||1}</span>
          <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
        </div>
      </div>
      <button onclick="removeFromCart('${item.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;align-self:flex-start;">✕</button>
    </div>
  `).join('')
}
async function checkout() {
  if (!cart.length) { toast('Cart is empty!'); return }
  closeCart()
  try {
    const d = await fetch(`${API}/chat/${AGENT_ID}/checkout`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ items:cart.map(i=>({product_id:i.id, qty:i.qty||1})), customer:{} })}).then(r=>r.json())
    if (d.error) { toast(d.error,'error'); return }
    const rz = new Razorpay({
      key:d.key_id, amount:d.amount, currency:d.currency,
      name:d.agent_name||'SupportGent Store', order_id:d.order_id,
      prefill:{}, theme:{ color:agentConfig?.brand_color||'#7c6aff' },
      handler: async resp => {
        const vr = await fetch(`${API}/chat/${AGENT_ID}/verify-payment`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({...resp, order_db_id:d.order_db_id})}).then(r=>r.json())
        if (vr.success) { clearCart(); appendBotBubble(`<div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:12px;padding:14px 16px;"><strong style="color:var(--green);">✅ Order Placed!</strong><p style="margin:6px 0 0;font-size:13.5px;color:var(--text2);">${vr.message}</p></div>`) }
        else toast('Payment verification failed','error')
      }
    })
    rz.open()
  } catch(e) { toast('Checkout failed: '+e.message,'error') }
}

// ── Image attachment ──────────────────────────────────────────────
function handleImage(input) {
  const file = input.files[0]; if (!file) return
  if (file.size > 5*1024*1024) { toast('Image must be under 5MB','error'); return }
  const reader = new FileReader()
  reader.onload = e => {
    const base64 = e.target.result.split(',')[1]
    imageData = { base64, mimeType:file.type }
    document.getElementById('img-preview-el').src = e.target.result
    document.getElementById('img-preview-name').textContent = file.name
    document.getElementById('img-preview-row').style.display = 'flex'
  }
  reader.readAsDataURL(file)
}
function removeImage() { imageData=null; document.getElementById('img-preview-row').style.display='none'; document.getElementById('img-inp').value=''; document.getElementById('img-preview-el').src='' }

// ── Helpers ───────────────────────────────────────────────────────
function clearChat() { chatHistory=[]; cart=[]; updateCartUI(); agentConfig && showWelcome(agentConfig) }
function scrollBottom() { const m=document.getElementById('msgs'); m.scrollTop=m.scrollHeight }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>') }
function showError(msg) { document.getElementById('msgs').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:var(--text2);"><div style="font-size:28px;">⚠️</div><div style="font-size:14px;">${msg}</div></div>` }
function hexToRgb(hex) { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `${r},${g},${b}` }
function hexToRgba(hex,a) { return `rgba(${hexToRgb(hex)},${a})` }
function toast(msg, type='success') {
  let c=document.getElementById('tc'); if(!c){c=document.createElement('div');c.id='tc';c.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:6px;';document.body.appendChild(c)}
  const el=document.createElement('div'); el.style.cssText=`padding:10px 18px;border-radius:20px;font-size:13px;font-family:var(--font);background:${type==='error'?'rgba(248,113,113,.15)':'rgba(34,197,94,.12)'};border:1px solid ${type==='error'?'rgba(248,113,113,.3)':'rgba(34,197,94,.25)'};color:${type==='error'?'var(--red)':'var(--green)'};backdrop-filter:blur(10px);animation:fadeIn .25s ease;pointer-events:none;white-space:nowrap;`
  el.textContent=msg; c.appendChild(el); setTimeout(()=>el.remove(),2800)
}
</script>
