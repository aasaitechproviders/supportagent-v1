<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Leads — SupportGent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .leads-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .leads-toolbar .inp{height:36px;padding:0 12px;border:1px solid var(--border-md);border-radius:var(--r-sm);font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
  .leads-toolbar .inp:focus{border-color:var(--accent)}
  .search-inp{min-width:200px;flex:1;max-width:320px}
  .filter-select{height:36px;padding:0 10px;border:1px solid var(--border-md);border-radius:var(--r-sm);font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);cursor:pointer;outline:none}
  /* Stats row */
  .lead-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
  .lead-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px}
  .ls-val{font-size:22px;font-weight:800;font-family:var(--mono);margin-bottom:3px}
  .ls-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3)}
  /* Table */
  .leads-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
  .leads-table{width:100%;border-collapse:collapse}
  .leads-table th{padding:10px 16px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);border-bottom:1px solid var(--border);background:var(--surface-2);white-space:nowrap}
  .leads-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
  .leads-table tr:last-child td{border-bottom:none}
  .leads-table tr:hover td{background:var(--surface-2)}
  .lead-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;background:var(--accent)}
  .lead-name-cell{display:flex;align-items:center;gap:10px}
  .lead-name{font-weight:600;color:var(--text)}
  .lead-email{font-size:11.5px;color:var(--text-3);margin-top:2px}
  .mobile-val{font-family:var(--mono);font-size:12.5px;color:var(--text-2)}
  .msg-preview{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-2);font-size:12.5px;cursor:pointer}
  .msg-preview:hover{color:var(--accent)}
  .source-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .source-chat{background:var(--accent-dim);color:var(--accent)}
  .source-enquiry{background:var(--green-dim);color:var(--green)}
  .lead-date{font-size:11.5px;color:var(--text-3);white-space:nowrap}
  .empty-leads{padding:60px 20px;text-align:center;color:var(--text-3)}
  .empty-leads-icon{font-size:40px;margin-bottom:12px}
  /* Message expand modal */
  .msg-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
  .msg-modal-overlay.open{opacity:1;pointer-events:all}
  .msg-modal{background:var(--surface);border-radius:var(--r-lg);padding:24px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .msg-modal-name{font-size:15px;font-weight:700;margin-bottom:4px}
  .msg-modal-meta{font-size:12px;color:var(--text-3);margin-bottom:16px}
  .msg-modal-body{font-size:13.5px;color:var(--text-2);line-height:1.7;white-space:pre-wrap;background:var(--surface-2);padding:14px;border-radius:var(--r-sm)}
  /* CSV export btn */
  .btn-export{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:var(--r-sm);font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--border-md);background:var(--surface);color:var(--text-2);transition:var(--t)}
  .btn-export:hover{border-color:var(--accent);color:var(--accent)}
  /* Pagination */
  .pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);font-size:12.5px;color:var(--text-3)}
  @media(max-width:900px){
    .lead-stats{grid-template-columns:repeat(2,1fr)}
    .leads-table th:nth-child(5),.leads-table td:nth-child(5){display:none}
  }
  @media(max-width:648px){
    .lead-stats{grid-template-columns:repeat(2,1fr)}
    .leads-table th:nth-child(4),.leads-table td:nth-child(4){display:none}
    .search-inp{max-width:100%}
  }
</style>
<link rel="stylesheet" href="shared.css">
<script>;(function(){var d=localStorage.getItem('sg_theme')==='dark';document.documentElement[d?'setAttribute':'removeAttribute']('data-theme','dark');document.documentElement.style.background=d?'#07080D':'#F2F3F9';})();</script>
<script src="i18n.js"></script>
<script src="api.js"></script>
<script src="nav.js"></script>
</head>
<body>
<div id="toast-container"></div>
<div class="mobile-topbar">
  <div class="mob-left">
    <button class="hamburger" onclick="openMobileSidebar()"><svg viewBox="0 0 16 16"><line x1="1" y1="4" x2="15" y2="4"/><line x1="1" y1="8" x2="15" y2="8"/><line x1="1" y1="12" x2="15" y2="12"/></svg></button>
    <a class="mob-logo" href="home.html">Support<span>Gent</span></a>
  </div>
  <div class="mob-right"><button class="theme-toggle" style="font-size:15px"></button></div>
</div>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeMobileSidebar()"></div>
<div class="sidebar" id="sidebar"></div>

<div id="page-skeleton">
  <div class="skel-topbar">
    <div class="skel" style="height:13px;width:80px;border-radius:4px"></div>
    <div class="skel" style="height:34px;width:100px;border-radius:var(--r-sm)"></div>
  </div>
  <div class="skel-body">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
      <div class="skel" style="height:68px;border-radius:var(--r-md)"></div>
      <div class="skel" style="height:68px;border-radius:var(--r-md);opacity:.7"></div>
      <div class="skel" style="height:68px;border-radius:var(--r-md);opacity:.5"></div>
      <div class="skel" style="height:68px;border-radius:var(--r-md);opacity:.3"></div>
    </div>
    <div class="skel" style="height:400px;border-radius:var(--r-lg)"></div>
  </div>
</div>

<div class="main-wrap">
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="topbar-title">🎯 Leads</div>
        <div class="topbar-subtitle" id="leads-sub">Loading…</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="theme-toggle" style="font-size:15px"></button>
      <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
  </div>

  <div class="content" id="page-content" style="display:none">
    <!-- Stats -->
    <div class="lead-stats">
      <div class="lead-stat">
        <div class="ls-val" id="stat-total">0</div>
        <div class="ls-label">Total Leads</div>
      </div>
      <div class="lead-stat">
        <div class="ls-val" id="stat-chat" style="color:var(--accent)">0</div>
        <div class="ls-label">From Chat</div>
      </div>
      <div class="lead-stat">
        <div class="ls-val" id="stat-enquiry" style="color:var(--green)">0</div>
        <div class="ls-label">From Enquiry</div>
      </div>
      <div class="lead-stat">
        <div class="ls-val" id="stat-today">0</div>
        <div class="ls-label">Today</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="leads-toolbar">
      <input class="inp search-inp" type="search" placeholder="Search name, mobile, email…" id="search-inp" oninput="onSearch(this.value)">
      <select class="filter-select" id="filter-source" onchange="applyFilters()">
        <option value="">All Sources</option>
        <option value="chat">💬 Chat</option>
        <option value="enquiry">📋 Enquiry Form</option>
      </select>
      <select class="filter-select" id="filter-agent" onchange="applyFilters()">
        <option value="">All Agents</option>
      </select>
    </div>

    <!-- Table -->
    <div class="leads-table-wrap">
      <table class="leads-table">
        <thead>
          <tr>
            <th>Lead</th>
            <th>Mobile</th>
            <th>Source</th>
            <th>Agent</th>
            <th>Message</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="leads-tbody"></tbody>
      </table>
      <div class="pagination" id="pagination" style="display:none">
        <span id="page-info">Showing 1–50</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="prevPage()" id="btn-prev" disabled>← Prev</button>
          <button class="btn btn-secondary btn-sm" onclick="nextPage()" id="btn-next">Next →</button>
        </div>
      </div>
      <div class="empty-leads" id="empty-leads" style="display:none">
        <div class="empty-leads-icon">🎯</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:6px">No leads yet</div>
        <div style="font-size:13px">Leads appear here when visitors chat with your agent or submit an enquiry form.</div>
      </div>
    </div>
  </div>
</div>

<!-- Message expand modal -->
<div class="msg-modal-overlay" id="msg-modal" onclick="if(event.target===this)closeModal()">
  <div class="msg-modal">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div>
        <div class="msg-modal-name" id="modal-name"></div>
        <div class="msg-modal-meta" id="modal-meta"></div>
      </div>
      <button onclick="closeModal()" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--text-3);padding:0 4px">✕</button>
    </div>
    <div class="msg-modal-body" id="modal-body"></div>
    <div style="margin-top:14px;display:flex;gap:8px">
      <a id="modal-wa" href="#" target="_blank" class="btn btn-secondary btn-sm" style="text-decoration:none">💬 WhatsApp</a>
      <a id="modal-call" href="#" class="btn btn-secondary btn-sm" style="text-decoration:none">📞 Call</a>
    </div>
  </div>
</div>

<script>
let allLeads  = []
let filtered  = []
let agents    = []
let page      = 0
const PER     = 50
let searchTimer

;(async () => {
  const nav = await renderNav('leads')
  if (!nav) return

  try {
    const [leadsRes, agentsRes] = await Promise.all([
      apiFetch('/leads?limit=1000'),
      apiFetch('/agents'),
    ])
    allLeads = leadsRes.leads || []
    agents   = agentsRes || []
    buildAgentFilter()
    processStats()
    applyFilters()
    document.getElementById('page-content').style.display = 'block'
  } catch(e) {
    toast(e.message, 'error')
  }
  dismissSkeleton()
})()

function buildAgentFilter() {
  const sel = document.getElementById('filter-agent')
  const unique = [...new Map(allLeads.map(l => [String(l.agent_id), l.agent_name])).entries()]
  unique.forEach(([id, name]) => {
    const opt = document.createElement('option')
    opt.value = id; opt.textContent = name || 'Unknown Agent'
    sel.appendChild(opt)
  })
}

function processStats() {
  const today = new Date(); today.setHours(0,0,0,0)
  document.getElementById('stat-total').textContent   = allLeads.length
  document.getElementById('stat-chat').textContent    = allLeads.filter(l => l.source === 'chat').length
  document.getElementById('stat-enquiry').textContent = allLeads.filter(l => l.source === 'enquiry').length
  document.getElementById('stat-today').textContent   = allLeads.filter(l => new Date(l.created_at) >= today).length
}

function onSearch(val) {
  clearTimeout(searchTimer)
  searchTimer = setTimeout(() => applyFilters(), 280)
}

function applyFilters() {
  const search  = document.getElementById('search-inp').value.trim().toLowerCase()
  const source  = document.getElementById('filter-source').value
  const agentId = document.getElementById('filter-agent').value
  filtered = allLeads.filter(l => {
    if (source  && l.source !== source) return false
    if (agentId && String(l.agent_id) !== agentId) return false
    if (search) {
      const hay = [l.name, l.mobile, l.email, l.message, l.agent_name].join(' ').toLowerCase()
      if (!hay.includes(search)) return false
    }
    return true
  })
  page = 0
  renderTable()
  document.getElementById('leads-sub').textContent = `${filtered.length} lead${filtered.length!==1?'s':''}`
}

function renderTable() {
  const tbody  = document.getElementById('leads-tbody')
  const empty  = document.getElementById('empty-leads')
  const pager  = document.getElementById('pagination')
  const slice  = filtered.slice(page * PER, (page + 1) * PER)

  if (!filtered.length) {
    tbody.innerHTML = ''
    empty.style.display  = 'block'
    pager.style.display  = 'none'
    return
  }
  empty.style.display = 'none'
  pager.style.display = filtered.length > PER ? 'flex' : 'none'

  tbody.innerHTML = slice.map(l => {
    const initials = (l.name || l.mobile || '?')[0].toUpperCase()
    const color    = stringToColor(l.mobile || l.name || '')
    const source   = l.source === 'chat'
      ? '<span class="source-badge source-chat">💬 Chat</span>'
      : '<span class="source-badge source-enquiry">📋 Enquiry</span>'
    const msg      = l.message ? `<div class="msg-preview" onclick='openModal(${JSON.stringify(l).replace(/'/g,"\\'")})'>${esc(l.message)}</div>` : '<span style="color:var(--text-3);font-size:12px">—</span>'
    const date     = fmtDate(l.created_at)
    return `<tr>
      <td><div class="lead-name-cell">
        <div class="lead-avatar" style="background:${color}">${esc(initials)}</div>
        <div><div class="lead-name">${esc(l.name || '—')}</div><div class="lead-email">${esc(l.email || '')}</div></div>
      </div></td>
      <td><span class="mobile-val">${esc(l.mobile)}</span></td>
      <td>${source}</td>
      <td style="font-size:12.5px;color:var(--text-2)">${esc(l.agent_name || '—')}</td>
      <td>${msg}</td>
      <td><div class="lead-date">${date}</div></td>
    </tr>`
  }).join('')

  const from = page * PER + 1
  const to   = Math.min((page + 1) * PER, filtered.length)
  document.getElementById('page-info').textContent   = `Showing ${from}–${to} of ${filtered.length}`
  document.getElementById('btn-prev').disabled       = page === 0
  document.getElementById('btn-next').disabled       = to >= filtered.length
}

function prevPage() { if (page > 0) { page--; renderTable() } }
function nextPage() { if ((page+1)*PER < filtered.length) { page++; renderTable() } }

function openModal(lead) {
  document.getElementById('modal-name').textContent = lead.name || lead.mobile
  document.getElementById('modal-meta').textContent = `${lead.mobile}${lead.email ? ' · ' + lead.email : ''} · ${fmtDate(lead.created_at)} · ${lead.agent_name || ''}`
  document.getElementById('modal-body').textContent = lead.message || 'No message provided.'
  const num = lead.mobile.replace(/\D/g,'')
  document.getElementById('modal-wa').href   = `https://wa.me/${num}`
  document.getElementById('modal-call').href = `tel:${lead.mobile}`
  document.getElementById('msg-modal').classList.add('open')
}
function closeModal() { document.getElementById('msg-modal').classList.remove('open') }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal() })

function exportCSV() {
  if (!filtered.length) { toast('No leads to export', 'warning'); return }
  const header = ['Name','Mobile','Email','Source','Agent','Message','Date']
  const rows   = filtered.map(l => [
    l.name, l.mobile, l.email, l.source, l.agent_name,
    (l.message || '').replace(/"/g,'""'),
    new Date(l.created_at).toLocaleString()
  ].map(v => `"${v||''}"`).join(','))
  const csv  = [header.join(','), ...rows].join('\n')
  const blob = new Blob([csv], { type: 'text/csv' })
  const url  = URL.createObjectURL(blob)
  const a    = document.createElement('a')
  a.href = url; a.download = `leads_${Date.now()}.csv`
  a.click(); URL.revokeObjectURL(url)
  toast('CSV exported', 'success')
}

function stringToColor(str) {
  const colors = ['#7C6FFF','#F26B6B','#2DD4A0','#F5A523','#60A5FA','#EC4899','#A78BFA','#14B8A6']
  let h = 0; for (const c of str) h = (h * 31 + c.charCodeAt(0)) % colors.length
  return colors[Math.abs(h)]
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function fmtDate(d) {
  if (!d) return '—'
  const dt = new Date(d), now = new Date()
  const diff = now - dt
  if (diff < 60000)  return 'Just now'
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago'
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago'
  if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago'
  return dt.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
}
</script>
</body>
</html>
